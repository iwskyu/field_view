<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Drive View11</title>

<style>
body{
    margin:0;
    background:#000;
    color:#0f0;
    font-family:Arial;
    font-size:24px;
    padding:20px;
}

#permission{
    position:fixed;
    inset:0;
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
}

button{
    font-size:30px;
    padding:20px 40px;
}

.row{
    margin:10px 0;
}

.label{
    color:#888;
}
</style>
</head>
<body>

<div id="permission">
<button onclick="startApp()">位置情報を許可して開始</button>
</div>

<div id="app" style="display:none">

<div class="row">🕒 <span id="clock"></span></div>

<div class="row">🌤 <span id="weather"></span></div>

<div class="row">🌅 <span id="sun"></span></div>

<div class="row">💨 <span id="wind"></span></div>

<div class="row">💧 <span id="humidity"></span></div>

<div class="row">🌊 <span id="wave"></span></div>

<div class="row">📈 <span id="pressure"></span></div>

<div class="row">🌕 <span id="moon"></span></div>

<hr>

<div class="row">📮 <span id="postcode"></span></div>

<div class="row">🏠 <span id="address"></span></div>

<div class="row">📍 <span id="landmark"></span></div>

<div class="row">🛣 <span id="road"></span></div>

<div class="row">🧭 <span id="heading"></span></div>

<div class="row">⛰ <span id="altitude"></span></div>

<div class="row">🚗 <span id="speed"></span></div>

<div class="row">📏 <span id="distance"></span></div>

<div class="row">🎯 <span id="accuracy"></span></div>

</div>

<script>

let lat=0;
let lon=0;
let totalDistance=0;
let prevPos=null;

function startApp(){

document.getElementById("permission").style.display="none";
document.getElementById("app").style.display="block";

navigator.geolocation.watchPosition(
positionUpdate,
err=>alert(err.message),
{
enableHighAccuracy:true,
maximumAge:0,
timeout:10000
});

setInterval(updateClock,1000);
}

function updateClock(){
const d=new Date();

document.getElementById("clock").innerText=
d.toLocaleTimeString('ja-JP');
}

function positionUpdate(pos){

lat=pos.coords.latitude;
lon=pos.coords.longitude;

document.getElementById("altitude").innerText=
(pos.coords.altitude||0).toFixed(1)+" m";

document.getElementById("speed").innerText=
Math.max(0,(pos.coords.speed||0)*3.6).toFixed(1)+" km/h";

document.getElementById("accuracy").innerText=
Math.round(pos.coords.accuracy)+" m";

let heading=pos.coords.heading;

if(heading!=null){

document.getElementById("heading").innerText=
heading.toFixed(0)+"°";
}

if(prevPos){

totalDistance+=distance(
prevPos.lat,
prevPos.lon,
lat,
lon
);
}

prevPos={lat,lon};

document.getElementById("distance").innerText=
(totalDistance/1000).toFixed(2)+" km";
}

function distance(lat1,lon1,lat2,lon2){

const R=6371000;

const dLat=(lat2-lat1)*Math.PI/180;
const dLon=(lon2-lon1)*Math.PI/180;

const a=
Math.sin(dLat/2)**2+
Math.cos(lat1*Math.PI/180)*
Math.cos(lat2*Math.PI/180)*
Math.sin(dLon/2)**2;

return R*2*Math.atan2(
Math.sqrt(a),
Math.sqrt(1-a)
);
}

async function updateWeather(){

if(!lat)return;

const url=
`https://api.open-meteo.com/v1/forecast
?latitude=${lat}
&longitude=${lon}
&current=temperature_2m,
relative_humidity_2m,
pressure_msl,
wind_speed_10m
&daily=sunrise,sunset`;

const res=await fetch(url);
const data=await res.json();

document.getElementById("weather").innerText=
`${data.current.temperature_2m}℃`;

document.getElementById("wind").innerText=
`${data.current.wind_speed_10m} m/s`;

document.getElementById("humidity").innerText=
`${data.current.relative_humidity_2m}%`;

document.getElementById("pressure").innerText=
`${data.current.pressure_msl} hPa`;

document.getElementById("sun").innerText=
`${data.daily.sunrise[0].substr(11,5)}
 /
${data.daily.sunset[0].substr(11,5)}`;
}

async function updateAddress(){

if(!lat)return;

const url=
`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lon}`;

const res=await fetch(url);

const data=await res.json();

document.getElementById("address").innerText=
data.display_name||"-";

document.getElementById("postcode").innerText=
data.address.postcode||"-";

document.getElementById("road").innerText=
data.address.road||"-";

document.getElementById("landmark").innerText=
data.name||"-";
}

function moonPhase(){

const now=new Date();

const lp=2551443;

const newMoon=
new Date("1970-01-07T20:35:00Z");

const phase=
((now-newMoon)/1000)%lp;

const p=Math.floor(phase/(lp/8));

const names=[
"新月",
"三日月",
"上弦",
"十三夜",
"満月",
"十六夜",
"下弦",
"有明月"
];

document.getElementById("moon").innerText=
names[p];
}

setInterval(updateWeather,300000);
setInterval(updateAddress,60000);
setInterval(moonPhase,60000);

</script>

</body>
</html>
