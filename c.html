<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drive View10</title>

<style>
body{
    margin:0;
    background:#111;
    color:#fff;
    font-family:Arial, sans-serif;
    padding:20px;
}

.container{
    max-width:900px;
    margin:auto;
}

.title{
    font-size:36px;
    margin-bottom:20px;
    text-align:center;
}

.card{
    background:#222;
    border-radius:12px;
    padding:15px;
    margin-bottom:15px;
}

.label{
    color:#aaa;
    font-size:14px;
}

.value{
    font-size:28px;
    margin-top:5px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:15px;
}
</style>
</head>

<body>

<div class="container">

    <div class="title">Drive View10</div>

    <div class="card">
        <div class="label">現在時刻</div>
        <div class="value" id="clock">--:--</div>
    </div>

    <div class="card">
        <div class="label">現在地の天気</div>
        <div class="value" id="weather">
            取得中...
        </div>
    </div>

    <div class="card">
        <div class="label">日の出・日の入り</div>
        <div class="value" id="sun">
            取得中...
        </div>
    </div>

    <div class="grid">

        <div class="card">
            <div class="label">風速</div>
            <div class="value" id="wind">-</div>
        </div>

        <div class="card">
            <div class="label">湿度</div>
            <div class="value" id="humidity">-</div>
        </div>

        <div class="card">
            <div class="label">波高</div>
            <div class="value" id="wave">-</div>
        </div>

        <div class="card">
            <div class="label">気圧</div>
            <div class="value" id="pressure">-</div>
        </div>

        <div class="card">
            <div class="label">月の満ち欠け</div>
            <div class="value" id="moon">-</div>
        </div>

    </div>

</div>

<script>

function updateClock(){
    const now = new Date();

    document.getElementById("clock").innerText =
        now.toLocaleTimeString("ja-JP",{
            hour:'2-digit',
            minute:'2-digit',
            second:'2-digit'
        });
}

setInterval(updateClock,1000);
updateClock();

function moonPhaseName(v){

    const names = [
        "新月",
        "三日月",
        "上弦",
        "十三夜",
        "満月",
        "十六夜",
        "下弦",
        "晦"
    ];

    const index = Math.round(v / 12.5);

    return names[Math.min(index,7)];
}

function weatherCodeToText(code){

    const map = {
        0:"快晴",
        1:"晴れ",
        2:"薄曇り",
        3:"曇り",
        45:"霧",
        48:"霧",
        51:"小雨",
        53:"雨",
        55:"強雨",
        61:"雨",
        63:"雨",
        65:"大雨",
        71:"雪",
        73:"雪",
        75:"大雪",
        80:"にわか雨",
        81:"雨",
        82:"豪雨",
        95:"雷雨"
    };

    return map[code] || "不明";
}

function getDirection(deg){

    const dirs = [
        "↑北",
        "↗北東",
        "→東",
        "↘南東",
        "↓南",
        "↙南西",
        "←西",
        "↖北西"
    ];

    return dirs[Math.round(deg/45)%8];
}

async function updateWeather(lat,lon){

    const url =
`https://api.open-meteo.com/v1/forecast
?latitude=${lat}
&longitude=${lon}
&current=temperature_2m,relative_humidity_2m,surface_pressure,wind_speed_10m,weather_code
&daily=sunrise,sunset,moon_phase
&hourly=wave_height
&timezone=auto`
.replace(/\s/g,'');

    const res = await fetch(url);
    const data = await res.json();

    const temp = Math.round(data.current.temperature_2m);
    const hum = data.current.relative_humidity_2m;
    const wind = data.current.wind_speed_10m;
    const pressure = Math.round(data.current.surface_pressure);
    const weather = weatherCodeToText(data.current.weather_code);

    document.getElementById("weather").innerText =
        `${temp}℃　${weather}`;

    document.getElementById("wind").innerText =
        `${wind} m/s`;

    document.getElementById("humidity").innerText =
        `${hum}%`;

    document.getElementById("pressure").innerText =
        `${pressure} hPa`;

    let wave = "-";

    if(data.hourly && data.hourly.wave_height){
        wave = data.hourly.wave_height[0].toFixed(1) + " m";
    }

    document.getElementById("wave").innerText = wave;

    const sunrise =
        new Date(data.daily.sunrise[0]);

    const sunset =
        new Date(data.daily.sunset[0]);

    const now = new Date();

    const target =
        now < sunset ? sunset : sunrise;

    const azimuth =
        now < sunset ? 247 : 113;

    document.getElementById("sun").innerText =
        `日の出 ${sunrise.toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'})}
         / 日没 ${sunset.toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'})}
         ${getDirection(azimuth)}`;

    if(data.daily.moon_phase){
        document.getElementById("moon").innerText =
            moonPhaseName(
                data.daily.moon_phase[0] * 100
            );
    }
}

function start(){

    navigator.geolocation.getCurrentPosition(

        async pos => {

            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;

            await updateWeather(lat,lon);

            setInterval(()=>{
                updateWeather(lat,lon);
            },300000);

        },

        err => {
            alert(
                "位置情報の取得を許可してください"
            );
        }

    );
}

start();

</script>

</body>
</html>
