<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Ride View</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100vw;height:50vh;overflow:hidden;background:#0a0a0a;color:#fff;font-family:sans-serif;}
#wrap{width:100vw;height:50vh;display:flex;flex-direction:column;gap:2px;padding:2px;}
.row{display:flex;gap:2px;}
.card{background:#1a1a1a;border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3px 5px;flex:1;min-width:0;overflow:hidden;}
.ico{font-size:16px;line-height:1;}
.val{font-size:15px;font-weight:700;line-height:1.2;white-space:nowrap;}
.sm{font-size:10px;color:#999;line-height:1.2;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:100%;}
.cring{width:48px;height:48px;border-radius:50%;border:1.5px solid #444;position:relative;display:flex;align-items:center;justify-content:center;}
.clabel{position:absolute;font-size:8px;font-weight:700;}
.cl-n{top:0px;left:50%;transform:translateX(-50%);color:#f44;}
.cl-s{bottom:0px;left:50%;transform:translateX(-50%);}
.cl-e{right:1px;top:50%;transform:translateY(-50%);}
.cl-w{left:1px;top:50%;transform:translateY(-50%);}
#cn{position:absolute;top:50%;left:50%;width:2px;height:17px;margin:-17px -1px 0;background:#f44;border-radius:1px 1px 0 0;transform-origin:bottom center;}
#cs{position:absolute;top:50%;left:50%;width:2px;height:17px;margin:0 -1px;background:#666;border-radius:0 0 1px 1px;transform-origin:top center;}
.cdot{position:absolute;width:4px;height:4px;border-radius:50%;background:#fff;top:50%;left:50%;margin:-2px 0 0 -2px;}
.poi-wrap{width:100%;display:flex;flex-direction:column;gap:0px;}
.poi-item{display:flex;align-items:flex-start;gap:3px;width:100%;border-bottom:1px solid #2a2a2a;padding:1px 0;}
.poi-item:last-child{border-bottom:none;}
.pio{font-size:13px;flex-shrink:0;margin-top:1px;}
.ptxt{flex:1;min-width:0;}
.pname{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pdist{font-size:10px;color:#aaa;white-space:nowrap;}
.addr{font-size:11px;font-weight:600;text-align:center;width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
#tmr{position:fixed;bottom:1px;right:3px;font-size:9px;color:#333;}
.spd{font-size:24px;font-weight:700;line-height:1;}
.spdunit{font-size:10px;color:#aaa;}
</style>
</head>
<body>
<div id="wrap">

  <!-- Row1: 天気 / 日の出日没 / コンパス / 標高 -->
  <div class="row" style="flex:2.2;">
    <!-- 天気 -->
    <div class="card" style="flex:1.1;">
      <div class="ico" id="wico">🌡️</div>
      <div class="val" id="wtemp">--°</div>
      <div class="sm" id="wdesc">--</div>
      <div class="sm" id="wrain">💧--%</div>
    </div>
    <!-- 日の出日没 -->
    <div class="card" style="flex:1.4;">
      <div style="display:flex;gap:6px;justify-content:center;">
        <div style="text-align:center;">
          <div class="ico">🌅</div>
          <div class="val" id="sr">--:--</div>
          <div class="sm">東</div>
        </div>
        <div style="text-align:center;">
          <div class="ico">🌇</div>
          <div class="val" id="ss">--:--</div>
          <div class="sm">西</div>
        </div>
      </div>
    </div>
    <!-- コンパス -->
    <div class="card" style="flex:1;">
      <div class="cring">
        <span class="clabel cl-n">N</span>
        <span class="clabel cl-s">S</span>
        <span class="clabel cl-e">E</span>
        <span class="clabel cl-w">W</span>
        <div id="cn"></div>
        <div id="cs"></div>
        <div class="cdot"></div>
      </div>
      <div class="sm" id="hdg">--</div>
    </div>
    <!-- 標高 -->
    <div class="card" style="flex:0.9;">
      <div class="ico">⛰️</div>
      <div class="val" id="elev">--m</div>
      <div class="sm" id="ll">--</div>
    </div>
  </div>

  <!-- Row2: 住所 / 速度 / GPS精度 -->
  <div class="row" style="flex:1.4;">
    <div class="card" style="flex:2.5;flex-direction:row;gap:4px;">
      <span style="font-size:14px;flex-shrink:0;">📍</span>
      <div class="addr" id="addr">取得中...</div>
    </div>
    <div class="card" style="flex:1;">
      <div class="spd" id="spd">0</div>
      <div class="spdunit">km/h</div>
    </div>
    <div class="card" style="flex:0.85;">
      <div class="ico">📡</div>
      <div class="val" id="acc">--</div>
      <div class="sm">m精度</div>
    </div>
  </div>

  <!-- Row3: POI -->
  <div class="row" style="flex:3;">
    <div class="card">
      <div class="poi-wrap" id="st-list"><div class="sm">🚉 取得中...</div></div>
    </div>
    <div class="card">
      <div class="poi-wrap" id="wc-list"><div class="sm">🚻 取得中...</div></div>
    </div>
    <div class="card">
      <div class="poi-wrap" id="gs-list"><div class="sm">⛽ 取得中...</div></div>
    </div>
  </div>

</div>
<div id="tmr">🔄3s</div>

<script>
const WMO={0:'☀️',1:'🌤️',2:'⛅',3:'☁️',45:'🌫️',48:'🌫️',51:'🌦️',53:'🌧️',55:'🌧️',61:'🌦️',63:'🌧️',65:'🌧️',71:'🌨️',73:'❄️',75:'❄️',80:'🌦️',81:'🌧️',82:'⛈️',95:'⛈️',96:'⛈️',99:'⛈️'};
const D16=['北','北北東','北東','東北東','東','東南東','南東','南南東','南','南南西','南西','西南西','西','西北西','北西','北北西'];
let lat=null,lon=null,tick=3,weatherCache=null,poiCache={st:null,wc:null,gs:null};
let lastWeather=0,lastPOI=0;

const r2d=r=>r*180/Math.PI,d2r=d=>d*Math.PI/180;
function brng(a,b,c,e){const dl=d2r(e-b),y=Math.sin(dl)*Math.cos(d2r(c)),x=Math.cos(d2r(a))*Math.sin(d2r(c))-Math.sin(d2r(a))*Math.cos(d2r(c))*Math.cos(dl);return(r2d(Math.atan2(y,x))+360)%360;}
function dst(a,b,c,e){const R=6371e3,s=Math.sin(d2r((c-a)/2))**2+Math.cos(d2r(a))*Math.cos(d2r(c))*Math.sin(d2r((e-b)/2))**2;return R*2*Math.atan2(Math.sqrt(s),Math.sqrt(1-s));}
function dl(b){return D16[Math.round(b/22.5)%16];}
function fd(m){return m<1000?Math.round(m)+'m':(m/1000).toFixed(1)+'km';}
function fdd(la2,lo2){return fd(dst(lat,lon,la2,lo2))+' '+dl(brng(lat,lon,la2,lo2));}

async function fetchWeather(){
  if(!lat||!lon)return;
  try{
    const w=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weathercode,precipitation_probability&daily=sunrise,sunset&hourly=precipitation_probability&timezone=Asia%2FTokyo&forecast_days=1`).then(r=>r.json());
    document.getElementById('wico').textContent=WMO[w.current.weathercode]||'🌡️';
    document.getElementById('wtemp').textContent=Math.round(w.current.temperature_2m)+'°';
    document.getElementById('wrain').textContent='💧'+(w.current.precipitation_probability??'--')+'%';
    document.getElementById('sr').textContent=w.daily.sunrise[0].slice(11,16);
    document.getElementById('ss').textContent=w.daily.sunset[0].slice(11,16);
    // elevation via open-meteo elevation API
    const e=await fetch(`https://api.open-meteo.com/v1/elevation?latitude=${lat}&longitude=${lon}`).then(r=>r.json());
    document.getElementById('elev').textContent=Math.round(e.elevation[0])+'m';
    document.getElementById('ll').textContent=lat.toFixed(3)+'/'+lon.toFixed(3);
  }catch(e){}
}

async function fetchAddr(){
  if(!lat||!lon)return;
  try{
    const loc=await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&accept-language=ja`).then(r=>r.json());
    const a=loc.address;
    const pc=a.postcode?'〒'+a.postcode+' ':'';
    const nm=pc+[a.state||'',a.city||a.town||a.village||'',a.suburb||a.neighbourhood||'',a.road||''].filter(Boolean).join('');
    document.getElementById('addr').textContent=nm||loc.display_name.split(',').slice(0,2).join('');
  }catch(e){}
}

async function fetchPOI(filter,listId,ico){
  const q=`[out:json][timeout:12];(${filter});out center 20;`;
  try{
    const d=await fetch('https://overpass-api.de/api/interpreter',{method:'POST',body:'data='+encodeURIComponent(q)}).then(r=>r.json());
    if(!d.elements?.length){document.getElementById(listId).innerHTML=`<div class="sm">${ico} なし</div>`;return;}
    const items=[];
    for(const el of d.elements){
      const la=el.lat||el.center?.lat,lo=el.lon||el.center?.lon;
      if(!la||!lo)continue;
      items.push({la,lo,name:el.tags?.name||'(名称なし)',d:dst(lat,lon,la,lo),b:brng(lat,lon,la,lo)});
    }
    items.sort((a,b)=>a.d-b.d);
    document.getElementById(listId).innerHTML=items.slice(0,3).map(it=>
      `<div class="poi-item"><span class="pio">${ico}</span><div class="ptxt"><div class="pname">${it.name}</div><div class="pdist">${fd(it.d)} ${dl(it.b)}</div></div></div>`
    ).join('');
  }catch(e){document.getElementById(listId).innerHTML=`<div class="sm">エラー</div>`;}
}

async function updateAll(){
  if(!lat||!lon)return;
  const now=Date.now();
  // 天気・住所は30秒ごとで十分
  if(now-lastWeather>30000){
    lastWeather=now;
    fetchWeather();
    fetchAddr();
  }
  // POIは60秒ごと
  if(now-lastPOI>60000){
    lastPOI=now;
    fetchPOI('node["railway"="station"];node["railway"="halt"];','st-list','🚉');
    fetchPOI('node["amenity"="toilets"];way["amenity"="toilets"];','wc-list','🚻');
    fetchPOI('node["amenity"="fuel"];way["amenity"="fuel"];','gs-list','⛽');
  }
}

// GPS
navigator.geolocation.watchPosition(p=>{
  const prev_lat=lat,prev_lon=lon;
  lat=p.coords.latitude;
  lon=p.coords.longitude;
  // 速度
  const spd=p.coords.speed!=null?Math.round(p.coords.speed*3.6):0;
  document.getElementById('spd').textContent=spd;
  // GPS精度
  document.getElementById('acc').textContent=Math.round(p.coords.accuracy);
  // 初回のみ即時更新
  if(!prev_lat){lastWeather=0;lastPOI=0;}
  updateAll();
},{enableHighAccuracy:true,maximumAge:2000,timeout:10000},err=>{
  document.getElementById('addr').textContent='📡 位置情報エラー';
});

// コンパス (Android: deviceorientationabsolute)
function onO(e){
  let h=e.webkitCompassHeading!=null?e.webkitCompassHeading:(360-(e.alpha||0))%360;
  document.getElementById('cn').style.transform=`rotate(${h}deg)`;
  document.getElementById('cs').style.transform=`rotate(${h}deg)`;
  document.getElementById('hdg').textContent=dl(h)+' '+Math.round(h)+'°';
}
window.addEventListener('deviceorientationabsolute',onO,true);
window.addEventListener('deviceorientation',onO,true);

// 3秒タイマー（表示更新カウントダウン）
setInterval(()=>{
  tick--;
  document.getElementById('tmr').textContent='🔄'+tick+'s';
  if(tick<=0){tick=3;updateAll();}
},1000);
</script>
</body>
</html>
