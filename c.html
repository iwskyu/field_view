<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>便利view</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:50vh;overflow:hidden;background:#111;color:#fff;font-family:sans-serif;}
#app{width:100%;height:50vh;display:grid;grid-template-rows:auto 1fr;padding:4px;gap:3px;}
.row{display:flex;gap:3px;}
.card{background:#1e1e1e;border-radius:8px;padding:4px 6px;display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;}
.em{font-size:22px;line-height:1.1;}
.val{font-size:16px;font-weight:700;line-height:1.2;}
.sub{font-size:11px;color:#aaa;line-height:1.2;text-align:center;}
.compass-wrap{position:relative;width:54px;height:54px;}
.compass-ring{width:54px;height:54px;border-radius:50%;border:2px solid #444;position:relative;display:flex;align-items:center;justify-content:center;}
.compass-dirs{position:absolute;width:100%;height:100%;top:0;left:0;}
.cd{position:absolute;font-size:9px;font-weight:700;}
.cd-n{top:1px;left:50%;transform:translateX(-50%);color:#f44;}
.cd-s{bottom:1px;left:50%;transform:translateX(-50%);}
.cd-e{right:2px;top:50%;transform:translateY(-50%);}
.cd-w{left:2px;top:50%;transform:translateY(-50%);}
#ndl{position:absolute;top:50%;left:50%;width:3px;height:22px;margin-left:-1.5px;margin-top:-22px;background:#f44;border-radius:2px 2px 0 0;transform-origin:bottom center;}
#ndls{position:absolute;top:50%;left:50%;width:3px;height:22px;margin-left:-1.5px;background:#888;border-radius:0 0 2px 2px;transform-origin:top center;}
.dot{position:absolute;top:50%;left:50%;width:5px;height:5px;margin:-2.5px 0 0 -2.5px;background:#fff;border-radius:50%;}
.addr{font-size:12px;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;color:#ddd;}
.poi-row{display:flex;align-items:center;gap:4px;width:100%;}
.poi-em{font-size:18px;}
.poi-info{font-size:12px;line-height:1.3;flex:1;overflow:hidden;}
.poi-name{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:700;}
.poi-dist{color:#aaa;}
#timer{position:fixed;bottom:2px;right:4px;font-size:10px;color:#555;}
</style>
</head>
<body>
<div id="app">
  <div class="row" style="height:56px;">
    <div class="card" id="c-weather">
      <div class="em" id="w-icon">🌡</div>
      <div class="val" id="w-temp">--°</div>
      <div class="sub" id="w-desc">--</div>
    </div>
    <div class="card" id="c-sun">
      <div style="display:flex;gap:6px;align-items:center;">
        <div style="text-align:center;">
          <div class="em">🌅</div>
          <div class="val" id="sunrise">--:--</div>
          <div class="sub" id="sr-dir">--</div>
        </div>
        <div style="text-align:center;">
          <div class="em">🌇</div>
          <div class="val" id="sunset">--:--</div>
          <div class="sub" id="ss-dir">--</div>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="compass-ring">
        <div class="compass-dirs">
          <span class="cd cd-n">N</span>
          <span class="cd cd-s">S</span>
          <span class="cd cd-e">E</span>
          <span class="cd cd-w">W</span>
        </div>
        <div id="ndl"></div>
        <div id="ndls"></div>
        <div class="dot"></div>
      </div>
      <div class="sub" id="hdg-text">--</div>
    </div>
    <div class="card">
      <div class="em">⛰</div>
      <div class="val" id="elev">--m</div>
      <div class="sub" id="coords">--</div>
    </div>
  </div>
  <div class="row" style="flex:1;">
    <div class="card" style="flex:1.2;">
      <div class="em">📍</div>
      <div class="addr" id="addr">--</div>
    </div>
  </div>
  <div class="row" style="flex:1;">
    <div class="card">
      <div class="poi-row">
        <div class="poi-em">🚉</div>
        <div class="poi-info">
          <div class="poi-name" id="st-name">--</div>
          <div class="poi-dist" id="st-dist">--</div>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="poi-row">
        <div class="poi-em">🚻</div>
        <div class="poi-info">
          <div class="poi-name" id="wc-name">--</div>
          <div class="poi-dist" id="wc-dist">--</div>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="poi-row">
        <div class="poi-em">⛽</div>
        <div class="poi-info">
          <div class="poi-name" id="gs-name">--</div>
          <div class="poi-dist" id="gs-dist">--</div>
        </div>
      </div>
    </div>
  </div>
</div>
<div id="timer">🔄 10s</div>

<script>
const WMO={0:'☀️',1:'🌤',2:'⛅',3:'☁️',45:'🌫',48:'🌫',51:'🌦',53:'🌧',55:'🌧',61:'🌦',63:'🌧',65:'🌧⬇',71:'🌨',73:'❄️',75:'❄️⬇',80:'🌦',81:'🌧',82:'⛈',95:'⛈',96:'⛈',99:'⛈'};
const DIRS=['北','北北東','北東','東北東','東','東南東','南東','南南東','南','南南西','南西','西南西','西','西北西','北西','北北西'];
let lat=null,lon=null,countdown=10;

function d2r(d){return d*Math.PI/180;}
function r2d(r){return r*180/Math.PI;}
function bearing(la1,lo1,la2,lo2){
  const dL=d2r(lo2-lo1);
  const y=Math.sin(dL)*Math.cos(d2r(la2));
  const x=Math.cos(d2r(la1))*Math.sin(d2r(la2))-Math.sin(d2r(la1))*Math.cos(d2r(la2))*Math.cos(dL);
  return(r2d(Math.atan2(y,x))+360)%360;
}
function dist(la1,lo1,la2,lo2){
  const R=6371e3;
  const a=Math.sin(d2r((la2-la1)/2))**2+Math.cos(d2r(la1))*Math.cos(d2r(la2))*Math.sin(d2r((lo2-lo1)/2))**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function dirLabel(b){return DIRS[Math.round(b/22.5)%16];}
function fmtDist(m){return m<1000?Math.round(m)+'m':(m/1000).toFixed(1)+'km';}
function fmtDistDir(la2,lo2){
  const d=dist(lat,lon,la2,lo2);
  const b=bearing(lat,lon,la2,lo2);
  return fmtDist(d)+' '+dirLabel(b);
}

async function fetchAll(){
  if(!lat||!lon)return;
  try{
    const[wr,er,lr]=await Promise.all([
      fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weathercode&daily=sunrise,sunset&timezone=Asia%2FTokyo&forecast_days=1`).then(r=>r.json()),
      fetch(`https://api.open-meteo.com/v1/elevation?latitude=${lat}&longitude=${lon}`).then(r=>r.json()),
      fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&accept-language=ja`).then(r=>r.json())
    ]);
    document.getElementById('w-icon').textContent=WMO[wr.current.weathercode]||'🌡';
    document.getElementById('w-temp').textContent=Math.round(wr.current.temperature_2m)+'°';
    const sr=wr.daily.sunrise[0].slice(11,16);
    const ss=wr.daily.sunset[0].slice(11,16);
    document.getElementById('sunrise').textContent=sr;
    document.getElementById('sunset').textContent=ss;
    document.getElementById('sr-dir').textContent='東寄り';
    document.getElementById('ss-dir').textContent='西寄り';
    document.getElementById('elev').textContent=Math.round(er.elevation[0])+'m';
    document.getElementById('coords').textContent=lat.toFixed(3)+','+lon.toFixed(3);
    const a=lr.address;
    const name=[a.city||a.town||a.village||'',a.suburb||a.neighbourhood||'',a.road||''].filter(Boolean).join(' ');
    document.getElementById('addr').textContent=name||lr.display_name.split(',').slice(0,2).join(' ');
  }catch(e){}
  fetchPOI('node["railway"="station"];node["railway"="halt"];','st-name','st-dist');
  fetchPOI('node["amenity"="toilets"];way["amenity"="toilets"];','wc-name','wc-dist');
  fetchPOI('node["amenity"="fuel"];way["amenity"="fuel"];','gs-name','gs-dist');
}

async function fetchPOI(filter,nameId,distId){
  const q=`[out:json][timeout:10];(${filter});out center 5;`;
  try{
    const r=await fetch('https://overpass-api.de/api/interpreter',{method:'POST',body:'data='+encodeURIComponent(q)});
    const d=await r.json();
    if(!d.elements||!d.elements.length){document.getElementById(nameId).textContent='なし';return;}
    let best=null,bestD=Infinity;
    for(const el of d.elements){
      const la=el.lat||el.center?.lat,lo=el.lon||el.center?.lon;
      if(!la||!lo)continue;
      const dd=dist(lat,lon,la,lo);
      if(dd<bestD){bestD=dd;best={lat:la,lon:lo,name:el.tags?.name||''};}
    }
    if(best){
      document.getElementById(nameId).textContent=best.name||'(名称なし)';
      document.getElementById(distId).textContent=fmtDistDir(best.lat,best.lon);
    }
  }catch(e){document.getElementById(distId).textContent='エラー';}
}

function startGeo(){
  navigator.geolocation.watchPosition(p=>{
    lat=p.coords.latitude;lon=p.coords.longitude;
    fetchAll();
  },{},{ enableHighAccuracy:true,maximumAge:8000});
}

function startCompass(){
  const add=()=>{
    window.addEventListener('deviceorientationabsolute',onO,true);
    window.addEventListener('deviceorientation',onO,true);
  };
  if(typeof DeviceOrientationEvent?.requestPermission==='function'){
    DeviceOrientationEvent.requestPermission().then(s=>{if(s==='granted')add();}).catch(()=>{});
  } else add();
}

function onO(e){
  let h=e.webkitCompassHeading!=null?e.webkitCompassHeading:(360-e.alpha)%360;
  document.getElementById('ndl').style.transform=`rotate(${h}deg)`;
  document.getElementById('ndls').style.transform=`rotate(${h}deg)`;
  document.getElementById('hdg-text').textContent=dirLabel(h)+' '+Math.round(h)+'°';
}

setInterval(()=>{
  countdown--;
  document.getElementById('timer').textContent='🔄 '+countdown+'s';
  if(countdown<=0){countdown=10;fetchAll();}
},1000);

startGeo();
startCompass();
</script>
</body>
</html>
