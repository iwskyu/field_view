*, *::before, *::after { box-sizing: border-box; }
body {
    margin: 0; padding: 8px;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    background: linear-gradient(135deg, #0000cd, #cc7a00, #4a0080, #0000cd);
    background-size: 600% 600%;
    animation: deepSkyTransition 40s ease infinite;
    color: #ffffff; font-weight: bold; overflow-x: hidden;
}
@keyframes deepSkyTransition {
    0% { background-position: 0% 50%; }
    33% { background-position: 50% 50%; }
    66% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}
#overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: #020111; z-index: 9999;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    padding: 20px; text-align: center;
}
#start-btn {
    padding: 28px 56px; font-size: 34px; font-weight: bold;
    color: white; background: linear-gradient(45deg, #e11d48, #2563eb);
    border: none; border-radius: 16px; cursor: pointer;
    box-shadow: 0 6px 25px rgba(37, 99, 235, 0.5);
    margin-bottom: 20px;
}
#overlay-notice { font-size: 16px; color: #cbd5e1; font-weight: bold; }
header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 4px; margin-bottom: 12px;
    border-bottom: 1px solid rgba(255,255,255,0.2);
}
h1 { font-size: 24px; margin: 0; color: #fff; text-shadow: 1px 1px 4px rgba(0,0,0,0.5); }
#sync-btn {
    padding: 16px 32px; font-size: 22px; font-weight: bold;
    background: rgba(0,0,0,0.4); border: 2px solid #fff;
    color: #fff; border-radius: 12px; cursor: pointer;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
}
.grid-container {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 6px; width: 100%; margin-bottom: 18px;
}
.list-container {
    display: flex; flex-direction: column;
    gap: 6px; width: 100%;
}
.tile {
    border: 1px solid; padding: 3px 6px; border-radius: 4px;
    background: rgba(0,0,0,0.55); display: flex;
    flex-direction: column; justify-content: center;
    overflow: hidden; word-break: break-word;
    overflow-wrap: anywhere;
    transition: border-color 0.4s ease, background-color 0.4s ease;
}
.tile.w-white { border-color: #ffffff; }
.tile.w-blue { border-color: #3b82f6; }
.tile.w-yellow { border-color: #eab308; }
.tile.w-green { border-color: #22c55e; }
.tile.w-emerald { border-color: #10b981; }
.tile.w-navy { border-color: #1e3a8a; }
.tile.w-orange { border-color: #f97316; }
.tile.w-red { border-color: #ef4444; }
.tile.w-brown { border-color: #8b4513; }
.tile.w-gold { border-color: #d97706; }
.tile.w-purple { border-color: #a855f7; }
.tile.w-grey { border-color: #9ca3af; }
.tile.updated {
    border-color: #fde047 !important;
    background-color: rgba(253, 224, 71, 0.3) !important;
}
.tile.updated .tile-label,
.tile.updated .tile-value { color: #fde047 !important; }
.tile-label {
    font-size: 10px; color: rgba(255,255,255,0.85);
    margin-bottom: 1px; font-weight: normal; line-height: 1.2;
}
.tile-value {
    font-size: 22px; color: #fff; font-weight: bold;
    line-height: 1.15; display: block;
}
.tile-value.sub-val { font-size: 15px; margin-top: 1px; }
.grid-container .tile { min-height: 52px; }
.list-container .tile {
    min-height: 44px; flex-direction: row;
    justify-content: space-between; align-items: center;
    padding: 4px 10px;
}
.list-container .tile .tile-label {
    margin-bottom: 0; margin-right: 12px;
    flex-shrink: 0; font-size: 12px;
}
.list-container .tile .tile-value {
    font-size: 20px; text-align: right;
}
</style>

function setVal(id, main, sub){
  const m=document.getElementById("v-"+id);
  const s=document.getElementById("s-"+id);
  const t=document.getElementById("t-"+id);
  let changed=false;
  if(m&&m.innerText!==String(main||"-")){m.innerText=main||"-";changed=true;}
  if(s&&sub!==undefined&&s.innerText!==String(sub||"-")){s.innerText=sub||"-";changed=true;}
  if(changed&&t){t.classList.add("updated");setTimeout(()=>t.classList.remove("updated"),1500);}
}

function arrowTo(targetLat,targetLon){
  if(lat==null||lon==null)return "↓";
  const lat1=lat*Math.PI/180, lon1=lon*Math.PI/180;
  const lat2=targetLat*Math.PI/180, lon2=targetLon*Math.PI/180;
  const dLon=lon2-lon1;
  const y=Math.sin(dLon)*Math.cos(lat2);
  const x=Math.cos(lat1)*Math.sin(lat2)-Math.sin(lat1)*Math.cos(lat2)*Math.cos(dLon);
  let brng=Math.atan2(y,x)*180/Math.PI;
  brng=(brng+360)%360;
  const rel=(brng-heading+360)%360;
  const arrows=["↓","↙","←","↖","↑","↗","→","↘"];
  return arrows[Math.round(rel/45)%8];
}

function distKm(targetLat,targetLon){
  if(lat==null||lon==null)return null;
  const R=6371;
  const dLat=(targetLat-lat)*Math.PI/180;
  const dLon=(targetLon-lon)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat*Math.PI/180)*Math.cos(targetLat*Math.PI/180)*Math.sin(dLon/2)**2;
  return (R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a))).toFixed(1);
}

function dirName(deg){
  const names=["北","北北東","北東","東北東","東","東南東","南東","南南東","南","南南西","南西","西南西","西","西北西","北西","北北西"];
  return names[Math.round(deg/22.5)%16];
}

function dirArrow(deg){
  const arr=["↓","↙","↙","←","←","↖","↖","↑","↑","↗","↗","→","→","↘","↘","↓"];
  return arr[Math.round(deg/22.5)%16];
}

const SunCalc=(function(global){var SunCalc={};var PI=Math.PI,sin=Math.sin,cos=Math.cos,tan=Math.tan,asin=Math.asin,atan2=Math.atan2;var rad=PI/180,dayMs=1000*60*60*24,J1970=2440588,J2000=2451545;function toJulian(date){return date.valueOf()/dayMs-0.5+J1970}function toDays(date){return toJulian(date)-J2000}function rightAscension(l,b){return atan2(sin(l)*Math.cos(23.4397*rad)-Math.tan(b)*Math.sin(23.4397*rad),Math.cos(l))}function declination(l,b){return asin(Math.sin(b)*Math.cos(23.4397*rad)+Math.cos(b)*Math.sin(23.4397*rad)*Math.sin(l))}function azimuth(H,phi,dec){return atan2(Math.sin(H),Math.cos(H)*Math.sin(phi)-Math.tan(dec)*Math.cos(phi))}function altitude(H,phi,dec){return asin(Math.sin(phi)*Math.sin(dec)+Math.cos(phi)*Math.cos(dec)*Math.cos(H))}function siderealTime(d,lw){return rad*(280.16+360.9856236*d)-lw}function solarMeanAnomaly(d){return rad*(357.5291+0.98560028*d)}function eclipticLongitude(M){var C=rad*(1.9148*Math.sin(M)+0.02*Math.sin(2*M)+0.0003*Math.sin(3*M));return M+C+rad*102.9372+Math.PI}function sunCoords(d){var M=solarMeanAnomaly(d),L=eclipticLongitude(M);return{dec:declination(L,0),ra:rightAscension(L,0)}}var times=[[-0.833,"sunrise","sunset"],[-0.3,"sunriseEnd","sunsetStart"],[-6,"dawn","dusk"],[-12,"nauticalDawn","nauticalDusk"],[-18,"nightEnd","night"],[6,"goldenHourEnd","goldenHour"]];function addHours(date,h){return new Date(date.valueOf()+h*dayMs/24)}function getSetJ(h,lw,phi,dec,n,M,L){var w=Math.sin(h)*Math.sin(phi)-Math.tan(dec)*Math.cos(phi),a=Math.atan2(Math.sin(Math.acos(Math.abs(w)>1?NaN:Math.acos(w))),Math.cos(Math.acos(Math.abs(w)>1?NaN:Math.acos(w)))),Jset=J2000+n+0.0053*Math.sin(M)-0.0069*Math.sin(2*L)+a/(2*Math.PI);return Jset}function getTimes(date,lat,lng){var lw=rad*(-lng),phi=rad*lat,d=toDays(date),n=Math.round(d-0.0009-lw/(2*Math.PI)),Jstar=0.0009+lw/(2*Math.PI)+n,M=solarMeanAnomaly(Jstar),C=rad*(1.9148*Math.sin(M)+0.02*Math.sin(2*M)+0.0003*Math.sin(3*M)),Lsun=M+C+rad*102.9372+Math.PI,Jtransit=Jstar+0.0053*Math.sin(M)-0.0069*Math.sin(2*Lsun),result={};for(var i=0,len=times.length;i<len;i+=1){var time=times[i],Jset=getSetJ(rad*time[0],lw,phi,declination(Lsun,0),n,M,Lsun),Jrise=Jtransit-(Jset-Jtransit);if(!isNaN(Jrise)){result[time[1]]=addHours(date,(Jrise-J2000)*24);result[time[2]]=addHours(date,(Jset-J2000)*24)}}return result}function getPosition(date,lat,lng){var lw=rad*(-lng),phi=rad*lat,d=toDays(date),c=sunCoords(d),H=siderealTime(d,lw)-c.ra;return{azimuth:azimuth(H,phi,c.dec),altitude:altitude(H,phi,c.dec)}}SunCalc.getTimes=getTimes;SunCalc.getPosition=getPosition;if(typeof module!=="undefined"&&module.exports){module.exports=SunCalc}else{global.SunCalc=SunCalc}})(this);

function sunAzimuth(lat,lon,isRise){
  const date=new Date();
  const times=SunCalc.getTimes(date,lat,lon);
  const t=isRise?times.sunrise:times.sunset;
  const pos=SunCalc.getPosition(t,lat,lon);
  return ((pos.azimuth*180/Math.PI)+180)%360;
}

function updateDate(){
  const now=new Date();
  const y=now.getFullYear();
  const m=String(now.getMonth()+1).padStart(2,"0");
  const d=String(now.getDate()).padStart(2,"0");
  const w=["(日)","(月)","(火)","(水)","(木)","(金)","(土)"][now.getDay()];
  setVal("date",`${y}/${m}/${d}`,w);
  setVal("time",`${String(now.getHours()).padStart(2,"0")}:${String(now.getMinutes()).padStart(2,"0")}`);
}

function initSensors(){
  if(window.DeviceOrientationEvent){
    window.addEventListener("deviceorientation",e=>{
      if(e.beta!=null){
        const tilt=Math.round(Math.abs(e.beta)+Math.abs(e.gamma||0));
        setVal("tilt",tilt+"°");
      }
      let h=e.webkitCompassHeading||e.alpha;
      if(h!=null&&h!==undefined){
        heading=h;
        setVal("direction",`${dirArrow(h)}${dirName(h)} ${Math.round(h)}°`);
      }
    },true);
  }
  if(window.DeviceMotionEvent){
    window.addEventListener("devicemotion",e=>{
      if(e.accelerationIncludingGravity){
        const a=Math.sqrt(e.accelerationIncludingGravity.x**2+e.accelerationIncludingGravity.y**2+e.accelerationIncludingGravity.z**2);
        setVal("accel",Math.round(a*3.6)+" km/h");
      }
    },true);
  }
}

    const stream=await navigator.mediaDevices.getUserMedia({audio:true,video:false});
    audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    analyser=audioCtx.createAnalyser();
    audioCtx.createMediaStreamSource(stream).connect(analyser);
    analyser.fftSize=256;
    const data=new Uint8Array(analyser.frequencyBinCount);
    setInterval(()=>{
      analyser.getByteFrequencyData(data);
      let sum=0;for(let i=0;i<data.length;i++)sum+=data[i];
      const db=Math.round((sum/data.length)+35);
      const txt=db>70?"騒がしい":db>50?"普通":"静か";
      setVal("noise",db+"dB："+txt);
    },3000);
  }catch(e){setVal("noise","-");}
}

function findPref(){

  let best=null,bd=Infinity;
  prefData.forEach(p=>{

    if(d&&parseFloat(d)<bd){bd=parseFloat(d);best=p;}
  });
  if(best){
    setVal("pref",best.name,arrowTo(best.lat,best.lon)+distKm(best.lat,best.lon)+"km");
  }
}

function calcMoon(){
  const now=new Date();
  const synodic=29.53058867;
  const known=new Date(2000,0,6,18,14,0);
  const diff=(now-known)/86400000;
  const age=diff%synodic;
  const phase=age<1?"新月":age<7?"弦の月":age<14?"上弦":age<16?"満月":age<22?"下弦":age<28?"弦の月":"新月";
  setVal("moon",phase,age.toFixed(1)+"日");
}

function calcTides(){
  if(!lat||!lon)return;
  const now=new Date();
  const base=now.getTime();
  const period=12.42*3600000;
  const offset=((base/period)%1)*period;
  const high=new Date(base-offset+period);
  const low=new Date(base-offset+period/2);
  setVal("tidehigh",String(high.getHours()).padStart(2,"0")+":"+String(high.getMinutes()).padStart(2,"0"));
  setVal("tidelow",String(low.getHours()).padStart(2,"0")+":"+String(low.getMinutes()).padStart(2,"0"));
}

function calcSun(){
  if(!lat||!lon)return;
  const now=new Date();
  const pos=SunCalc.getPosition(now,lat,lon);
  const az=((pos.azimuth*180/Math.PI)+180)%360;
  const al=pos.altitude*180/Math.PI;
  setVal("sun",al>0?"🌞 太陽 "+dirArrow(az)+dirName(az):"🌙 太陽は地平線下");

  setVal("constellation",constellations[idx]+" "+dirArrow(az)+" 距離光年");
}

      const a=list[0];
      const size=(a.estimated_diameter?.meters?.estimated_diameter_max||"-");
      const dist=(a.close_approach_data[0]?.miss_distance?.kilometers||"-");
      setVal("asteroid",(typeof size==="number"?size.toFixed(1):size)+"m",(typeof dist==="number"?parseFloat(dist).toFixed(0):dist)+"km");
    }else{setVal("asteroid","-","-");}
  }catch(e){setVal("asteroid","-","-");}
}

async function fetchSatellite(){
  if(!lat||!lon)return;
  try{
    const r=await fetch(`https://api.n2yo.com/rest/v1/satellite/above/${lat}/${lon}/0/90/0/&apiKey=demo`);
    const d=await r.json();
    if(d&&d.above&&d.above.length>0){
      const s=d.above[0];
      setVal("satellite",s.satname+" "+s.intDesignator+" "+s.launchDate);
    }else{setVal("satellite","-");}
  }catch(e){setVal("satellite","-");}
}

async function fetchGold(){

async function fetchMichi(){
  if(!lat||!lon)return;
  try{
    const q=`[out:json][timeout:15];(node["amenity"="rest_area"]["name"~"道の駅"](around:15000,${lat},${lon});node["highway"="rest_area"]["name"~"道の駅"](around:15000,${lat},${lon}););out body;`;
    const r=await fetch("https://overpass-api.de/api/interpreter",{method:"POST",headers:{"Content-Type":"application/x-www-form-urlencoded"},body:"data="+encodeURIComponent(q)});
    const d=await r.json();
    const nodes=(d.elements||[]).filter(e=>e.type==="node"&&e.tags).sort((a,b)=>{
      const da=distKm(a.lat,a.lon);const db=distKm(b.lat,b.lon);
      return (parseFloat(da)||Infinity)-(parseFloat(db)||Infinity);
    });
    setVal("michi1",nodes[0]?(nodes[0].tags.name||"道の駅")+" "+distKm(nodes[0].lat,nodes[0].lon)+"km "+arrowTo(nodes[0].lat,nodes[0].lon):"-");
    setVal("michi2",nodes[1]?(nodes[1].tags.name||"道の駅")+" "+distKm(nodes[1].lat,nodes[1].lon)+"km "+arrowTo(nodes[1].lat,nodes[1].lon):"-");
  }catch(e){setVal("michi1","-");setVal("michi2","-");}
}

function triggerSync(){
  updateDate();
  if(lat&&lon)runAll();
  gridItems.concat(listItems).forEach(it=>{
    const t=document.getElementById("t-"+it.id);
    if(t){t.classList.add("updated");setTimeout(()=>t.classList.remove("updated"),1500);}
  });
}

function startApp(){
  document.getElementById("overlay").style.display="none";
  updateDate();
  initSensors();
  initAudio();
  initGPS();
  setInterval(updateDate,1000);
  setInterval(()=>{if(lat&&lon)fetchMeteo();},900000);
  setInterval(()=>{if(lat&&lon)runAll();},600000);
  setInterval(calcMoon,3600000);
  const waitForGPS=setInterval(()=>{
    if(lat&&lon){
      fetchMeteo();
      runAll();
      clearInterval(waitForGPS);
    }
  },1000);
}
