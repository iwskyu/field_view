<style>
:root {
  --white: #ffffff;
  --blue: #1a3a6b;
  --yellow: #f0c040;
  --green: #1a6b3a;
  --emerald: #0d7a5f;
  --navy: #0d1f4c;
  --orange: #b35a10;
  --red: #7a1a1a;
  --brown: #5a3010;
  --gold: #7a6010;
  --gray: #404040;
  --purple: #4a1a6b;
  --border: 1px solid rgba(255,255,255,0.35);
  --update-flash: #f0c040;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Sans JP', 'Hiragino Sans', 'Meiryo', sans-serif;
  background: #0a1628;
  color: #fff;
  min-height: 100vh;
  overflow-x: hidden;
}

/* アニメ背景 */
@keyframes bgShift {
  0%   { background-position: 0% 50%; }
  33%  { background-position: 50% 100%; }
  66%  { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}
body {
  background: linear-gradient(135deg,
    #0a1a4a 0%,
    #4a2800 25%,
    #2a0a4a 50%,
    #0a1a4a 75%,
    #4a2800 100%
  );
  background-size: 400% 400%;
  animation: bgShift 12s ease infinite;
}

/* ===== オーバーレイ ===== */
#overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,10,0.92);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 9999;
  backdrop-filter: blur(4px);
}
#overlay h1 {
  font-size: 2.4rem; font-weight: 900;
  color: #fff; margin-bottom: 0.4rem;
  text-shadow: 0 0 20px #60aaff;
}
#overlay p.sub {
  font-size: 1rem; color: #aac0e0;
  margin-bottom: 2.2rem;
}
#startBtn {
  padding: 1.1rem 3.2rem;
  font-size: 1.5rem; font-weight: 900;
  background: linear-gradient(135deg, #1a60cc, #0a40aa);
  color: #fff; border: none; border-radius: 12px;
  cursor: pointer; box-shadow: 0 4px 24px #1a60cc88;
  transition: transform 0.1s, box-shadow 0.1s;
}
#startBtn:active { transform: scale(0.96); }
#overlay .notice {
  margin-top: 1.2rem; font-size: 0.85rem;
  color: #88a0c0; text-align: center;
}

/* ===== ヘッダー ===== */
#header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 6px 10px;
  background: rgba(0,0,0,0.4);
  position: sticky; top: 0; z-index: 100;
  border-bottom: 1px solid rgba(255,255,255,0.15);
}
#header h2 { font-size: 1rem; color: #aac8ff; font-weight: 700; }
#reloadBtn {
  padding: 6px 14px; font-size: 1rem; font-weight: 900;
  background: linear-gradient(135deg,#cc4400,#aa2200);
  color: #fff; border: none; border-radius: 8px;
  cursor: pointer; white-space: nowrap;
  box-shadow: 0 2px 10px #cc440055;
}
#reloadBtn:active { transform: scale(0.95); }

/* ===== メインコンテンツ ===== */
#main { padding: 6px 4px 80px; }

/* ===== タイルグリッド ===== */
.tile-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 4px;
  margin-bottom: 4px;
}

/* ===== タイル共通 ===== */
.tile {
  border-radius: 7px;
  border: var(--border);
  padding: 5px 6px;
  min-height: 56px;
  display: flex; flex-direction: column;
  justify-content: center;
  transition: border-color 0.3s, background-color 0.3s;
  overflow: hidden;
  position: relative;
}
.tile.updated {
  border-color: var(--update-flash) !important;
  background-color: rgba(240,192,64,0.18) !important;
}

/* 枠色別 */
.tile-white  { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.5); }
.tile-blue   { background: rgba(26,58,107,0.55);   border-color: rgba(80,140,255,0.6); }
.tile-yellow { background: rgba(80,60,0,0.55);     border-color: rgba(240,192,64,0.65); }
.tile-green  { background: rgba(10,60,30,0.55);    border-color: rgba(40,180,100,0.6); }
.tile-emerald{ background: rgba(0,60,50,0.55);     border-color: rgba(0,200,160,0.6); }
.tile-navy   { background: rgba(5,10,40,0.65);     border-color: rgba(60,80,200,0.6); }
.tile-orange { background: rgba(70,30,0,0.55);     border-color: rgba(220,120,20,0.65); }
.tile-red    { background: rgba(60,0,0,0.55);      border-color: rgba(220,60,60,0.6); }
.tile-brown  { background: rgba(50,20,0,0.55);     border-color: rgba(180,100,40,0.6); }
.tile-gold   { background: rgba(50,40,0,0.55);     border-color: rgba(220,180,40,0.6); }
.tile-gray   { background: rgba(20,20,20,0.55);    border-color: rgba(140,140,140,0.6); }
.tile-purple { background: rgba(40,0,60,0.55);     border-color: rgba(160,60,220,0.6); }

/* ===== タイルテキスト ===== */
.tile .label {
  font-size: 0.6rem; font-weight: 700;
  color: rgba(255,255,255,0.7);
  line-height: 1.1; white-space: nowrap;
  overflow: hidden; text-overflow: clip;
}
.tile .value {
  font-size: 1.05rem; font-weight: 900;
  color: #fff; line-height: 1.2;
  word-break: break-all;
}
.tile .value.large { font-size: 1.25rem; }
.tile .value.small { font-size: 0.85rem; }
.tile .value .dir { font-size: 1.1em; }

/* ===== リストセクション ===== */
.list-section {
  display: flex; flex-wrap: nowrap;
  gap: 4px; overflow-x: auto;
  padding-bottom: 2px;
  margin-bottom: 4px;
  scrollbar-width: thin;
  scrollbar-color: rgba(255,255,255,0.3) transparent;
}
.list-section::-webkit-scrollbar { height: 3px; }
.list-section::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.3); border-radius: 3px; }

.list-tile {
  flex: 0 0 auto;
  min-width: 180px; max-width: 260px;
  border-radius: 7px;
  border: var(--border);
  padding: 5px 8px;
  display: flex; flex-direction: column;
  justify-content: center;
  transition: border-color 0.3s, background-color 0.3s;
}
.list-tile.updated {
  border-color: var(--update-flash) !important;
  background-color: rgba(240,192,64,0.18) !important;

.list-tile .label { font-size: 0.58rem; font-weight: 700; color: rgba(255,255,255,0.7); }
.list-tile .value { font-size: 0.85rem; font-weight: 900; color: #fff; line-height: 1.3; word-break: break-all; }

/* セクション区切りラベル */
.section-sep {
  font-size: 0.62rem; color: rgba(255,255,255,0.4);
  padding: 4px 4px 2px;
  letter-spacing: 0.05em;
}

@keyframes spin { to { transform: rotate(360deg); } }
.spinning { display: inline-block; animation: spin 1s linear infinite; }

// ===== ユーティリティ =====
function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = (lat2-lat1)*Math.PI/180;
  const dLon = (lon2-lon1)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function bearingTo(lat1, lon1, lat2, lon2) {
  const dLon = (lon2-lon1)*Math.PI/180;
  const y = Math.sin(dLon)*Math.cos(lat2*Math.PI/180);
  const x = Math.cos(lat1*Math.PI/180)*Math.sin(lat2*Math.PI/180)
           - Math.sin(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.cos(dLon);
  return (Math.atan2(y,x)*180/Math.PI+360)%360;
}

function bearingName(deg) {
  const names = ['北','北北東','北東','東北東','東','東南東','南東','南南東','南','南南西','南西','西南西','西','北西','北北西','西北西'];
  // 16方位
  const dirs16 = ['北','北北東','北東','東北東','東','東南東','南東','南南東','南','南南西','南西','西南西','西','北西','北北西','西北西'];
  const idx = Math.round(deg/22.5) % 16;
  return dirs16[idx];
}

function bearingArrow(absDeg, deviceHeading) {
  // 自分が向いている方向に対する相対方位
  const rel = ((absDeg - deviceHeading) + 360) % 360;
  const arrows = ['↑','↗','→','↘','↓','↙','←','↖'];
  const idx = Math.round(rel / 45) % 8;
  return arrows[idx];
}

  const rel = ((absDeg - heading) + 360) % 360;
  const arrows = ['↑','↗','→','↘','↓','↙','←','↖'];
  return arrows[Math.round(rel/45)%8];
}

  if (age < 24.0)  return '🌗下弦';
  return '🌘有明月';
}

function calcMoonAge() {
  const now = new Date();
  const ref = new Date(2000, 0, 6, 18, 14, 0); // 既知の新月
  const diff = (now - ref) / (1000*60*60*24);
  return ((diff % 29.53) + 29.53) % 29.53;
}

function flashTile(id) {
  const el = document.getElementById(id);
  if (!el) return;
  el.classList.add('updated');
  setTimeout(() => el.classList.remove('updated'), 2500);
}

// ===== タイル生成 =====
function makeTile(id, colorClass, label, valueHtml) {
  return `<div class="tile ${colorClass}" id="${id}">
    <div class="label">${label}</div>
    <div class="value" id="${id}-val">${valueHtml}</div>
  </div>`;
}

function makeListTile(id, colorClass, label, valueHtml) {

}

function updateTile(id, html) {
  const el = document.getElementById(id+'-val');
  if (el) { el.innerHTML = html; flashTile(id); }

// ===== センサー更新（リアルタイム） =====
function startSensors() {
  // 傾き
  window.addEventListener('deviceorientation', e => {
    const tilt = e.beta !== null ? Math.round(Math.abs(e.beta)) : null;
    if (tilt !== null) {
      deviceTilt = tilt;
      updateTile('t-tilt', `${tilt}°`);
    }
    // 方角（alpha: 0=北）
    if (e.alpha !== null) {
      heading = e.alpha;
      const name = bearingName(heading);
      const arrow = degToCompassArrow(0); // 北への矢印
      updateTile('t-compass', `${arrow}${name}<br>${Math.round(heading)}°`);
    }
  });

  // iOS 13+ permission
  if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
    DeviceOrientationEvent.requestPermission().catch(() => {});
  }
}

// ===== GPS =====
function startGPS() {
  document.getElementById('gpsStatus').textContent = '📡 取得中...';
  if (!navigator.geolocation) {
    document.getElementById('gpsStatus').textContent = '❌ GPS非対応';
    return;
  }
  watchId = navigator.geolocation.watchPosition(pos => {
    lat = pos.coords.latitude;
    lon = pos.coords.longitude;
    const acc = pos.coords.accuracy;
    const spd = pos.coords.speed;
    const alt = pos.coords.altitude;

    document.getElementById('gpsStatus').textContent = `📡 ${lat.toFixed(4)},${lon.toFixed(4)}`;

    // GPS精度
    const accLabel = acc < 10 ? '高' : acc < 50 ? '中' : '低';
    updateTile('t-gps-acc', `${Math.round(acc)}m：${accLabel}`);

    // 移動速度
    if (spd !== null) {
      updateTile('t-speed', `${(spd*3.6).toFixed(1)} km/h`);
    }

    // 標高
    if (alt !== null) {
      updateTile('t-altitude', `${Math.round(alt)}m`);
    }

    // 地理計算
    updateGeoTiles();
  }, err => {
    document.getElementById('gpsStatus').textContent = '❌ 取得失敗';
  }, { enableHighAccuracy: true, maximumAge: 5000, timeout: 15000 });
}

function updateGeoTiles() {
  if (!lat || !lon) return;

  // 東京駅
  const dTokyo = haversine(lat, lon, TOKYO_STATION.lat, TOKYO_STATION.lon);
  const bTokyo = bearingTo(lat, lon, TOKYO_STATION.lat, TOKYO_STATION.lon);
  updateTile('t-tokyo', `${degToCompassArrow(bTokyo)}${fmtDist(dTokyo)}<br><small>${bearingName(bTokyo)}</small>`);

  // 富士山
  const dFuji = haversine(lat, lon, FUJI.lat, FUJI.lon);
  const bFuji = bearingTo(lat, lon, FUJI.lat, FUJI.lon);
  updateTile('t-fuji', `${degToCompassArrow(bFuji)}${fmtDist(dFuji)}<br><small>${bearingName(bFuji)}</small>`);

  // 県庁所在地（最寄り）
  let nearPref = null, minD = Infinity;
  PREFECTURES.forEach(p => {
    const d = haversine(lat, lon, p.lat, p.lon);
    if (d < minD) { minD = d; nearPref = p; }
  });
  if (nearPref) {
    const b = bearingTo(lat, lon, nearPref.lat, nearPref.lon);
    updateTile('t-pref', `${nearPref.name}<br>${degToCompassArrow(b)}${fmtDist(minD)}`);
  }

  // 近隣の山
  let nearMt = null, minMD = Infinity;
  MOUNTAINS.forEach(m => {
    const d = haversine(lat, lon, m.lat, m.lon);
    if (d < minMD) { minMD = d; nearMt = m; }
  });
  if (nearMt) {
    const b = bearingTo(lat, lon, nearMt.lat, nearMt.lon);
    updateListTile('l-mountain', `${nearMt.name} 標高${nearMt.alt}m ${degToCompassArrow(b)}${fmtDist(minMD)}`);
  }

  // 観光地
  const sorted = [...TOURIST_SPOTS].map(s => ({
    ...s, d: haversine(lat, lon, s.lat, s.lon),
    b: bearingTo(lat, lon, s.lat, s.lon)
  })).sort((a,b)=>a.d-b.d);
  if (sorted[0]) updateListTile('l-sightseeing1', `${sorted[0].name}<br>${degToCompassArrow(sorted[0].b)}${fmtDist(sorted[0].d)}`);
  if (sorted[1]) updateListTile('l-sightseeing2', `${sorted[1].name}<br>${degToCompassArrow(sorted[1].b)}${fmtDist(sorted[1].d)}`);
}

// ===== 海までの距離（簡易）=====
async function updateSeaDistance() {
  if (!lat || !lon) return;
  // 近隣の海岸をOpenMeteo Elevation API で確認 → 簡易的にOverpass使用
  try {
    const r = 5000; // 5km
    const query = `[out:json][timeout:15];(node["natural"="coastline"](around:${r},${lat},${lon});way["natural"="coastline"](around:${r},${lat},${lon}););out center 5;`;
    const res = await fetchOverpass(query);
    if (res && res.elements && res.elements.length > 0) {
      const el = res.elements[0];
      const elat = el.lat || el.center?.lat;
      const elon = el.lon || el.center?.lon;
      if (elat && elon) {
        const d = haversine(lat, lon, elat, elon);
        const b = bearingTo(lat, lon, elat, elon);
        updateTile('t-sea', `${degToCompassArrow(b)}${fmtDist(d)}<br><small>海岸線</small>`);
        return;
      }
    }
    // 広範囲で再試行
    const r2 = 50000;
    const query2 = `[out:json][timeout:20];(way["natural"="coastline"](around:${r2},${lat},${lon}););out center 3;`;
    const res2 = await fetchOverpass(query2);
    if (res2 && res2.elements && res2.elements.length > 0) {
      const el = res2.elements[0];
      const elat = el.center?.lat || el.lat;
      const elon = el.center?.lon || el.lon;
      if (elat && elon) {
        const d = haversine(lat, lon, elat, elon);
        const b = bearingTo(lat, lon, elat, elon);
        updateTile('t-sea', `${degToCompassArrow(b)}${fmtDist(d)}<br><small>海岸線</small>`);
        return;
      }
    }
    updateTile('t-sea', '-');
  } catch(e) { updateTile('t-sea', '-'); }
}

// ===== Overpass APIヘルパー =====
async function fetchOverpass(query) {
  const url = 'https://overpass-api.de/api/interpreter';
  const res = await fetch(url, {
    method: 'POST',
    body: 'data=' + encodeURIComponent(query),
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
  });
  return res.json();
}

// ===== POI取得（Overpass） =====
async function fetchNearbyPOI(types, radius = 3000) {
  if (!lat || !lon) return [];
  const typeFilters = types.map(([k,v]) => `node["${k}"="${v}"](around:${radius},${lat},${lon});`).join('');
  const query = `[out:json][timeout:20];(${typeFilters});out body 5;`;
  try {
    const data = await fetchOverpass(query);
    return (data.elements || []).map(el => ({
      ...el,
      dist: haversine(lat, lon, el.lat, el.lon),
      bear: bearingTo(lat, lon, el.lat, el.lon),
      name: el.tags?.name || el.tags?.['name:ja'] || '-'
    })).sort((a,b)=>a.dist-b.dist);
  } catch(e) { return []; }
}

// ===== 気象API（Open-Meteo） =====
async function updateWeather() {
  if (!lat || !lon) return;
  try {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m,wind_direction_10m,uv_index,precipitation_probability,precipitation&hourly=precipitation_probability,precipitation,uv_index&daily=sunrise,sunset,precipitation_sum,precipitation_probability_max&timezone=auto&forecast_days=2`;
    const res = await fetch(url);
    const d = await res.json();
    const c = d.current;

    // 天気
    updateTile('t-weather', `${wmoCode(c.weather_code)}<br>${c.temperature_2m}℃`);

    // 降水確率・降水量
    updateTile('t-rain', `${c.precipitation_probability ?? '-'}%<br>${c.precipitation ?? '-'}mm`);

    // 紫外線
    updateTile('t-uv', `${uvLevel(c.uv_index)}<br>UV ${(c.uv_index??0).toFixed(1)}`);

    // 風速・風向
    const wDir = windDir(c.wind_direction_10m);
    const wArrow = degToCompassArrow(c.wind_direction_10m);
    updateTile('t-wind', `${(c.wind_speed_10m/3.6).toFixed(1)}m/s<br>${wDir}${wArrow}`);

    // 湿度
    updateTile('t-humidity', `${c.relative_humidity_2m}%`);

    // 日の出・日没
    if (d.daily) {
      const sunrise = d.daily.sunrise?.[0];
      const sunset = d.daily.sunset?.[0];
      if (sunrise) {
        const t = sunrise.split('T')[1];
        updateTile('t-sunrise', `${t}`);
      }
      if (sunset) {
        const t = sunset.split('T')[1];
        updateTile('t-sunset', `${t}`);
      }
    }

    // 雨雲接近（今後6時間の最初の降水確率50%超え）
    const hourlyProb = d.hourly?.precipitation_probability || [];
    const hourlyTime = d.hourly?.time || [];
    const now = new Date();
    let rainHour = null;
    for (let i = 0; i < Math.min(hourlyProb.length, 6); i++) {
      if (hourlyProb[i] >= 50) {
        const t = new Date(hourlyTime[i]);
        rainHour = Math.round((t - now) / 3600000);
        break;
      }
    }
    updateTile('t-rain-cloud', rainHour !== null ? `${rainHour}時間後に接近` : '当面なし');

    // 太陽の位置（方角計算）
    const sunAzimuth = calcSunAzimuth(lat, lon);
    updateTile('t-sun-pos', `${degToCompassArrow(sunAzimuth)} ${bearingName(sunAzimuth)}<br><small>方位 ${Math.round(sunAzimuth)}°</small>`);

  } catch(e) {
    ['t-weather','t-rain','t-rain-cloud','t-uv','t-wind','t-humidity'].forEach(id => updateTile(id, '-'));
  }
}

// ===== 太陽位置計算 =====
function calcSunAzimuth(lat, lon) {
  const now = new Date();
  const jd = now / 86400000 + 2440587.5;
  const n = jd - 2451545.0;
  const L = (280.46 + 0.9856474 * n) % 360;
  const g = ((357.528 + 0.9856003 * n) % 360) * Math.PI / 180;
  const lambda = (L + 1.915 * Math.sin(g) + 0.02 * Math.sin(2*g)) * Math.PI / 180;
  const epsilon = 23.439 * Math.PI / 180;
  const sinDec = Math.sin(epsilon) * Math.sin(lambda);
  const dec = Math.asin(sinDec);
  const cosDec = Math.cos(dec);
  const latR = lat * Math.PI / 180;
  const H = ((now.getUTCHours() + now.getUTCMinutes()/60 + now.getUTCSeconds()/3600 + lon/15) * 15 - 180) * Math.PI / 180;
  const sinAlt = Math.sin(latR)*sinDec + Math.cos(latR)*cosDec*Math.cos(H);
  const cosA = (sinDec - Math.sin(latR)*sinAlt) / (Math.cos(latR)*Math.sqrt(1-sinAlt**2));
  let az = Math.acos(Math.max(-1,Math.min(1,cosA))) * 180/Math.PI;
  if (Math.sin(H) > 0) az = 360 - az;
  return az;
}

// ===== 海洋API =====
async function updateMarine() {
  if (!lat || !lon) return;
  try {
    const url = `https://marine-api.open-meteo.com/v1/marine?latitude=${lat}&longitude=${lon}&hourly=wave_height,wave_direction,wave_period,wind_wave_height,swell_wave_height,ocean_current_velocity&daily=wave_height_max&timezone=auto`;
    const res = await fetch(url);
    if (!res.ok) { updateTile('t-wave','-'); updateTile('t-sst','-'); return; }
    const d = await res.json();
    const now = new Date();
    const hIdx = now.getHours();
    const h = d.hourly;
    if (h) {
      const wh = h.wave_height?.[hIdx];
      const wp = h.wave_period?.[hIdx];
      const wd = h.wave_direction?.[hIdx];
      const swh = h.swell_wave_height?.[hIdx];
      const wwh = h.wind_wave_height?.[hIdx];
      updateTile('t-wave',
        `高${wh?.toFixed(1)}m 周期${wp?.toFixed(0)}s<br><small>${waveDir(wd??0)} うねり${swh?.toFixed(1)}m 風浪${wwh?.toFixed(1)}m</small>`
      );
    }
    updateTile('t-sst', '-'); // SST別API
  } catch(e) { updateTile('t-wave','-'); }

  // 海面温度（Open-Meteo Marine SST変数が追加された場合対応）
  try {
    const url2 = `https://marine-api.open-meteo.com/v1/marine?latitude=${lat}&longitude=${lon}&hourly=ocean_current_velocity&daily=wave_height_max&timezone=auto`;
    // SSTは別途ERDDAP等
    updateTile('t-sst', '-');
  } catch(e) {}

  // 潮汐（簡易計算）
  updateTides();
}

// ===== 潮汐（簡易計算） =====
function updateTides() {
  const now = new Date();
  // 簡易的な潮汐計算（月の引力ベース）
  const moonAge = calcMoonAge();
  // 月の位相から大まかな満潮・干潮推定
  const ref = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 0, 0, 0);
  const hoursNow = (now - ref) / 3600000;
  // 潮汐周期 ≒ 12.42時間
  const period = 12.42;
  const phase = (moonAge % 1) * period;
  const offsets = [0, period/2, period, period*1.5];
  const times = offsets.map(o => {
    let t = ((phase + o) % (period*2));
    return t;
  }).filter(t => t >= 0 && t < 24).sort((a,b)=>a-b);

  // 次の満潮・干潮
  let nextHigh = null, nextLow = null;
  for (let i = 0; i < 48; i++) {
    const t = i * (period / 2);
    const h = t % (period);
    const isHigh = Math.floor(t / period) % 2 === 0;
    const hr = t + hoursNow * 0 + phase;
    const absHr = (hr % 24 + 24) % 24;
    const futureHr = ((hoursNow) + t) % 24;
    if (isHigh && nextHigh === null) {
      nextHigh = Math.round(futureHr * 2) / 2;
    } else if (!isHigh && nextLow === null) {
      nextLow = Math.round(futureHr * 2) / 2;
    }
    if (nextHigh !== null && nextLow !== null) break;
  }

  const fmtTime = h => {
    if (h === null) return '-';
    const hh = Math.floor(h) % 24;
    const mm = Math.round((h % 1) * 60);
    return `${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}`;
  };
  updateTile('t-tide-high', fmtTime(nextHigh));
  updateTile('t-tide-low', fmtTime(nextLow));
}

// ===== 月齢 =====
function updateMoon() {
  const age = calcMoonAge();
  const phase = moonPhase(age);
  updateTile('t-moon', `${phase}<br>${age.toFixed(1)}日`);
}

// ===== 星空指数 =====
async function updateStarIndex() {
  if (!lat || !lon) return;
  try {
    // 雲量から推定
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=cloud_cover,visibility&timezone=auto`;
    const res = await fetch(url);
    const d = await res.json();
    const cloud = d.current?.cloud_cover ?? 100;
    const vis = d.current?.visibility ?? 0;
    const moonAge = calcMoonAge();
    const moonFactor = Math.abs(moonAge - 14.77) / 14.77; // 満月=0, 新月=1
    const idx = Math.round((1 - cloud/100) * 60 + moonFactor * 30 + Math.min(vis/10000, 10));
    let label = idx > 80 ? '絶好の天体観測日' : idx > 50 ? '普通' : '見づらい';
    updateTile('t-starsky', `${idx}%<br>${label}`);
  } catch(e) { updateTile('t-starsky', '-'); }
}

async function updateISS() {
  try {

    const issLat = d.latitude;
    const issLon = d.longitude;
    const dist = lat && lon ? haversine(lat, lon, issLat, issLon) : null;

  } catch(e) { updateTile('t-iss', '-'); }
}

    const res = await fetch(url, { headers: {'Accept-Language':'ja'} });
    const d = await res.json();
    const addr = d.address;
    const postal = addr?.postcode || '';
    const pref = addr?.state || '';
    const city = addr?.city || addr?.town || addr?.village || '';
    const suburb = addr?.suburb || addr?.neighbourhood || '';
    const road = addr?.road || '';
    const full = `〒${postal} ${pref}${city}${suburb}${road}`;
    updateListTile('l-address', full);

    const timezone = d.address?.timezone || Intl.DateTimeFormat().resolvedOptions().timeZone;
    updateListTile('l-admin', `${pref} ${city} ${suburb}<br>TZ: ${timezone}`);
    updateListTile('l-countrycity', `${addr?.country || ''} ${pref} ${city}`);
  } catch(e) {
    updateListTile('l-address', '-');
    updateListTile('l-admin', '-');
  }
}

// ===== 一括更新 =====
async function forceUpdate() {
  const btn = document.getElementById('reloadBtn');
  btn.innerHTML = '<span class="spinning">🔄</span> 更新中...';
  btn.disabled = true;

  try {
    updateGeoTiles();
    updateMoon();

    await Promise.allSettled([
      updateWeather(),
      updateAirQuality(),
      updateMarine(),
      updateISS(),
      updateStarIndex(),
      updateAddress(),
      updateSeaDistance(),
      updatePOIs(),
      updateWifi(),
      updateFinance(),
      updateRoads(),
      updateRivers(),
    ]);
    updateTransportInfo();
    updateCultureInfo();
  } finally {
    btn.innerHTML = '🔄 一括更新';
    btn.disabled = false;
  }
}

// ===== アプリ起動 =====
function startApp() {
  // オーバーレイ即時消去
  document.getElementById('overlay').style.display = 'none';
  document.getElementById('header').style.display = '';
  document.getElementById('main').style.display = '';

  buildGrids();
  startSensors();
  startGPS();

  // 非同期で初回更新
  setTimeout(async () => {
    updateMoon();
    updateTransportInfo();
    updateCultureInfo();
    await forceUpdate();
  }, 500);

  // 定期更新タイマー
  setInterval(() => updateMoon(), 3600000);
  setInterval(() => updateISS(), 60000);
  setInterval(() => {
    updateWeather();
    updateStarIndex();
    updateTides();
  }, 900000); // 15分
  setInterval(() => {
    updateAirQuality();
    updateMarine();
    updateRoads();
    updateRivers();
    updateSeaDistance();
  }, 600000); // 10分
  setInterval(() => {
    updatePOIs();
    updateWifi();
    updateFinance();
    updateAddress();
  }, 600000); // 10分
}
