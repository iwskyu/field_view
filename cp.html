<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Drive View14 Lite</title>

<style>
html,body{
margin:0;
padding:0;
height:100%;
overflow:hidden;
font-family:sans-serif;
font-weight:bold;
color:#fff;
}

body{
background:linear-gradient(-45deg,#1e3c72,#2a5298,#0f2027,#203a43);
background-size:400% 400%;
animation:bg 15s ease infinite;
}

@keyframes bg{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

#panel{
height:50vh;
padding:8px;
box-sizing:border-box;
display:flex;
flex-direction:column;
gap:4px;
font-size:14px;
}

.row{
display:flex;
justify-content:space-between;
align-items:center;
}

.card{
background:rgba(255,255,255,.12);
border-radius:8px;
padding:4px 8px;
}

.list{
font-size:12px;
line-height:1.4;
}

button{
position:absolute;
top:8px;
right:8px;
border:none;
padding:8px;
border-radius:8px;
font-weight:bold;
}

#start{
position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%);
font-size:20px;
padding:20px;
}
</style>
</head>

<body>

<button onclick="forceUpdate()">🔄</button>

<button id="start">📍開始</button>

<div id="panel" style="display:none">

<div class="row card">
<div id="clock">--:--:--</div>
<div id="weather">🌤</div>
</div>

<div class="row card">
<div id="sun">🌅</div>
<div id="env">💨💧📉</div>
</div>

<div class="row card">
<div id="heading">🧭</div>
<div id="altitude">⛰</div>
<div id="speed">🚗</div>
<div id="distance">📏</div>
</div>

<div class="card list">
<div id="toilets">🚻</div>
</div>

<div class="card list">
<div id="gas">⛽</div>
</div>

<div class="card list">
<div id="stores">🏪</div>
</div>

<div class="card">
⏳
<span id="weatherCd"></span> /
<span id="poiCd"></span>
</div>

</div>

<script>

let lat,lon;
let totalDistance=0;
let lastPos=null;

let weatherTimer=300;
let poiTimer=120;

function tick(){

document.getElementById("clock").innerText=
new Date().toLocaleTimeString();

weatherTimer--;
poiTimer--;

if(weatherTimer<=0){
updateWeather();
weatherTimer=300;
}

if(poiTimer<=0){
updatePOI();
poiTimer=120;
}

document.getElementById("weatherCd").innerText=
weatherTimer+"s";

document.getElementById("poiCd").innerText=
poiTimer+"s";

}

setInterval(tick,1000);

async function updateWeather(){

if(!lat)return;

let url=
`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,surface_pressure,wind_speed_10m,weather_code&daily=sunrise,sunset&forecast_days=1`;

let data=await fetch(url).then(r=>r.json());

let c=data.current;

document.getElementById("weather").innerText=
`🌤 ${c.temperature_2m}°C ☔`;

document.getElementById("env").innerText=
`💨${c.wind_speed_10m}m 💧${c.relative_humidity_2m}% 📉${Math.round(c.surface_pressure)}`;

document.getElementById("sun").innerText=
`🌅${data.daily.sunrise[0].substring(11,16)} 🌇${data.daily.sunset[0].substring(11,16)}`;
}

async function updatePOI(){

if(!lat)return;

let q=`
[out:json];
(
node["amenity"="toilets"](around:5000,${lat},${lon});
node["amenity"="fuel"](around:5000,${lat},${lon});
node["shop"="convenience"](around:5000,${lat},${lon});
);
out center;
`;

let res=await fetch(
"https://overpass-api.de/api/interpreter",
{
method:"POST",
body:q
}
);

let data=await res.json();

let toilets=[];
let fuels=[];
let stores=[];

data.elements.forEach(e=>{

let name=e.tags.name||"名称不明";

let d=distance(
lat,lon,
e.lat,e.lon
).toFixed(1);

let text=`${name} ${d}km`;

if(e.tags.amenity==="toilets")
toilets.push(text);

if(e.tags.amenity==="fuel")
fuels.push(text);

if(e.tags.shop==="convenience")
stores.push(text);

});

document.getElementById("toilets").innerHTML=
"🚻 "+toilets.slice(0,3).join("<br>");

document.getElementById("gas").innerHTML=
"⛽ "+fuels.slice(0,3).join("<br>");

document.getElementById("stores").innerHTML=
"🏪 "+stores.slice(0,3).join("<br>");
}

function distance(lat1,lon1,lat2,lon2){

let R=6371;

let dLat=(lat2-lat1)*Math.PI/180;
let dLon=(lon2-lon1)*Math.PI/180;

let a=
Math.sin(dLat/2)**2+
Math.cos(lat1*Math.PI/180)*
Math.cos(lat2*Math.PI/180)*
Math.sin(dLon/2)**2;

return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function watchGPS(){

navigator.geolocation.watchPosition(pos=>{

lat=pos.coords.latitude;
lon=pos.coords.longitude;

document.getElementById("speed").innerText=
"🚗 "+
Math.round((pos.coords.speed||0)*3.6)
+"km/h";

document.getElementById("altitude").innerText=
"⛰ "+
Math.round(pos.coords.altitude||0)+"m";

if(lastPos){

totalDistance+=distance(
lastPos.lat,
lastPos.lon,
lat,
lon
);

document.getElementById("distance").innerText=
"📏 "+
totalDistance.toFixed(1)+"km";
}

lastPos={lat,lon};

},{
enableHighAccuracy:true
});

}

function forceUpdate(){

updateWeather();
updatePOI();

}

document.getElementById("start").onclick=()=>{

document.getElementById("start").style.display="none";
document.getElementById("panel").style.display="flex";

watchGPS();

updateWeather();
updatePOI();

if(window.DeviceOrientationEvent){

window.addEventListener(
"deviceorientation",
e=>{

let deg=Math.round(e.alpha||0);

document.getElementById("heading").innerText=
"🧭 "+deg+"°";

});
}

};

</script>
</body>
</html>
