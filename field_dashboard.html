
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); }
.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 10px; padding: 12px 0; }
.card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 14px 16px; }
.card-label { font-size: 12px; color: var(--color-text-secondary); margin-bottom: 4px; display: flex; align-items: center; gap: 5px; }
.card-value { font-size: 22px; font-weight: 500; color: var(--color-text-primary); }
.card-sub { font-size: 12px; color: var(--color-text-secondary); margin-top: 2px; }
.card-wide { grid-column: span 2; }
.poi-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 0.5px solid var(--color-border-tertiary); }
.poi-item:last-child { border-bottom: none; }
.poi-name { font-size: 13px; color: var(--color-text-primary); display: flex; align-items: center; gap: 6px; }
.poi-dist { font-size: 13px; font-weight: 500; color: var(--color-text-secondary); text-align: right; }
.compass-wrap { display: flex; justify-content: center; align-items: center; height: 100px; }
.compass { position: relative; width: 90px; height: 90px; }
.compass-circle { width: 90px; height: 90px; border-radius: 50%; border: 1.5px solid var(--color-border-secondary); background: var(--color-background-secondary); display: flex; align-items: center; justify-content: center; position: relative; }
.compass-dirs { position: absolute; width: 100%; height: 100%; top: 0; left: 0; }
.compass-dir { position: absolute; font-size: 10px; font-weight: 500; color: var(--color-text-secondary); }
.compass-n { top: 3px; left: 50%; transform: translateX(-50%); color: var(--color-text-danger); }
.compass-s { bottom: 3px; left: 50%; transform: translateX(-50%); }
.compass-e { right: 4px; top: 50%; transform: translateY(-50%); }
.compass-w { left: 4px; top: 50%; transform: translateY(-50%); }
.needle { width: 4px; height: 38px; position: absolute; top: 50%; left: 50%; transform-origin: bottom center; margin-left: -2px; margin-top: -38px; }
.needle-n { background: linear-gradient(to bottom, #e24b4a, #e24b4a 50%, transparent 50%); border-radius: 2px 2px 0 0; }
.needle-s { background: linear-gradient(to top, var(--color-text-secondary), var(--color-text-secondary) 50%, transparent 50%); border-radius: 0 0 2px 2px; }
#needle-n { background: #e24b4a; width: 3px; height: 20px; position: absolute; bottom: 50%; left: 50%; transform-origin: bottom center; margin-left: -1.5px; border-radius: 3px 3px 0 0; }
#needle-s { background: var(--color-text-secondary); width: 3px; height: 20px; position: absolute; top: 50%; left: 50%; transform-origin: top center; margin-left: -1.5px; border-radius: 0 0 3px 3px; }
.status-bar { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 8px 12px; font-size: 12px; color: var(--color-text-secondary); margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
.refresh-btn { margin-left: auto; background: none; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); padding: 3px 8px; font-size: 11px; cursor: pointer; color: var(--color-text-secondary); }
.section-title { font-size: 13px; font-weight: 500; color: var(--color-text-secondary); margin: 14px 0 6px; display: flex; align-items: center; gap: 5px; }
.weather-icon { font-size: 32px; }
.badge { display: inline-block; font-size: 11px; background: var(--color-background-info); color: var(--color-text-info); border-radius: var(--border-radius-md); padding: 2px 7px; }
</style>

<h2 class="sr-only">フィールドダッシュボード — 現在地の天気・施設情報</h2>

<div id="app" style="padding: 4px 0;">
  <div class="status-bar">
    <i class="ti ti-map-pin" aria-hidden="true"></i>
    <span id="status-text">位置情報を取得中...</span>
    <button class="refresh-btn" onclick="init()"><i class="ti ti-refresh"></i> 更新</button>
  </div>

  <div id="location-name" style="font-size: 15px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 10px; display: none;">
    <i class="ti ti-map-pin" aria-hidden="true" style="color: #e24b4a;"></i> <span id="location-text"></span>
  </div>

  <div class="grid">
    <div class="card">
      <div class="card-label"><i class="ti ti-temperature" aria-hidden="true"></i> 気温</div>
      <div class="card-value" id="temp">--</div>
      <div class="card-sub" id="weather-desc">--</div>
    </div>
    <div class="card">
      <div class="card-label"><i class="ti ti-sun" aria-hidden="true"></i> 日の出 / 日没</div>
      <div style="font-size: 15px; font-weight: 500;" id="sunrise">--</div>
      <div style="font-size: 15px; font-weight: 500; margin-top: 4px;" id="sunset">--</div>
    </div>
    <div class="card">
      <div class="card-label"><i class="ti ti-mountain" aria-hidden="true"></i> 標高</div>
      <div class="card-value" id="elevation">--</div>
    </div>
    <div class="card">
      <div class="card-label"><i class="ti ti-compass" aria-hidden="true"></i> 方角</div>
      <div class="compass-wrap">
        <div class="compass-circle">
          <div class="compass-dirs">
            <span class="compass-dir compass-n">N</span>
            <span class="compass-dir compass-s">S</span>
            <span class="compass-dir compass-e">E</span>
            <span class="compass-dir compass-w">W</span>
          </div>
          <div id="needle-n"></div>
          <div id="needle-s"></div>
          <div style="width:6px;height:6px;border-radius:50%;background:var(--color-text-secondary);position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:2;"></div>
        </div>
      </div>
      <div class="card-sub" style="text-align:center;" id="heading-text">--</div>
    </div>
  </div>

  <div class="section-title"><i class="ti ti-building" aria-hidden="true"></i> 周辺施設</div>
  <div class="card">
    <div id="poi-list">
      <div class="poi-item">
        <span class="poi-name"><i class="ti ti-train" aria-hidden="true"></i> 最寄り駅</span>
        <span class="poi-dist" id="station-info">取得中...</span>
      </div>
      <div class="poi-item">
        <span class="poi-name"><i class="ti ti-building-community" aria-hidden="true"></i> 公共トイレ</span>
        <span class="poi-dist" id="toilet-info">取得中...</span>
      </div>
      <div class="poi-item">
        <span class="poi-name"><i class="ti ti-gas-station" aria-hidden="true"></i> ガソリンスタンド</span>
        <span class="poi-dist" id="gas-info">取得中...</span>
      </div>
    </div>
  </div>
</div>

<script>
let watchId = null;
let currentLat = null, currentLon = null;

const WMO = {0:'快晴',1:'ほぼ晴れ',2:'一部曇り',3:'曇り',45:'霧',48:'着氷霧',51:'霧雨(弱)',53:'霧雨',55:'霧雨(強)',61:'小雨',63:'雨',65:'大雨',71:'小雪',73:'雪',75:'大雪',80:'にわか雨',81:'雨',82:'強雨',95:'雷雨',96:'雷雨+ひょう',99:'激しい雷雨'};

function deg2rad(d){return d*Math.PI/180;}
function rad2deg(r){return r*180/Math.PI;}

function calcBearing(lat1,lon1,lat2,lon2){
  const dLon=deg2rad(lon2-lon1);
  const y=Math.sin(dLon)*Math.cos(deg2rad(lat2));
  const x=Math.cos(deg2rad(lat1))*Math.sin(deg2rad(lat2))-Math.sin(deg2rad(lat1))*Math.cos(deg2rad(lat2))*Math.cos(dLon);
  return (rad2deg(Math.atan2(y,x))+360)%360;
}

function calcDist(lat1,lon1,lat2,lon2){
  const R=6371e3;
  const a=Math.sin(deg2rad((lat2-lat1)/2))**2+Math.cos(deg2rad(lat1))*Math.cos(deg2rad(lat2))*Math.sin(deg2rad((lon2-lon1)/2))**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function bearingLabel(b){
  const dirs=['北','北北東','北東','東北東','東','東南東','南東','南南東','南','南南西','南西','西南西','西','西北西','北西','北北西'];
  return dirs[Math.round(b/22.5)%16];
}

function formatDist(m){
  return m<1000?Math.round(m)+'m':(m/1000).toFixed(1)+'km';
}

function formatDistDir(lat2,lon2){
  const d=calcDist(currentLat,currentLon,lat2,lon2);
  const b=calcBearing(currentLat,currentLon,lat2,lon2);
  return formatDist(d)+' '+bearingLabel(b)+'方向';
}

async function fetchWeather(lat,lon){
  try{
    const r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weathercode&daily=sunrise,sunset&timezone=Asia%2FTokyo&forecast_days=1`);
    const d=await r.json();
    document.getElementById('temp').textContent=Math.round(d.current.temperature_2m)+'°C';
    document.getElementById('weather-desc').textContent=WMO[d.current.weathercode]||'--';
    const sr=d.daily.sunrise[0].slice(11,16);
    const ss=d.daily.sunset[0].slice(11,16);
    document.getElementById('sunrise').textContent='🌅 '+sr;
    document.getElementById('sunset').textContent='🌇 '+ss;
  }catch(e){document.getElementById('temp').textContent='取得失敗';}
}

async function fetchElevation(lat,lon){
  try{
    const r=await fetch(`https://api.open-meteo.com/v1/elevation?latitude=${lat}&longitude=${lon}`);
    const d=await r.json();
    document.getElementById('elevation').textContent=Math.round(d.elevation[0])+'m';
  }catch(e){document.getElementById('elevation').textContent='--';}
}

async function fetchLocation(lat,lon){
  try{
    const r=await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&accept-language=ja`);
    const d=await r.json();
    const a=d.address;
    const name=[a.city||a.town||a.village||a.county||'',a.suburb||a.neighbourhood||'',a.road||''].filter(Boolean).join(' ');
    document.getElementById('location-text').textContent=name||d.display_name.split(',')[0];
    document.getElementById('location-name').style.display='block';
  }catch(e){}
}

async function fetchPOI(lat,lon,query,elId,type){
  const radius=5000;
  let filter='';
  if(type==='station') filter='node["railway"="station"];node["railway"="halt"];';
  else if(type==='toilet') filter='node["amenity"="toilets"];way["amenity"="toilets"];';
  else if(type==='gas') filter='node["amenity"="fuel"];way["amenity"="fuel"];';
  
  const overpass=`[out:json][timeout:15];(${filter});out center 10;`;
  try{
    const r=await fetch('https://overpass-api.de/api/interpreter',{method:'POST',body:'data='+encodeURIComponent(overpass)});
    const d=await r.json();
    if(!d.elements||d.elements.length===0){document.getElementById(elId).textContent='周辺に見つからず';return;}
    
    let nearest=null, nearestDist=Infinity;
    for(const el of d.elements){
      const elat=el.lat||el.center?.lat;
      const elon=el.lon||el.center?.lon;
      if(!elat||!elon) continue;
      const dist=calcDist(lat,lon,elat,elon);
      if(dist<nearestDist){nearestDist=dist;nearest={lat:elat,lon:elon,name:el.tags?.name||''};}
    }
    if(nearest){
      const info=formatDistDir(nearest.lat,nearest.lon);
      const name=nearest.name?`<div style="font-size:11px;color:var(--color-text-secondary);margin-top:2px;">${nearest.name}</div>`:'';
      document.getElementById(elId).innerHTML=`<div>${info}</div>${name}`;
    }
  }catch(e){document.getElementById(elId).textContent='取得失敗';}
}

function startCompass(){
  if(window.DeviceOrientationEvent){
    if(typeof DeviceOrientationEvent.requestPermission==='function'){
      DeviceOrientationEvent.requestPermission().then(p=>{
        if(p==='granted') window.addEventListener('deviceorientationabsolute',onOrient,true);
      }).catch(()=>{});
    } else {
      window.addEventListener('deviceorientationabsolute',onOrient,true);
      window.addEventListener('deviceorientation',onOrient,true);
    }
  }
}

function onOrient(e){
  let heading=null;
  if(e.webkitCompassHeading!=null) heading=e.webkitCompassHeading;
  else if(e.alpha!=null) heading=(360-e.alpha)%360;
  if(heading==null) return;
  const angle=heading;
  document.getElementById('needle-n').style.transform=`rotate(${angle}deg)`;
  document.getElementById('needle-s').style.transform=`rotate(${angle}deg)`;
  document.getElementById('heading-text').textContent=bearingLabel(angle)+' ('+Math.round(angle)+'°)';
}

async function init(){
  document.getElementById('status-text').textContent='位置情報を取得中...';
  document.getElementById('station-info').textContent='取得中...';
  document.getElementById('toilet-info').textContent='取得中...';
  document.getElementById('gas-info').textContent='取得中...';
  
  if(!navigator.geolocation){
    document.getElementById('status-text').textContent='位置情報非対応のブラウザです';
    return;
  }
  
  navigator.geolocation.getCurrentPosition(async pos=>{
    currentLat=pos.coords.latitude;
    currentLon=pos.coords.longitude;
    const acc=Math.round(pos.coords.accuracy);
    document.getElementById('status-text').textContent=`緯度 ${currentLat.toFixed(4)} / 経度 ${currentLon.toFixed(4)} (精度 ±${acc}m)`;
    
    await Promise.all([
      fetchWeather(currentLat,currentLon),
      fetchElevation(currentLat,currentLon),
      fetchLocation(currentLat,currentLon),
    ]);
    fetchPOI(currentLat,currentLon,'最寄り駅','station-info','station');
    fetchPOI(currentLat,currentLon,'公共トイレ','toilet-info','toilet');
    fetchPOI(currentLat,currentLon,'ガソリンスタンド','gas-info','gas');
  }, err=>{
    let msg='位置情報の取得に失敗';
    if(err.code===1) msg='位置情報の許可が必要です';
    else if(err.code===2) msg='位置情報を取得できませんでした';
    document.getElementById('status-text').textContent=msg;
  },{enableHighAccuracy:true,timeout:15000});
  
  startCompass();
}

init();
</script>
