<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drive View7</title>
    <style>
        :root {
            --bg-grad-1: #141e30;
            --bg-grad-2: #243b55;
            --text-color: #ffffff;
        }

        /* 画面上半分のみを使用する設定 */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 50vh;
            overflow: hidden;
            font-family: sans-serif;
            color: var(--text-color);
            font-weight: bold;
            font-size: 11px;
            background: linear-gradient(45deg, var(--bg-grad-1), var(--bg-grad-2), var(--bg-grad-1));
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 全体コンテナ */
        #app-container {
            display: none; /* 権限許可前は非表示 */
            height: 100%;
            padding: 4px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* ヘッダーエリア */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            padding-bottom: 2px;
        }

        /* 3列のメイングリッド（レイアウト崩れ防止） */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 3px;
            flex-grow: 1;
            margin-top: 3px;
            overflow: hidden;
        }

        /* 情報カード */
        .card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            padding: 3px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            cursor: pointer;
            transition: opacity 0.2s;
            position: relative;
            box-sizing: border-box;
        }

        .card.hidden-content *:not(.toggle-icon) {
            visibility: hidden;
        }

        .toggle-icon {
            font-size: 14px;
            margin-bottom: 1px;
        }

        .cd-timer {
            position: absolute;
            top: 1px;
            right: 2px;
            font-size: 7px;
            color: #ffeb3b;
        }

        /* スポットリスト用（3件表示） */
        .spot-list {
            font-size: 8px;
            width: 100%;
            line-height: 1.1;
        }

        /* 初期権限要求画面（画面上半分に収める） */
        #auth-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 50vh;
            background: #111;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        #auth-btn {
            background: #00ffcc;
            color: #000;
            border: none;
            padding: 10px 20px;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
        }

        /* ボタン類 */
        .btn {
            background: rgba(255,255,255,0.2);
            border: 1px solid #fff;
            color: #fff;
            border-radius: 3px;
            padding: 1px 4px;
            font-size: 9px;
            cursor: pointer;
            font-weight: bold;
        }
        #eco-btn.active {
            background: #ff5722;
        }
    </style>
</head>
<body>

    <div id="auth-screen">
        <p style="text-align:center; margin-bottom:10px;">Drive View7<br>センサー・位置情報へのアクセス</p>
        <button id="auth-btn" onclick="requestPermissions()">START</button>
    </div>

    <div id="app-container" style="display: none;">

                <div>🧭 <span id="dir-val">SSW 83°</span></div>
                <div>⛰️ <span id="alt-val">1234m</span></div>
                <div>⚡ <span id="speed-val">0 km/h</span></div>
                <div>🛣️ <span id="dist-val">0.0 km</span></div>
                <div>🛰️ <span id="gps-val">高</span></div>
                <span class="cd-timer" id="timer-fast">2</span>
            </div>

            <div class="card" onclick="toggleCard(this)">
                <span class="toggle-icon">🚉</span>
                <span class="cd-timer" id="timer-spot1">30</span>
                <div class="spot-list" id="station-list">検索中...</div>
            </div>

            <div class="card" onclick="toggleCard(this)">
                <span class="toggle-icon">🚾</span>
                <span class="cd-timer" id="timer-spot2">30</span>
                <div class="spot-list" id="toilet-list">検索中...</div>
            </div>

            <div class="card" onclick="toggleCard(this)">
                <span class="toggle-icon">⛽</span>
                <span class="cd-timer" id="timer-spot3">30</span>
                <div class="spot-list" id="gas-list">検索中...</div>
            </div>

            <div class="card" onclick="toggleCard(this)">
                <span class="toggle-icon">🏪</span>
                <span class="cd-timer" id="timer-spot4">30</span>
                <div class="spot-list" id="convenience-list">検索中...</div>
            </div>

            <div class="card" onclick="toggleCard(this)">
                <span class="toggle-icon">⛕</span>
                <span class="cd-timer" id="timer-spot5">30</span>
                <div class="spot-list" id="michinoeki-list">検索中...</div>
            </div>

            <div class="card" onclick="toggleCard(this)">

                <span class="cd-timer" id="timer-spot6">30</span>
                <div class="spot-list" id="landmark-list">検索中...</div>
            </div>

        </div>
    </div>
