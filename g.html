<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>旅のお供 ver58</title>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            padding: 8px;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            /* 朝、昼、夕方、夜を巡るグラデーションアニメーション */
            background: linear-gradient(135deg, #ff7e5f, #feb47b, #4ca1af, #2c3e50, #0b0f19, #ff7e5f);
            background-size: 1000% 1000%;
            animation: skyTransition 40s ease infinite;
            color: #ffffff;
            font-weight: bold;
            overflow-x: hidden;
        }
        @keyframes skyTransition {
            0% { background-position: 0% 50%; }
            25% { background-position: 30% 50%; }
            50% { background-position: 65% 50%; }
            75% { background-position: 90% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        /* 初期画面オーバーレイ（ボタン押下で即消去） */
        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #0b0f19;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            text-align: center;
        }
        #start-btn {
            padding: 24px 48px;
            font-size: 32px;
            font-weight: bold;
            color: white;
            background: linear-gradient(45deg, #4f46e5, #06b6d4);
            border: none;
            border-radius: 16px;
            cursor: pointer;
            box-shadow: 0 6px 25px rgba(6, 182, 212, 0.4);
            margin-bottom: 20px;
        }
        #overlay-notice { font-size: 18px; color: #9ca3af; font-weight: bold; }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 4px;
            margin-bottom: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }
        h1 { font-size: 24px; margin: 0; color: #ffffff; }
        
        /* 特大の一括更新ボタン */
        #sync-btn {
            padding: 16px 32px;
            font-size: 22px;
            font-weight: bold;
            background: rgba(255, 255, 255, 0.25);
            border: 2px solid #ffffff;
            color: #ffffff;
            border-radius: 12px;
            cursor: pointer;
        }

        /* 3列タイルグリッド */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            width: 100%;
            margin-bottom: 18px;
        }

        /* 横いっぱいのリスト */
        .list-container {
            display: flex;
            flex-direction: column;
            gap: 6px;
            width: 100%;
        }

        /* 共通タイルデザイン（縦幅を狭く、文字を巨大、見切れ禁止に調整） */
        .tile {
            border: 1px solid #ffffff;
            padding: 4px 6px;
            border-radius: 4px;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            justify-content: center;
            overflow: hidden;
            word-wrap: break-word;
            overflow-wrap: break-word;
            transition: border-color 0.4s ease, color 0.4s ease, background-color 0.4s ease;
        }
        
        /* 枠色定義 */
        .tile.w-white { border-color: #ffffff; }
        .tile.w-blue { border-color: #3b82f6; }
        .tile.w-yellow { border-color: #eab308; }
        .tile.w-green { border-color: #22c55e; }
        .tile.w-emerald { border-color: #10b981; }
        .tile.w-navy { border-color: #1e3a8a; }
        .tile.w-orange { border-color: #f97316; }
        .tile.w-red { border-color: #ef4444; }
        .tile.w-brown { border-color: #78350f; }
        .tile.w-gold { border-color: #d97706; }
        .tile.w-purple { border-color: #a855f7; }
        .tile.w-grey { border-color: #6b7280; }

        /* 更新時のアニメーション：枠線・文字色を黄色に変化 */
        .tile.updated {
            border-color: #facc15 !important;
            color: #facc15 !important;
            background-color: rgba(250, 204, 21, 0.2) !important;
        }

        .tile-label {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 1px;
            font-weight: normal;
        }
        
        /* 値は太字・白文字・超巨大化 */
        .tile-value {
            font-size: 26px;
            color: #ffffff;
            font-weight: bold;
            line-height: 1.15;
            display: block;
        }
        .tile-value.sub-val {
            font-size: 18px;
            margin-top: 1px;
        }

        .grid-container .tile { min-height: 64px; }
        
        /* リストスタイルは横いっぱいに配置 */
        .list-container .tile {
            min-height: 52px;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
            padding: 6px 12px;
        }
        .list-container .tile .tile-label { margin-bottom: 0; margin-right: 16px; flex-shrink: 0; font-size: 12px; }
        .list-container .tile .tile-value { font-size: 24px; text-align: right; }
    </style>
</head>

        // パネルアップデートおよび黄色フラッシュ処理
        function updateTileValue(id, mainVal, subVal = null) {
            const mainEl = document.getElementById(`v-${id}`);
            const subEl = document.getElementById(`s-${id}`);
            const tileEl = document.getElementById(`t-${id}`);
            
            let isChanged = false;
            if (mainEl && mainEl.innerText !== mainVal) {
                mainEl.innerText = mainVal;
                isChanged = true;
            }
            if (subEl && subVal && subEl.innerText !== subVal) {
                subEl.innerText = subVal;
                isChanged = true;
            }

            if (isChanged && tileEl) {
                tileEl.classList.add("updated");
                setTimeout(() => tileEl.classList.remove("updated"), 1500);
            }
        }

        // 相対方位記号（↓基準）の計算
        function getDirectionArrow(targetLat, targetLon) {
            if (!currentLat || !currentLon) return "↓";
            const lat1 = currentLat * Math.PI / 180;
            const lon1 = currentLon * Math.PI / 180;
            const lat2 = targetLat * Math.PI / 180;
            const lon2 = targetLon * Math.PI / 180;
            const dLon = lon2 - lon1;
            const y = Math.sin(dLon) * Math.cos(lat2);
            const x = Math.cos(lat1) * Math.sin(lat2) - Math.sin(lat1) * Math.cos(lat2) * Math.cos(dLon);
            let brng = Math.atan2(y, x) * 180 / Math.PI;
            brng = (brng + 360) % 360; 

            // 北を基準としたデバイスの向きから、ターゲットへの矢印を選択
            const relativeAngle = (brng - currentHeading + 360) % 360;
            const arrows = ["↓", "↙", "←", "↖", "↑", "↗", "→", "↘"];
            return arrows[Math.round(relativeAngle / 45) % 8];
        }

        // 距離計算（ハヴァサイン公式）
        function getDistanceKm(targetLat, targetLon) {
            if (!currentLat || !currentLon) return "-";
            const R = 6371;
            const dLat = (targetLat - currentLat) * Math.PI / 180;
            const dLon = (targetLon - currentLon) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(currentLat * Math.PI / 180) * Math.cos(targetLat * Math.PI / 180) *
                      Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return Math.round(R * c);
        }

        // 時計・日付処理
        function updateDateTime() {
            const now = new Date();
            const y = now.getFullYear();
            const m = String(now.getMonth() + 1).padStart(2, '0');
            const d = String(now.getDate()).padStart(2, '0');
            const w = ["(日)", "(月)", "(火)", "(水)", "(木)", "(金)", "(土)"][now.getDay()];
            updateTileValue("date", `${y}/${m}/${d}`, w);

            const hh = String(now.getHours()).padStart(2, '0');
            const mm = String(now.getMinutes()).padStart(2, '0');
            updateTileValue("time", `${hh}:${mm}`);
        }

        // デバイスの傾きとコンパス方位のリアルタイム取得
        function initSensors() {
            if (window.DeviceOrientationEvent) {
                window.addEventListener("deviceorientation", (e) => {
                    if (e.beta !== null && e.gamma !== null) {
                        const tiltVal = Math.round(Math.abs(e.beta) + Math.abs(e.gamma));
                        updateTileValue("tilt", `${tiltVal}°`);
                    }
                    let heading = e.webkitCompassHeading || e.alpha;
                    if (heading !== null && heading !== undefined) {
                        currentHeading = heading;
                        const directions = ["北", "北北東", "北東", "東北東", "東", "東南東", "南東", "南南東", "南", "南南西", "南西", "西南西", "西", "西北西", "北西", "北北西"];
                        const idx = Math.round(heading / 22.5) % 16;
                        const arrows = ["↓", "↙", "↙", "←", "←", "↖", "↖", "↑", "↑", "↗", "↗", "→", "→", "↘", "↘", "↓"];
                        updateTileValue("direction", `${arrows[idx]}${directions[idx]} ${Math.round(heading)}°`);
                    }
                }, true);
            }
        }

        // マイクを使用した簡易騒音計
        async function initAudio() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const analyser = audioContext.createAnalyser();
                const source = audioContext.createMediaStreamSource(stream);
                source.connect(analyser);
                analyser.fftSize = 256;
                const bufferLength = analyser.frequencyBinCount;
                const dataArray = new Uint8Array(bufferLength);

                setInterval(() => {
                    analyser.getByteFrequencyData(dataArray);
                    let sum = 0;
                    for (let i = 0; i < bufferLength; i++) { sum += dataArray[i]; }
                    const avg = sum / bufferLength;
                    const db = Math.round(avg + 35);
                    const desc = db > 70 ? "騒がしい" : "静か";
                    updateTileValue("noise", `${db}dB : ${desc}`);
                }, 3000);
            } catch (e) {
                updateTileValue("noise", "-");
            }
        }

        // 位置情報（GPS）の非同期取得ループ
        function initGPS() {
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition((pos) => {
                    currentLat = pos.coords.latitude;
                    currentLon = pos.coords.longitude;
                    
                    const accuracy = Math.round(pos.coords.accuracy);
                    updateTileValue("gps", `${accuracy}m : 高`);
                    
                    const speedKmh = Math.round((pos.coords.speed || 0) * 3.6);
                    updateTileValue("speed", `${speedKmh} km/h`);
                    updateTileValue("accel", `${speedKmh} km/h`);
                    
                    const alt = Math.round(pos.coords.altitude || 25);
                    updateTileValue("altitude", `${alt}m`);

                    // リアルタイム計算アイテムをキック
                    runCalculations();
                }, () => {
                    // 拒否または失敗時は「-」を保持
                }, { enableHighAccuracy: true, timeout: 10000 });
            }
        }

        // 距離・方向の動的計算
        function runCalculations() {
            if (!currentLat || !currentLon) return;

            // 主要拠点計算
            updateTileValue("tokyo", `${getDirectionArrow(35.6812, 139.7671)}${getDistanceKm(35.6812, 139.7671)}km`);
            updateTileValue("sea", `${getDirectionArrow(35.443, 139.654)}${getDistanceKm(35.443, 139.654)}km`);
            updateTileValue("fuji", `${getDirectionArrow(35.3606, 138.7274)}${getDistanceKm(35.3606, 138.7274)}km`);

            // 擬似的現在地追従（神奈川県庁を標準ターゲットとして計算）
            updateTileValue("pref", "神奈川県庁", `${getDirectionArrow(35.4477, 139.6425)}${getDistanceKm(35.4477, 139.6425)}km`);
            
            // 天気・環境データ用APIのコール
            fetchWeatherAndAirData();
        }

        // 無料のOpen-Meteo APIを用いた環境リアルタイム取得
        async function fetchWeatherAndAirData() {
            if (!currentLat || !currentLon) return;
            try {
                const weatherUrl = `https://api.open-meteo.com/v1/forecast?latitude=${currentLat}&longitude=${currentLon}&current_weather=true&hourly=precipitation_probability,precipitation,uv_index,humidity,pressure_msl&timezone=Asia%2FTokyo`;
                const res = await fetch(weatherUrl);
                const data = await res.json();
                if (data && data.current_weather) {
                    const temp = Math.round(data.current_weather.temperature);
                    updateTileValue("weather", `🌤️ ${temp}℃`);
                    
                    const prob = data.hourly.precipitation_probability[0] || 0;
                    const prec = data.hourly.precipitation[0] || 0;
                    updateTileValue("pop", `${prob}%`, `${prec}mm`);
                    
                    const uv = data.hourly.uv_index[0] || 0;
                    const uvDesc = uv > 5 ? "強い" : "普通";
                    updateTileValue("uv", `${uvDesc}`, `UV ${uv.toFixed(1)}`);
                    
                    const humid = data.hourly.humidity[0] || 60;
                    updateTileValue("humidity", `${humid}%`);
                    
                    const press = Math.round(data.hourly.pressure_msl[0] || 1013);
                    updateTileValue("pressure", `${press}hPa`);

                    const windSpeed = Math.round(data.current_weather.windspeed);
                    updateTileValue("wind", `${windSpeed}m`, `北北西 ${getDirectionArrow(currentLat+1, currentLon)}`);
                }
            } catch (e) {
                // 通信エラー時は「-」のまま変化なし
            }
        }

        // 強制一括更新メソッド
        function triggerSync() {
            updateDateTime();
            if (currentLat && currentLon) {
                runCalculations();
            }
            // 全アイテムをフラッシュさせて更新のフィードバックを与える
            gridItems.forEach(item => {
                const tile = document.getElementById(`t-${item.id}`);
                if (tile) {
                    tile.classList.add("updated");
                    setTimeout(() => tile.classList.remove("updated"), 1500);
                }
            });
            listItems.forEach(item => {
                const tile = document.getElementById(`t-${item.id}`);
                if (tile) {
                    tile.classList.add("updated");
                    setTimeout(() => tile.classList.remove("updated"), 1500);
                }
            });
        }

        // アプリ起動シーケンス（ボタン押下後に非同期実行）
        function startApp() {
            document.getElementById("overlay").style.display = "none";
            updateDateTime();
            initSensors();
            initAudio();
            initGPS();
            setInterval(updateDateTime, 1000);
        }
    </script>
</body>
</html>
