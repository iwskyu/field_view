<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drive View10</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #ffffff;
            --accent-color: #00e676;
            --sub-text: #b0bec5;
        }
        body {
            margin: 0;
            padding: 20px;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        header {
            text-align: center;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 10px;
        }
        h1 {
            margin: 0;
            font-size: 1.8rem;
            color: var(--accent-color);
            letter-spacing: 2px;
        }
        .time-box {
            text-align: center;
            background: var(--card-bg);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .time-label {
            font-size: 1rem;
            color: var(--sub-text);
        }
        .time-value {
            font-size: 3.5rem;
            font-weight: bold;
            font-family: monospace;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }
        .card {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .card-title {
            font-size: 0.9rem;
            color: var(--sub-text);
            margin-bottom: 8px;
        }
        .card-value {
            font-size: 1.4rem;
            font-weight: bold;
        }
        .full-width {
            grid-column: span 2;
        }
        .footer-info {
            text-align: center;
            font-size: 0.8rem;
            color: var(--sub-text);
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Drive View10</h1>
    </header>

    <div class="time-box">
        <div class="time-label">CURRENT TIME</div>
        <div id="current-time" class="time-value">--:--:--</div>
    </div>

    <div class="grid">
        <div class="card full-width">
            <div class="card-title">現在地の天気・気温 (5分更新)</div>
            <div id="weather-info" class="card-value">位置情報を許可してください</div>
        </div>

        <div class="card">
            <div class="card-title">日の出 (方角)</div>
            <div id="sunrise-info" class="card-value">--:-- (--)</div>
        </div>
        <div class="card">
            <div class="card-title">日没 (方角)</div>
            <div id="sunset-info" class="card-value">--:-- (--)</div>
        </div>

        <div class="card">
            <div class="card-title">風の強さ</div>
            <div id="wind-info" class="card-value">-- m/s</div>
        </div>

        <div class="card">
            <div class="card-title">湿度</div>
            <div id="humidity-info" class="card-value">-- %</div>
        </div>

        <div class="card">
            <div class="card-title">波の高さ</div>
            <div id="wave-info" class="card-value">-- m</div>
        </div>

        <div class="card">
            <div class="card-title">気圧</div>
            <div id="pressure-info" class="card-value">-- hPa</div>
        </div>

        <div class="card full-width">
            <div class="card-title">月の満ち欠け</div>
            <div id="moon-info" class="card-value">--</div>
        </div>
    </div>

    <div class="footer-info">
        データ更新状況: <span id="last-update">未更新</span>
    </div>
</div>

<script>
    // 1. 時計機能 (1秒ごとに更新)
    function updateClock() {
        const now = new Date();
        const hrs = String(now.getHours()).padStart(2, '0');
        const mins = String(now.getMinutes()).padStart(2, '0');
        const secs = String(now.getSeconds()).padStart(2, '0');
        document.getElementById('current-time').textContent = `${hrs}:${mins}:${secs}`;
    }
    setInterval(updateClock, 1000);
    updateClock();

    // 2. 位置情報の取得とAPI連携
    function initLocationFetch() {
        if (navigator.geolocation) {
            // 最初の一回を実行し、以降5分(300000ms)ごとに更新
            fetchWeatherData();
            setInterval(fetchWeatherData, 300000);
        } else {
            document.getElementById('weather-info').textContent = "位置情報がサポートされていません";
        }
    }

    async function fetchWeatherData() {
        navigator.geolocation.getCurrentPosition(async (position) => {
            const lat = position.coords.latitude;
            const lon = position.coords.longitude;

            try {
                // Open-Meteo API を利用（気象、海洋データ、日の出日の出方位など）
                // ※波の高さ(wave_height)はmarineデータから取得。日の出・日没の方位角は標準APIに含まれないため計算または推定を行います。
                const weatherUrl = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,apparent_temperature,precipitation,weather_code,pressure_msl,wind_speed_10m,wind_direction_10m&daily=sunrise,sunset&timezone=auto`;
                const marineUrl = `https://api.open-meteo.com/v1/marine?latitude=${lat}&longitude=${lon}&current=wave_height`;

                const [weatherRes, marineRes] = await Promise.all([
                    fetch(weatherUrl),
                    fetch(marineUrl)
                ]);

                const weatherData = await weatherRes.json();
                const marineData = await marineRes.json();

                displayData(weatherData, marineData);
            } catch (error) {
                console.error("データ取得エラー:", error);
                document.getElementById('weather-info').textContent = "データ取得失敗";
            }
        }, (error) => {
            document.getElementById('weather-info').textContent = "位置情報の取得を許可してください";
        });
    }

    // 天気コードを日本語に変換する簡易マッピング
    function getWeatherDesc(code) {
        if (code === 0) return "晴天";
        if ([1, 2, 3].includes(code)) return "晴れのち曇/曇り";
        if ([45, 48].includes(code)) return "霧";
        if ([51, 53, 55, 61, 63, 65, 80, 81, 82].includes(code)) return "雨/曇雨";
        if ([71, 73, 75, 77, 85, 86].includes(code)) return "雪";
        if ([95, 96, 99].includes(code)) return "雷雨";
        return "不明";
    }

    // 角度から16方位の矢印と文字列へ変換する関数
    function getDirectionArrow(deg) {
        const directions = [
            '↓北', '↙北北西', '←西北西', '↖西北', 
            '↖西北西', '↖西', '↖西南西', '↖南南西', 
            '↑南', '↗南南東', '→東南東', '↗東南', 
            '↗東北東', '→東', '↗東北東', '↖北北東'
        ];
        const idx = Math.round(((deg % 360) / 22.5)) % 16;
        return directions[idx];
    }
