<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Drive View26</title>
    <style>
        :root {
            --bg-grad-1: #090d16;
            --bg-grad-2: #151f32;
            --text-main: #f1f5f9;
            --accent: #2563eb;
            --update-flash: #34d399;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background: linear-gradient(135deg, var(--bg-grad-1), var(--bg-grad-2), #090d16);
            background-size: 400% 400%;
            animation: gradientAnim 25s ease infinite;
            color: var(--text-main);
            font-weight: bold;
            overflow-x: hidden;
            font-size: 11px;
        }

        @keyframes gradientAnim {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(9, 13, 22, 0.98);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            gap: 15px;
            padding: 20px;
            text-align: center;
        }
        #start-btn {
            padding: 16px 32px;
            font-size: 18px;
            font-weight: bold;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(37, 99, 233, 0.4);
        }

        .container {
            width: 100%;
            max-height: 55vh;
            padding: 2px;
            position: relative;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2px 4px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .title { font-size: 12px; color: #94a3b8; }
        
        #sync-btn {
            background: #1e293b;
            border: 1px solid #475569;
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 10px;
            cursor: pointer;
        }

        .grid-row {
            display: flex;
            gap: 2px;
            margin-top: 2px;
        }

        .card {
            background: rgba(30, 41, 59, 0.6);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 2px;
            padding: 3px 4px;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 4px;
            transition: border-color 0.4s ease, color 0.4s ease;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .full-width {
            flex: none;
            width: 100%;
        }

        .flash {
            border-color: var(--update-flash) !important;
            color: var(--update-flash) !important;
        }

        .list-box {
            font-size: 9.5px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            width: 100%;
        }
        
        .list-item {
            display: inline-block;
            margin-right: 4px;
            background: rgba(255,255,255,0.04);
            padding: 1px 3px;
            border-radius: 2px;
        }
    </style>
</head>
<body>

    <div id="overlay">
        <button id="start-btn">Drive View26 起動</button>
    </div>

    <div class="container">
        <div class="header">
            <span class="title">🚗 Drive View26</span>
            <button id="sync-btn">🔄一括更新</button>
        </div>

        <div class="grid-row">
            <div class="card full-width" id="c-weather">
                <span>🕒 <span id="val-time">--:--</span></span>
                <span>🌈 <span id="val-weather">⏳...</span></span>
            </div>
        </div>

        <div class="grid-row">
            <div class="card full-width" id="c-sun">
                <span>🌅 <span id="val-sun">⏳...</span></span>
            </div>
        </div>

        <div class="grid-row">
            <div class="card full-width" id="c-env">
                <span>💨 <span id="val-env">⏳...</span></span>
            </div>
        </div>

        <div class="grid-row">
            <div class="card" id="c-heading">
                <span>🧭 <span id="val-heading">⏳...</span></span>
            </div>
            <div class="card" id="c-motion">
                <span>⛰️ <span id="val-altitude">⏳...</span></span>
                <span>🚀 <span id="val-speed">0 km/h</span></span>
            </div>
        </div>

        <div class="grid-row">
            <div class="card full-width" id="c-address">
                <span>📍 <span id="val-address">⏳...</span></span>
            </div>
        </div>

        <div class="grid-row">
            <div class="card full-width" id="c-geo-spot">
                <span>🏢 <span id="val-landmark">--</span></span>
                <span>🛣️ <span id="val-cross">--</span></span>
            </div>
        </div>

        <div class="grid-row">
            <div class="card full-width" id="c-poi-cvs">
                <span>🏪 <span id="val-cvs" class="list-box">⏳...</span></span>
            </div>
        </div>

        <div class="grid-row">
            <div class="card full-width" id="c-poi-station">
                <span>🚃 <span id="val-station" class="list-box">⏳...</span></span>
            </div>
        </div>

        <div class="grid-row">
            <div class="card full-width" id="c-poi-gas">
                <span>⛽ <span id="val-gas" class="list-box">⏳...</span></span>
            </div>
        </div>

        <div class="grid-row">
            <div class="card full-width" id="c-poi-toilet">
                <span>🚾 <span id="val-toilet" class="list-box">⏳...</span></span>
            </div>
        </div>
    </div>

    <script>
        let lat = null, lon = null, lastLat = null, lastLon = null;
        let heading = 0;
        let sensorActive = false;
        let initialPoiFetched = false; // 初回POI取得完了判定フラグ
        
        const INTERVALS = { 
            weather: 220, sun: 1200, env: 300, address: 120, geo_spot: 120, 
            poi_cvs: 150, poi_station: 150, poi_gas: 150, poi_toilet: 150 
        };
        let timers = { ...INTERVALS };

        const DIR_ARROWS = ['↑', '↗', '→', '↘', '↓', '↙', '←', '↖'];
        const DIR_NAMES = ['北', '北北東', '北東', '東北東', '東', '東南東', '南東', '南南東', '南', '南南西', '南西', '西北西', '西', '西北西', '北西', '北北西'];

        document.getElementById('start-btn').addEventListener('click', function() {
            document.getElementById('overlay').style.display = 'none';
            
            setTimeout(async () => {
                try {
                    if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                        const state = await DeviceOrientationEvent.requestPermission();
                        if (state === 'granted') activateCompass();
                    } else {
                        activateCompass();
                    }
                } catch (e) {
                    console.log('センサー権限要求スキップ:', e);
                    activateCompass();
                }
                initApp();
            }, 10);
        });

        function activateCompass() {
            try {
                window.addEventListener('deviceorientationabsolute', updateHeading, true);
                window.addEventListener('deviceorientation', updateHeading, true);
            } catch(e) { console.error(e); }
        }

        document.getElementById('sync-btn').addEventListener('click', () => {
            triggerAllUpdates();
        });

        function initApp() {
            setInterval(() => {
                const now = new Date();
                document.getElementById('val-time').innerText = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            }, 1000);

            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(updateLocation, handleError, {
                    enableHighAccuracy: true,
                    timeout: 8000,
                    maximumAge: 0
                });
            } else {
                document.getElementById('val-address').innerText = 'GPS非対応';
            }

            startAppTimers();
            triggerAllUpdates();
        }

        function updateLocation(position) {
            lat = position.coords.latitude;
            lon = position.coords.longitude;
            
            // GPSの有効な緯度経度をしっかり補足した段階で、まだPOIの初回検索が完了していなければ自動リトライ
            if (lat && lon && !initialPoiFetched) {
                initialPoiFetched = true;
                fetchPOIs();
            }

            if (!sensorActive && position.coords.heading !== null && position.coords.heading !== undefined && !isNaN(position.coords.heading)) {
                heading = Math.round(position.coords.heading);
                renderHeadingUI();
            } else if (!sensorActive && lastLat !== null && lastLon !== null) {
                const dLon = (lon - lastLon) * Math.PI / 180;
                const lat1 = lastLat * Math.PI / 180;
                const lat2 = lat * Math.PI / 180;
                const y = Math.sin(dLon) * Math.cos(lat2);
                const x = Math.cos(lat1) * Math.sin(lat2) - Math.sin(lat1) * Math.cos(lat2) * Math.cos(dLon);
                let gpsHeading = Math.atan2(y, x) * 180 / Math.PI;
                gpsHeading = (gpsHeading + 360) % 360;
                
                if (getDistance(lastLat, lastLon, lat, lon) > 0.002) { 
                    heading = Math.round(gpsHeading);
                    renderHeadingUI();
                }
            }
            
            lastLat = lat;
            lastLon = lon;

            let alt = '0m(低精度)';
            if (position.coords.altitude !== null && position.coords.altitude !== undefined) {
                alt = Math.round(position.coords.altitude) + 'm';
            }
            const speed = position.coords.speed ? Math.round(position.coords.speed * 3.6) : 0;
            
            document.getElementById('val-altitude').innerText = alt;
            document.getElementById('val-speed').innerText = speed + ' km/h';
            flashCard('c-motion');
        }

        function updateHeading(event) {
            let currentHeading = null;
            if (event.webkitCompassHeading !== undefined && event.webkitCompassHeading !== null) {
                currentHeading = event.webkitCompassHeading;
                sensorActive = true;
            } else if (event.absolute === true && event.alpha !== null) {
                currentHeading = 360 - event.alpha;
                sensorActive = true;
            } else if (event.alpha !== null && !sensorActive) {
                currentHeading = 360 - event.alpha;
            }

            if (currentHeading !== null && !isNaN(currentHeading)) {
                heading = Math.round(currentHeading);
                renderHeadingUI();
            }
        }

        function renderHeadingUI() {
            const idx = Math.round(heading / 22.5) % 16;
            const arrowIdx = Math.round(heading / 45) % 8;
            const arrow = DIR_ARROWS[arrowIdx];
            const marker = sensorActive ? "" : "🚗";
            document.getElementById('val-heading').innerText = `${arrow}${DIR_NAMES[idx]} ${heading}°${marker}`;
            flashCard('c-heading');
        }

        function handleError(err) {
            console.warn(`GPS取得エラー(${err.code})`);
        }

        function getBearingArrow(lat1, lon1, lat2, lon2) {
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const l1 = lat1 * Math.PI / 180;
            const l2 = lat2 * Math.PI / 180;
            const y = Math.sin(dLon) * Math.cos(l2);
            const x = Math.cos(l1) * Math.sin(l2) - Math.sin(l1) * Math.cos(l2) * Math.cos(dLon);
            let brng = Math.atan2(y, x) * 180 / Math.PI;
            brng = (brng + 360) % 360;
            
            const relativeAngle = (brng - heading + 360) % 360;
            const arrowIdx = Math.round(relativeAngle / 45) % 8;
            return DIR_ARROWS[arrowIdx];
        }

        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
        }

        async function fetchWeatherAndEnv() {
            if (!lat || !lon) return;
            try {
                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,precipitation,weather_code,pressure_msl,wind_speed_10m&hourly=precipitation_probability&forecast_days=1`);
                const data = await res.json();
                const cur = data.current;
                const pop = data.hourly ? data.hourly.precipitation_probability[new Date().getHours()] : 0;
                
                let wText = "晴";
                if(cur.weather_code > 3 && cur.weather_code <= 50) wText = "曇";
                if(cur.weather_code > 50) wText = "曇雨";

                document.getElementById('val-weather').innerText = `${wText} ${Math.round(cur.temperature_2m)}℃ 降水${pop}%、${Math.round(cur.precipitation)}mm`;
                document.getElementById('val-env').innerText = `${Math.round(cur.wind_speed_10m)}m、💧${cur.relative_humidity_2m}%、🎈${Math.round(cur.pressure_msl)}hPa`;
                
                flashCard('c-weather');
                flashCard('c-env');
            } catch (e) { console.error(e); }
        }

        async function fetchSun() {
            if (!lat || !lon) return;
            try {
                const res = await fetch(`https://api.sunrise-sunset.org/json?lat=${lat}&lng=${lon}&formatted=0`);
                const data = await res.json();
                const sTime = new Date(data.results.sunrise).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                const eTime = new Date(data.results.sunset).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                
                const sArrow = getBearingArrow(lat, lon, lat, lon + 0.1);
                const eArrow = getBearingArrow(lat, lon, lat, lon - 0.1);

                document.getElementById('val-sun').innerText = `${sTime}(${sArrow}東) 没:${eTime}(${eArrow}西)`;
                flashCard('c-sun');
            } catch (e) { console.error(e); }
        }

        async function fetchAddressAndSpots() {
            if (!lat || !lon) return;
            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&addressdetails=1`, {
                    headers: { 'Accept-Language': 'ja' }
                });
                const data = await res.json();
                const addr = data.address;
                const pc = addr.postcode ? `〒${addr.postcode}` : '〒---';
                const state = addr.province || addr.state || '';
                const city = addr.city || addr.suburb || addr.town || '';
                const road = addr.road || '';
                const houseNum = addr.house_number || '';
                
                document.getElementById('val-address').innerText = `${pc} ${state}${city}${road} ${houseNum}`;
                document.getElementById('val-landmark').innerText = data.name || addr.building || '付近の建物';
                document.getElementById('val-cross').innerText = addr.quarter || addr.suburb || '主要交差点付近';

                flashCard('c-address');
                flashCard('c-geo-spot');
            } catch (e) { console.error(e); }
        }

        async function fetchPOIs() {
            if (!lat || !lon) return;
            const targets = {
                cvs: '[amenity=convenience]',
                station: '[railway=station]',
                gas: '[amenity=fuel]',
                toilet: '[amenity=toilets]'
            };

            for (const [key, filter] of Object.entries(targets)) {
                try {
                    const query = `[out:json];node${filter}(around:3000,${lat},${lon});out;`;
                    const res = await fetch(`https://overpass-api.de/api/interpreter?data=${encodeURIComponent(query)}`);
                    
                    // API制限(429)やエラーが返った場合は「検索中...」に戻して次回の定期更新に委ねる
                    if (res.status === 429) {
                        document.getElementById(`val-${key}`).innerHTML = '⏳アクセス制限中(自動再試行します)';
                        continue;
                    }
                    
                    const data = await res.json();
                    let elements = data.elements || [];
                    
                    elements.forEach(el => {
                        el.distance = getDistance(lat, lon, el.lat, el.lon);
                        el.arrow = getBearingArrow(lat, lon, el.lat, el.lon);
                    });
                    elements.sort((a, b) => a.distance - b.distance);

                    let html = '';
                    const top3 = elements.slice(0, 3);
                    if(top3.length > 0) {
                        top3.forEach(el => {
                            let name = el.tags.name || '名称不明';
                            if(key === 'station') {
                                const line = el.tags.operator || el.tags.line || '';
                                name = line ? `${line} ${name}` : name;
                            }
                            html += `<span class="list-item">${name} ${el.distance.toFixed(1)}km ${el.arrow}</span>`;
                        });
                    } else {
                        html = '周辺3km以内に見つかりません';
                    }
                    document.getElementById(`val-${key}`).innerHTML = html;
                    flashCard(`c-poi-${key}`);
                } catch (e) { 
                    console.error(e);
                    document.getElementById(`val-${key}`).innerHTML = '⚠️通信エラー(再試行中)';
                }
            }
        }

        function flashCard(id) {
            const el = document.getElementById(id);
            if(el) {
                el.classList.add('flash');
                setTimeout(() => el.classList.remove('flash'), 800);
            }
        }

        function startAppTimers() {
            setInterval(() => {
                for (const key in timers) {
                    if (timers[key] > 0) {
                        timers[key]--;
                    } else {
                        executeTargetUpdate(key);
                    }
                }
            }, 1000);
        }

        function executeTargetUpdate(key) {
            if (!lat || !lon) return;
            if (key === 'weather') { fetchWeatherAndEnv(); timers.weather = INTERVALS.weather; }
            if (key === 'sun') { fetchSun(); timers.sun = INTERVALS.sun; }
            if (key === 'env') { fetchWeatherAndEnv(); timers.env = INTERVALS.env; }
            if (key === 'address' || key === 'geo_spot') { fetchAddressAndSpots(); timers.address = INTERVALS.address; timers.geo_spot = INTERVALS.geo_spot; }
            if (key.startsWith('poi_')) { fetchPOIs(); timers.poi_cvs = INTERVALS.poi_cvs; timers.poi_station = INTERVALS.poi_station; timers.poi_gas = INTERVALS.poi_gas; timers.poi_toilet = INTERVALS.poi_toilet; }
        }

        function triggerAllUpdates() {
            if(!lat || !lon) {
                navigator.geolocation.getCurrentPosition(p => {
                    updateLocation(p);
                    triggerAllUpdates();
                }, handleError, {enableHighAccuracy: true});
                return;
            }
            fetchWeatherAndEnv();
            fetchSun();
            fetchAddressAndSpots();
            fetchPOIs();
            for (const key in timers) timers[key] = INTERVALS[key];
        }
    </script>
</body>
</html>
