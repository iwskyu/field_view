<!DOCTYPE html>
<html content="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drive View22</title>
    <style>
        :root {
            --bg-grad-1: #1a1c23;
            --bg-grad-2: #0f1015;
            --accent-color: #00ffcc;
            --text-color: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-weight: bold;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body, html {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--bg-grad-1), var(--bg-grad-2));
            background-size: 400% 400%;
            animation: gradientAnimation 15s ease infinite;
            color: var(--text-color);
            overflow: hidden;
        }

        @keyframes gradientAnimation {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* スマホ上半分（50vh）に制限 */
        #main-container {
            width: 100%;
            height: 50vh;
            padding: 4px;
            display: flex;
            flex-direction: column;
            position: relative;
            border-bottom: 2px solid #333;
            font-size: 11px;
        }

        /* ヘッダー領域 */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 24px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 2px;
        }

        .title {
            color: var(--accent-color);
            font-size: 12px;
        }

        .btn {
            background: rgba(0, 255, 204, 0.2);
            border: 1px solid var(--accent-color);
            color: #fff;
            padding: 2px 6px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 10px;
        }

        /* コンテンツスクロールエリア（極限まで詰め込む） */
        .content-scroll {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 2px;
            padding-top: 2px;
        }

        .row {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            padding: 2px 4px;
            border-radius: 3px;
            min-height: 20px;
            white-space: nowrap;
        }

        .icon {
            margin-right: 4px;
            font-size: 13px;
            flex-shrink: 0;
        }

        .data {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .cd {
            font-size: 8px;
            color: #888;
            margin-left: 4px;
            flex-shrink: 0;
        }

        /* 位置情報要求オーバーレイ */
        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 50vh;
            background: rgba(15,16,21,0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        
        #overlay .btn-large {
            padding: 15px 30px;
            font-size: 16px;
            background: var(--accent-color);
            color: #000;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="overlay">
        <button class="btn-large" onclick="initApp()">🎯 Drive View22 を起動</button>
    </div>

    <div id="main-container">
        <header>
            <span class="title">🚗 Drive View22</span>
            <button class="btn" onclick="forceUpdateAll()">🔄一括</button>
        </header>

        <div class="content-scroll">
            <div class="row"><span class="icon">🕒</span><span class="data" id="time">-:-</span></div>
            
            <div class="row"><span class="icon">☁️</span><span class="data" id="weather">-</span><span class="cd" id="cd-weather">300</span></div>
            
            <div class="row"><span class="icon">🌅</span><span class="data" id="sun">-</span><span class="cd" id="cd-sun">300</span></div>
            
            <div class="row"><span class="icon">💨</span><span class="data" id="atmosphere">-</span><span class="cd" id="cd-atmosphere">300</span></div>
            
            <div class="row"><span class="icon">📍</span><span class="data" id="address" style="font-size:9px;">-</span><span class="cd" id="cd-address">120</span></div>
            
            <div class="row"><span class="icon">🏢</span><span class="data" id="landmark">-</span><span class="cd" id="cd-landmark">120</span></div>
            
            <div class="row"><span class="icon">🚦</span><span class="data" id="intersection">-</span><span class="cd" id="cd-intersection">120</span></div>
            
            <div class="row"><span class="icon">🧭</span><span class="data" id="heading">-</span><span class="cd" id="cd-heading">1</span></div>
            
            <div class="row"><span class="icon">⛰️</span><span class="data" id="altitude">-</span><span class="cd" id="cd-altitude">3</span></div>
            
            <div class="row"><span class="icon">⚡</span><span class="data" id="speed">-</span><span class="cd" id="cd-speed">3</span></div>
            
            <div class="row"><span class="icon">🏪</span><span class="data" id="poi-convenience" style="font-size:9px;">-</span><span class="cd" id="cd-convenience">120</span></div>
            
            <div class="row"><span class="icon">Ⓢ</span><span class="data" id="poi-station" style="font-size:9px;">-</span><span class="cd" id="cd-station">120</span></div>
            
            <div class="row"><span class="icon">⛽</span><span class="data" id="poi-gs" style="font-size:9px;">-</span><span class="cd" id="cd-gs">120</span></div>
            
            <div class="row"><span class="icon">🚾</span><span class="data" id="poi-toilet" style="font-size:9px;">-</span><span class="cd" id="cd-toilet">120</span></div>
        </div>
    </div>

    <script>
        // --- 設定・APIキー設定 ---
        // 無料で高精度な位置検索・周辺検索を行う場合、Overpass API(OpenStreetMap)を使用します（キー不要）。
        // 住所逆ジオコーディングには無料の「農業研究所 逆ジオコーディングAPI」または「OSM Nominatim」を使用します。
        
        let lat = 35.65858; // デフォルト(東京タワー)
        let lon = 139.74543;
        let lastLat = null;
        let lastLon = null;
        let headingDeg = 0;

        // タイマー管理用オブジェクト
        const timers = {
            weather: { current: 0, max: 300, action: updateWeather },
            sun: { current: 0, max: 300, action: updateSun },
            atmosphere: { current: 0, max: 300, action: updateAtmosphere },
            address: { current: 0, max: 120, action: updateAddress },
            landmark: { current: 0, max: 120, action: updateLandmark },
            intersection: { current: 0, max: 120, action: updateIntersection },
            heading: { current: 0, max: 1, action: updateHeading },
            altitude: { current: 0, max: 3, action: updateAltitude },
            speed: { current: 0, max: 3, action: updateSpeed },
            convenience: { current: 0, max: 120, action: () => updateOSMPOIs('convenience') },
            station: { current: 0, max: 120, action: () => updateOSMPOIs('station') },
            gs: { current: 0, max: 120, action: () => updateOSMPOIs('gs') },
            toilet: { current: 0, max: 120, action: () => updateOSMPOIs('toilet') }
        };

        function initApp() {
            document.getElementById('overlay').style.display = 'none';
            
            // 位置情報のリアルタイム監視(GPS)
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition((position) => {
                    lat = position.coords.latitude;
                    lon = position.coords.longitude;
                    
                    // 速度(m/sからkm/hに変換)
                    if(position.coords.speed !== null) {
                        const kmh = Math.round(position.coords.speed * 3.6);
                        document.getElementById('speed').textContent = `${kmh} km/h`;
                    } else {
                        document.getElementById('speed').textContent = `0 km/h`;
                    }
                    
                    // 高度
                    if(position.coords.altitude !== null) {
                        document.getElementById('altitude').textContent = `${Math.round(position.coords.altitude)}m`;
                    }
                    
                    // デバイスの進行方向(取得できれば)
                    if(position.coords.heading !== null) {
                        headingDeg = position.coords.heading;
                    }
                }, (err) => console.error("GPSエラー", err), {
                    enableHighAccuracy: true,
                    timeout: 5000,
                    maximumAge: 0
                });

                // スマホのコンパス（厳密な方向用）
                window.addEventListener('deviceorientationabsolute', handleOrientation, true);
                window.addEventListener('deviceorientation', handleOrientation, true);
            }

            // 時計は1秒毎に更新
            setInterval(updateClock, 1000);
            updateClock();

            // メインのカウントダウン＆更新ループ開始
            forceUpdateAll();
            setInterval(processTimers, 1000);
        }

        function handleOrientation(event) {
            let heading = event.alpha;
            if (event.webkitCompassHeading) heading = event.webkitCompassHeading; // iOS対応
            if(heading) headingDeg = heading;
        }

        function updateClock() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('time').textContent = `${h}:${m}`;
        }

        function processTimers() {
            for (let key in timers) {
                timers[key].current--;
                if (timers[key].current <= 0) {
                    timers[key].action();
                    timers[key].current = timers[key].max;
                }
                const cdEl = document.getElementById(`cd-${key}`);
                if (cdEl) cdEl.textContent = timers[key].current;
            }
        }

        function forceUpdateAll() {
            for (let key in timers) {
                timers[key].action();
                timers[key].current = timers[key].max;
                const cdEl = document.getElementById(`cd-${key}`);
                if (cdEl) cdEl.textContent = timers[key].current;
            }
        }

        // --- 各種データ取得ロジック（無料API連携） ---

        // 2, 4. 天気・気圧関連 (Open-Meteo APIを使用: キー不要・無料)
        function updateWeather() {
            fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,precipitation,weather_code,surface_pressure,wind_speed_10m`)
                .then(res => res.json())
                .then(data => {
                    const c = data.current;
                    // 簡単なウェザーコード変換
                    let wStr = "☁️";
                    if(c.weather_code === 0) wStr = "☀️";
                    else if([1,2,3].includes(c.weather_code)) wStr = "⛅";
                    else if([51,53,55,61,63,65,80,81,82].includes(c.weather_code)) wStr = "🌧️";
                    
                    document.getElementById('weather').textContent = `${wStr} ${Math.round(c.temperature_2m)}℃ 降水:${c.precipitation}mm`;
                }).catch(() => {});
        }

        function updateAtmosphere() {
            fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=relative_humidity_2m,surface_pressure,wind_speed_10m`)
                .then(res => res.json())
                .then(data => {
                    const c = data.current;
                    document.getElementById('atmosphere').textContent = `${Math.round(c.wind_speed_10m)}m 💧${c.relative_humidity_2m}% ⏲️${Math.round(c.surface_pressure)}hPa`;
                }).catch(() => {});
        }

        // 3. 日の出・日没 (Sunrise Sunset APIを使用: キー不要・無料)
        function updateSun() {
            fetch(`https://api.sunrise-sunset.org/json?lat=${lat}&lng=${lon}&formatted=0`)
                .then(res => res.json())
                .then(data => {
                    const sunrise = new Date(data.results.sunrise).toLocaleTimeString('ja-JP', {hour: '2-digit', minute:'2-digit'});
                    const sunset = new Date(data.results.sunset).toLocaleTimeString('ja-JP', {hour: '2-digit', minute:'2-digit'});
                    const dir = getDirectionChar(headingDeg);
                    document.getElementById('sun').textContent = `🌅${sunrise} 🌇${sunset} (${dir})`;
                }).catch(() => {});
        }

        // 5. 住所・郵便番号 (OSM Nominatim)
        function updateAddress() {
            fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&addressdetails=1`, {
                headers: { 'User-Agent': 'DriveView22_App' }
            })
            .then(res => res.json())
            .then(data => {
                const addr = data.address;
                const post = addr.postcode ? `〒${addr.postcode}` : '〒---';
                const state = addr.province || addr.state || '';
                const city = addr.city || addr.suburb || addr.town || '';
                const road = addr.road || '';
                document.getElementById('address').textContent = `${post} ${state}${city}${road}`;
            }).catch(() => {});
        }

        // 6, 7. 建物・最寄り交差点 (Overpass APIから近隣地物を抽出)
        function updateLandmark() {
            const query = `[out:json];nwr(around:100, ${lat}, ${lon})[building];out tags center 1;`;
            fetch(`https://overpass-api.de/api/interpreter?data=${encodeURIComponent(query)}`)
                .then(res => res.json())
                .then(data => {
                    if(data.elements && data.elements.length > 0){
                        const name = data.elements[0].tags.name || "周辺の建物";
                        document.getElementById('landmark').textContent = name;
                    } else {
                        document.getElementById('landmark').textContent = "ランドマークなし";
                    }
                }).catch(() => {});
        }

        function updateIntersection() {
            const query = `[out:json];node(around:200, ${lat}, ${lon})[highway=traffic_signals];out 1;`;
            fetch(`https://overpass-api.de/api/interpreter?data=${encodeURIComponent(query)}`)
                .then(res => res.json())
                .then(data => {
                    if(data.elements && data.elements.length > 0){
                        const tags = data.elements[0].tags;
                        document.getElementById('intersection').textContent = tags.name || `交差点(信号機あり)`;
                    } else {
                        document.getElementById('intersection').textContent = "近隣に該当交差点なし";
                    }
                }).catch(() => {});
        }

        // 8. 方角更新 (1秒)
        function updateHeading() {
            const dirChar
