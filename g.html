<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drive View18</title>
    <style>
        /* 背景グラデーションアニメーション */
        @keyframes gradAnim {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body {
            margin: 0;
            padding: 20px;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(-45deg, #1e3c72, #2a5298, #08171e, #123456);
            background-size: 400% 400%;
            animation: gradAnim 15s ease infinite;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        #title {
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.6);
        }

        /* 一括更新ボタン */
        #sync-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            font-size: 2rem;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid #fff;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: transform 0.2s;
        }
        #sync-btn:active { transform: scale(0.9); }

        /* 初回位置情報取得ボタン */
        #start-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        #start-btn {
            padding: 20px 40px;
            font-size: 2rem;
            font-weight: bold;
            background: #ff4757;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255,71,87,0.5);
        }

        /* グリッドレイアウト */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1200px;
        }

        .card {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 15px;
            padding: 15px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(4px);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
        }

        .card-title {
            font-size: 1.2rem;
            font-weight: bold;
            opacity: 0.8;
            margin-bottom: 5px;
        }

        .card-value {
            font-size: 2.2rem;
            font-weight: bold;
            word-wrap: break-word;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
        }

        .small-text {
            font-size: 1.3rem !important; /* 長文用 */
        }

        .countdown {
            position: absolute;
            bottom: 5px;
            right: 10px;
            font-size: 0.8rem;
            opacity: 0.5;
        }

        .list-item {
            margin-bottom: 5px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 5px;
        }
    </style>
</head>
<body>

    <div id="title">🚗 Drive View18</div>
    <button id="sync-btn" onclick="forceUpdateAll()">🔄</button>

    <div id="start-overlay">
        <button id="start-btn" onclick="initApp()">START (位置情報許可)</button>
    </div>

    <div class="grid-container">
        <div class="card">
            <div class="card-title">🕒</div>
            <div class="card-value" id="time-val">--:--</div>
            <div class="countdown">REALTIME</div>
        </div>

        <div class="card">
            <div class="card-title">🌡️ / 🌤️</div>
            <div class="card-value" id="weather-val">--</div>
            <div class="countdown" id="cd-weather">🔄 --s</div>
        </div>

        <div class="card">
            <div class="card-title">🌅 / 🌇</div>
            <div class="card-value" id="sun-val" style="font-size: 1.6rem;">--</div>
            <div class="countdown" id="cd-sun">🔄 --s</div>
        </div>

        <div class="card">
            <div class="card-title">💨 / 💧 / 🌀</div>
            <div class="card-value" id="env-val" style="font-size: 1.6rem;">--</div>
            <div class="countdown" id="cd-env">🔄 --s</div>
        </div>

        <div class="card">
            <div class="card-title">📮</div>
            <div class="card-value" id="zip-val">--</div>
            <div class="countdown" id="cd-zip">🔄 --s</div>
        </div>

        <div class="card">
            <div class="card-title">📍</div>
            <div class="card-value small-text" id="address-val">--</div>
            <div class="countdown" id="cd-address">🔄 --s</div>
        </div>

        <div class="card">
            <div class="card-title">🏢</div>
            <div class="card-value small-text" id="landmark-val">--</div>
            <div class="countdown" id="cd-landmark">🔄 --s</div>
        </div>

        <div class="card">
            <div class="card-title">🧭</div>
            <div class="card-value" id="direction-val">--</div>
            <div class="countdown" id="cd-fast1">🔄 --s</div>
        </div>

        <div class="card">
            <div class="card-title">⛰️</div>
            <div class="card-value" id="altitude-val">--</div>
            <div class="countdown" id="cd-fast2">🔄 --s</div>
        </div>

        <div class="card">
            <div class="card-title">⚡</div>
            <div class="card-value" id="speed-val">--</div>
            <div class="countdown" id="cd-fast3">🔄 --s</div>
        </div>

        <div class="card">
            <div class="card-title">🚉 (3)</div>
            <div class="card-value small-text" id="station-val">--</div>
            <div class="countdown" id="cd-places1">🔄 --s</div>
        </div>

        <div class="card">
            <div class="card-title">🚾 (3)</div>
            <div class="card-value small-text" id="toilet-val">--</div>
            <div class="countdown" id="cd-places2">🔄 --s</div>
        </div>

        <div class="card">
            <div class="card-title">⛽ (3)</div>
            <div class="card-value small-text" id="gas-val">--</div>
            <div class="countdown" id="cd-places3">🔄 --s</div>
        </div>

        <div class="card">
            <div class="card-title">🏪 (3)</div>
            <div class="card-value small-text" id="convenience-val">--</div>
            <div class="countdown" id="cd-places4">🔄 --s</div>
        </div>
    </div>

    <script>
        let lat = null, lon = null;
        let heading = 0, altitude = 0, speed = 0;

        // タイマー管理オブジェクト
        const timers = {
            weather: { current: 0, max: 300, exec: updateWeather, elementId: 'cd-weather' },
            sun: { current: 0, max: 300, exec: updateSun, elementId: 'cd-sun' },
            env: { current: 0, max: 300, exec: updateEnv, elementId: 'cd-env' },
            geo120: { current: 0, max: 120, exec: updateGeo120, elementId: null }, // 住所関連まとめて管理
            fast3: { current: 0, max: 3, exec: updateFast3, elementId: null } // 高速更新系
        };

        function initApp() {
            document.getElementById('start-overlay').style.display = 'none';
            if (navigator.geolocation) {
                // リアルタイムの位置・速度・方位監視
                navigator.geolocation.watchPosition(handleLocation, handleError, {
                    enableHighAccuracy: true,
                    timeout: 5000,
                    maximumAge: 0
                });
                // メインループの開始
                setInterval(clockTick, 1000);
                forceUpdateAll();
            } else {
                alert("位置情報がサポートされていません。");
            }
        }

        function handleLocation(position) {
            lat = position.coords.latitude;
            lon = position.coords.longitude;
            altitude = position.coords.altitude || 0;
            speed = position.coords.speed ? Math.round(position.coords.speed * 3.6) : 0; // m/s to km/h
            heading = position.coords.heading || 0;
        }

        function handleError(error) {
            console.warn("位置情報取得エラー: " + error.message);
        }

        // 1秒ごとの定期処理
        function clockTick() {
            // 現在時刻更新
            const now = new Date();
            document.getElementById('time-val').innerText = now.toLocaleTimeString('ja-JP', {hour: '2-digit', minute:'2-digit', second:'2-digit'});

            if (!lat || !lon) return;

            // 各種タイマーのカウントダウン
            for (let key in timers) {
                timers[key].current--;
                if (timers[key].current <= 0) {
                    timers[key].exec();
                    timers[key].current = timers[key].max;
                }
                // カウントダウン表示の更新
                if (timers[key].elementId) {
                    document.getElementById(timers[key].elementId).innerText = `🔄 ${timers[key].current}s`;
                }
            }

            // 個別連動カウントダウン表示の補完
            document.getElementById('cd-zip').innerText = `🔄 ${timers.geo120.current}s`;
            document.getElementById('cd-address').innerText = `🔄 ${timers.geo120.current}s`;
            document.getElementById('cd-landmark').innerText = `🔄 ${timers.geo120.current}s`;
            document.getElementById('cd-places1').innerText = `🔄 ${timers.geo120.current}s`;
            document.getElementById('cd-places2').innerText = `🔄 ${timers.geo120.current}s`;
            document.getElementById('cd-places3').innerText = `🔄 ${timers.geo120.current}s`;
            document.getElementById('cd-places4').innerText = `🔄 ${timers.geo120.current}s`;
            
            document.getElementById('cd-fast1').innerText = `🔄 ${timers.fast3.current}s`;
            document.getElementById('cd-fast2').innerText = `🔄 ${timers.fast3.current}s`;
            document.getElementById('cd-fast3').innerText = `🔄 ${timers.fast3.current}s`;
        }

        function forceUpdateAll() {
            if (!lat || !lon) {
                // 初回のみダミーか待機
                navigator.geolocation.getCurrentPosition((pos) => {
                    handleLocation(pos);
                    executeAllCalls();
                }, handleError);
                return;
            }
            executeAllCalls();
        }

        function executeAllCalls() {
            for (let key in timers) {
                timers[key].exec();
                timers[key].current = timers[key].max;
            }
        }

        // 3秒更新系（方位・標高・速度）
        function updateFast3() {
            const dirText = getDirectionText(heading);
            document.getElementById('direction-val').innerText = `${dirText} ${Math.round(heading)}°`;
            document.getElementById('altitude-val').innerText = `${Math.round(altitude)}m`;
            document.getElementById('speed-val').innerText = `${speed} km/h`;
        }

        // 5分更新：天気・気温・降水確率 (Open-Meteo)
        async function updateWeather() {
            try {
                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=precipitation_probability&current_weather=true&timezone=Asia%2FTokyo`);
                const data = await res.json();
                const temp = Math.round(data.current_weather.temperature);
                const code = data.current_weather.weathercode;
                const prob = data.hourly.precipitation_probability[0]; // 直近の降水確率
                
                let weatherEmoji = "🌤️";
                if (code >= 60 && code <= 69) weatherEmoji = "🌧️";
                else if (code >= 70 && code <= 79) weatherEmoji = "❄️";
                else if (code >= 80) weatherEmoji = "🌦️";
                else if (code > 0) weatherEmoji = "☁️";

                document.getElementById('weather-val').innerText = `${temp}℃ ${weatherEmoji} ${prob}%`;
            } catch (e) { console.error(e); }
        }

        // 5分更新：日の出・日没
        async function updateSun() {
            try {
                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=sunrise,sunset&timezone=Asia%2FTokyo`);
                const data = await res.json();
                const sunrise = data.daily.sunrise[0].split('T')[1];
                const sunset = data.daily.sunset[0].split('T')[1];
                
                // 方角は計算上のおおよそ（簡易固定表現または進行方向アジマス化）
                document.getElementById('sun-val').innerHTML = `🌅 ${sunrise} (東)<br>🌇 ${sunset} (西)`;
            } catch (e) { console.error(e); }
        }

        // 5分更新：風・湿度・気圧
        async function updateEnv() {
            try {
                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&hourly=relativehumidity_2m,surface_pressure&timezone=Asia%2FTokyo`);
                const data = await res.json();
                const wind = Math.round(data.current_weather.windspeed);
                const humid = data.hourly.relativehumidity_2m[0];
                const press = Math.round(data.hourly.surface_pressure[0]);

                document.getElementById('env-val').innerHTML = `💨 ${wind}m<br>💧 ${humid}%<br>🌀 ${press}hPa`;
            } catch (e) { console.error(e); }
        }

        // 120秒更新：住所・ランドマーク・周辺施設まとめ
        function updateGeo120() {
            updateAddressAndLandmark();
            updatePlaces();
        }

        // 住所・建物名 (Nominatim)
        async function updateAddressAndLandmark() {
            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&accept-language=ja`);
                const data = await res.json();
                if (data && data.address) {
                    const addr = data.address;
                    const zip = addr.postcode ? `〒${addr.postcode}` : '〒---';
                    const state = addr.province || addr.prefecture || '';
                    const city = addr.city || addr.ward || addr.town || '';
                    const suburb = addr.suburb || addr.neighbourhood || '';
                    const road = addr.road || '';
                    const houseNum = addr.house_number || '';

                    document.getElementById('zip-val').innerText = zip;
                    document.getElementById('address-val').innerText = `${state} ${city} ${suburb} ${road} ${houseNum}`;
                    
                    // 建物名・ランドマーク
                    const landmark = data.name || addr.building || addr.amenity || addr.shop || "周辺ビル・道路";
                    document.getElementById('landmark-val').innerText = landmark;
                }
            } catch (e) { console.error(e); }
        }

        // 周辺施設検索 (Overpass API)
        async function updatePlaces() {
            // 検索半径（約2km以内）
            const radius = 2000;
            // Overpass クエリ (駅、トイレ、ガソリンスタンド、コンビニ)
            const query = `
                [out:json][timeout:10];
                (
                  node["railway"="station"](around:${radius},${lat},${lon});
                  node["amenity"="toilets"](around:${radius},${lat},${lon});
                  node["amenity"="fuel"](around:${radius},${lat},${lon});
                  node["shop"="convenience"](around:${radius},${lat},${lon});
                );
                out body;
            `;
            
            try {
                const res = await fetch(`https://overpass-api.de/api/interpreter?data=${encodeURIComponent(query)}`);
                const data = await res.json();
                
                const stations = [];
                const toilets = [];
                const gasStations = [];
                const conveniences = [];

                data.elements.forEach(el => {
                    const dist = haversineDistance(lat, lon, el.lat, el.lon);
                    const arrow = getArrow(lat, lon, el.lat, el.lon);
                    const name = el.tags.name || el.tags.brand || "不明";
                    const line = el.tags.operator || ""; // 駅の路線簡易用
                    
                    const item = { name: name, line: line, dist: dist, arrow: arrow };

                    if (el.tags.railway === "station") stations.push(item);
                    else if (el.tags.amenity === "toilets") toilets.push(item);
                    else if (el.tags.amenity === "fuel") gasStations.push(item);
                    else if (el.tags.shop === "convenience") conveniences.push(item);
                });

                // 距離順にソートして上位3件を描画
                renderPlaceList('station-val', stations.sort((a,b)=>a.dist-b.dist).slice(0,3), true);
                renderPlaceList('toilet-val', toilets.sort((a,b)=>a.dist-b.dist).slice(0,3));
                renderPlaceList('gas-val', gasStations.sort((a,b)=>a.dist-b.dist).slice(0,3));
                renderPlaceList('convenience-val', conveniences.sort((a,b)=>a.dist-b.dist).slice(0,3));

            } catch (e) { console.error(e); }
        }

        function renderPlaceList(elementId, list, isStation = false) {
            const html = list.map(item => {
                const prefix = isStation && item.line ? `[${item.line}] ` : '';
                return `<div class="list-item">${prefix}${item.name} (${item.dist.toFixed(1)}km ${item.arrow})</div>`;
            }).join('');
            document.getElementById(elementId).innerHTML = html || "⚠️ 周辺に見つかりません";
        }

        // 方位角から文字表現への変換
        function getDirectionText(deg) {
            if (deg >= 337.5 || deg < 22.5) return "北";
            if (deg >= 22.5 && deg < 67.5) return "北東";
            if (deg >= 67.5 && deg < 112.5) return "東";
            if (deg >= 112.5 && deg < 157.5) return "南東";
            if (deg >= 157.5 && deg < 202.5) return "南";
            if (deg >= 202.5 && deg < 247.5) return "南西";
            if (deg >= 247.5 && deg < 292.5) return "西";
            if (deg >= 292.5 && deg < 337.5) return "北西";
            return "🧭";
        }

        // 2点間の矢印記号（方位）を計算
        function getArrow(lat1, lon1, lat2, lon2) {
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const y = Math.sin(dLon) * Math.cos(lat2 * Math.PI / 180);
            const x = Math.cos(lat1 * Math.PI / 180) * Math.sin(lat2 * Math.PI / 180) - Math.sin(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.cos(dLon);
            let brng = Math.atan2(y, x) * 180 / Math.PI;
            brng = (brng + 360) % 360;
            
            if (brng >= 337.5 || brng < 22.5) return "⬆️";
            if (brng >= 22.5 && brng < 67.5) return "↗️";
            if (brng >= 67.5 && brng < 112.5) return "➡️";
            if (brng >= 112.5 && brng < 157.5) return "↘️";
            if (brng >= 157.5 && brng < 202.5) return "⬇️";
            if (brng >= 202.5 && brng < 247.5) return "Layout ↙️";
            if (brng >= 247.5 && brng < 292.5) return "⬅️";
            if (brng >= 292.5 && brng < 337.5) return "↖️";
            return "📍";
        }

        // ハーバーサイン公式による距離計算 (km)
        function haversineDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }
    </script>
</body>
</html>
