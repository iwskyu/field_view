<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drive View22</title>
    <style>
        :root {
            --bg-grad-1: #1a1c23;
            --bg-grad-2: #0f1015;
            --accent-color: #00ffcc;
            --text-color: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-weight: bold;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body, html {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--bg-grad-1), var(--bg-grad-2));
            background-size: 400% 400%;
            animation: gradientAnimation 15s ease infinite;
            color: var(--text-color);
            overflow: hidden;
        }

        @keyframes gradientAnimation {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* スマホ上半分（50vh）に制限 */
        #main-container {
            width: 100%;
            height: 50vh;
            padding: 6px;
            display: flex;
            flex-direction: column;
            position: relative;
            border-bottom: 2px solid #333;
            font-size: 11px;
            visibility: hidden; /* 初期状態は非表示（ボタン押下後に表示） */
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 24px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 2px;
        }

        .title {
            color: var(--accent-color);
            font-size: 12px;
        }

        .btn {
            background: rgba(0, 255, 204, 0.2);
            border: 1px solid var(--accent-color);
            color: #fff;
            padding: 2px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
        }

        .content-scroll {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 2px;
            padding-top: 4px;
        }

        .row {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            padding: 3px 5px;
            border-radius: 3px;
            min-height: 22px;
            white-space: nowrap;
        }

        .icon {
            margin-right: 6px;
            font-size: 13px;
            flex-shrink: 0;
        }

        .data {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .cd {
            font-size: 8px;
            color: #888;
            margin-left: 4px;
            flex-shrink: 0;
        }

        /* 初期起動ボタン画面（全画面を覆う） */
        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100vh;
            background: #0f1015;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            padding: 20px;
        }
        
        #overlay h1 {
            font-size: 24px;
            color: var(--accent-color);
            margin-bottom: 20px;
        }
        
        #overlay p {
            font-size: 12px;
            color: #aaa;
            margin-bottom: 30px;
            text-align: center;
        }
        
        #overlay .btn-large {
            padding: 16px 32px;
            font-size: 18px;
            background: var(--accent-color);
            color: #000;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,255,204,0.4);
            width: 80%;
            max-width: 300px;
        }
    </style>
</head>
<body>

    <div id="overlay">
        <h1>Drive View22</h1>
        <p>※起動後、位置情報の使用を許可してください</p>
        <button class="btn-large" onclick="startApp()">START</button>
    </div>

    <div id="main-container">
        <header>
            <span class="title">🚗 Drive View22</span>
            <button class="btn" onclick="forceUpdateAll()">🔄 一括更新</button>
        </header>

        <div class="content-scroll">
            <div class="row"><span class="icon">🕒</span><span class="data" id="time">-:-</span></div>
            <div class="row"><span class="icon">☁️</span><span class="data" id="weather">データ取得中...</span><span class="cd" id="cd-weather">300</span></div>
            <div class="row"><span class="icon">🌅</span><span class="data" id="sun">-</span><span class="cd" id="cd-sun">300</span></div>
            <div class="row"><span class="icon">💨</span><span class="data" id="atmosphere">-</span><span class="cd" id="cd-atmosphere">300</span></div>
            <div class="row"><span class="icon">📍</span><span class="data" id="address" style="font-size:10px;">-</span><span class="cd" id="cd-address">120</span></div>
            <div class="row"><span class="icon">🏢</span><span class="data" id="landmark">-</span><span class="cd" id="cd-landmark">120</span></div>
            <div class="row"><span class="icon">🚦</span><span class="data" id="intersection">-</span><span class="cd" id="cd-intersection">120</span></div>
            <div class="row"><span class="icon">🧭</span><span class="data" id="heading">-</span><span class="cd" id="cd-heading">1</span></div>
            <div class="row"><span class="icon">⛰️</span><span class="data" id="altitude">-</span><span class="cd" id="cd-altitude">3</span></div>
            <div class="row"><span class="icon">⚡</span><span class="data" id="speed">-</span><span class="cd" id="cd-speed">3</span></div>
            <div class="row"><span class="icon">🏪</span><span class="data" id="poi-convenience" style="font-size:10px;">-</span><span class="cd" id="cd-convenience">120</span></div>
            <div class="row"><span class="icon">Ⓢ</span><span class="data" id="poi-station" style="font-size:10px;">-</span><span class="cd" id="cd-station">120</span></div>
            <div class="row"><span class="icon">⛽</span><span class="data" id="poi-gs" style="font-size:10px;">-</span><span class="cd" id="cd-gs">120</span></div>
            <div class="row"><span class="icon">🚾</span><span class="data" id="poi-toilet" style="font-size:10px;">-</span><span class="cd" id="cd-toilet">120</span></div>
        </div>
    </div>

    <script>
        // グローバル初期位置（横浜みなとみらい付近を仮置き）
        let lat = 35.681236; 
        let lon = 139.767125;
        let headingDeg = 0;
        let hasGpsLoaded = false;

        const timers = {
            weather: { current: 0, max: 300, action: updateWeather },
            sun: { current: 0, max: 300, action: updateSun },
            atmosphere: { current: 0, max: 300, action: updateAtmosphere },
            address: { current: 0, max: 120, action: updateAddress },
            landmark: { current: 0, max: 120, action: updateLandmark },
            intersection: { current: 0, max: 120, action: updateIntersection },
            heading: { current: 0, max: 1, action: updateHeading },
            altitude: { current: 0, max: 3, action: updateAltitude },
            speed: { current: 0, max: 3, action: updateSpeed },
            convenience: { current: 0, max: 120, action: () => updateOSMPOIs('convenience') },
            station: { current: 0, max: 120, action: () => updateOSMPOIs('station') },
            gs: { current: 0, max: 120, action: () => updateOSMPOIs('gs') },
            toilet: { current: 0, max: 120, action: () => updateOSMPOIs('toilet') }
        };

        // 1. ボタンが押されたら「即座に」画面を切り替える
        function startApp() {
            // オーバーレイを完全に消し、メインコンテナを表示
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('main-container').style.visibility = 'visible';
            
            // 時計を動かす
            setInterval(updateClock, 1000);
            updateClock();

            // 2. 画面遷移した直後に、ユーザーアクションと地続きの状態でGPSを要求（ブラウザブロックを回避）
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((position) => {
                    lat = position.coords.latitude;
                    lon = position.coords.longitude;
                    hasGpsLoaded = true;
                    // 初回データ取得
                    forceUpdateAll();
                }, (err) => {
                    alert("位置情報の取得に失敗しました。設定を確認してください。");
                    // 拒否されても動作自体は継続（初期位置のまま）
                    forceUpdateAll();
                }, { enableHighAccuracy: true, timeout: 10000 });

                // 常時監視を開始
                navigator.geolocation.watchPosition((position) => {
                    lat = position.coords.latitude;
                    lon = position.coords.longitude;
                    
                    if(position.coords.speed !== null) {
                        const kmh = Math.round(position.coords.speed * 3.6);
                        document.getElementById('speed').textContent = `${kmh} km/h`;
                    }
                    if(position.coords.altitude !== null) {
                        document.getElementById('altitude').textContent = `${Math.round(position.coords.altitude)}m`;
                    }
                    if(position.coords.heading !== null) {
                        headingDeg = position.coords.heading;
                    }
                }, null, { enableHighAccuracy: true });
            } else {
                // GPS非対応環境でも即時ダミーで動かす
                forceUpdateAll();
            }

            // タイマーループ起動
            setInterval(processTimers, 1000);
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('time').textContent = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
        }

        function processTimers() {
            for (let key in timers) {
                timers[key].current--;
                if (timers[key].current <= 0) {
                    timers[key].action();
                    timers[key].current = timers[key].max;
                }
                const cdEl = document.getElementById(`cd-${key}`);
                if (cdEl) cdEl.textContent = timers[key].current;
            }
        }

        function forceUpdateAll() {
            for (let key in timers) {
                timers[key].action();
                timers[key].current = timers[key].max;
                const cdEl = document.getElementById(`cd-${key}`);
                if (cdEl) cdEl.textContent = timers[key].current;
            }
        }

        // --- API 取得ロジック群 ---
        function updateWeather() {
            fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,precipitation,weather_code`)
                .then(res => res.json())
                .then(data => {
                    const c = data.current;
                    let wStr = "☁️";
                    if(c.weather_code === 0) wStr = "☀️";
                    else if([1,2,3].includes(c.weather_code)) wStr = "⛅";
                    else if([51,53,55,61,63,65,80,81,82].includes(c.weather_code)) wStr = "🌧️";
                    document.getElementById('weather').textContent = `${wStr} ${Math.round(c.temperature_2m)}℃ 降水:${c.precipitation}mm`;
                }).catch(() => {});
        }

        function updateAtmosphere() {
            fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=relative_humidity_2m,surface_pressure,wind_speed_10m`)
                .then(res => res.json())
                .then(data => {
                    const c = data.current;
                    document.getElementById('atmosphere').textContent = `${Math.round(c.wind_speed_10m)}m 💧${c.relative_humidity_2m}% ⏲️${Math.round(c.surface_pressure)}hPa`;
                }).catch(() => {});
        }

        function updateSun() {
            fetch(`https://api.sunrise-sunset.org/json?lat=${lat}&lng=${lon}&formatted=0`)
                .then(res => res.json())
                .then(data => {
                    const sunrise = new Date(data.results.sunrise).toLocaleTimeString('ja-JP', {hour: '2-digit', minute:'2-digit'});
                    const sunset = new Date(data.results.sunset).toLocaleTimeString('ja-JP', {hour: '2-digit', minute:'2-digit'});
                    document.getElementById('sun').textContent = `🌅${sunrise} 🌇${sunset} (${getDirectionChar(headingDeg)})`;
                }).catch(() => {});
        }

        function updateAddress() {
            fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&addressdetails=1`, {
                headers: { 'User-Agent': 'DriveView22_Mobile_v2' }
            })
            .then(res => res.json())
            .then(data => {
                const a = data.address;
                const post = a.postcode ? `〒${a.postcode}` : '〒---';
                document.getElementById('address').textContent = `${post} ${a.province||a.state||''}${a.city||a.suburb||''}${a.road||''}${a.house_number||''}`;
            }).catch(() => {});
        }

        function updateLandmark() {
            const query = `[out:json];nwr(around:150, ${lat}, ${lon})[building];out tags center 1;`;
            fetch(`https://overpass-api.de/api/interpreter?data=${encodeURIComponent(query)}`)
                .then(res => res.json())
                .then(data => {
                    if(data.elements && data.elements.length > 0){
                        document.getElementById('landmark').textContent = data.elements[0].tags.name || "付近の建物";
                    } else {
                        document.getElementById('landmark').textContent = "ランドマークなし";
                    }
                }).catch(() => { document.getElementById('landmark').textContent = "検索エラー"; });
        }

        function updateIntersection() {
            const query = `[out:json];node(around:300, ${lat}, ${lon})[highway=traffic_signals];out 1;`;
            fetch(`https://overpass-api.de/api/interpreter?data=${encodeURIComponent(query)}`)
                .then(res => res.json())
                .then(data => {
                    if(data.elements && data.elements.length > 0){
                        document.getElementById('intersection').textContent = data.elements[0].tags.name || "交差点(信号あり)";
                    } else {
                        document.getElementById('intersection').textContent = "近隣に該当交差点なし";
                    }
                }).catch(() => {});
        }

        function updateHeading() {
            document.getElementById('heading').textContent = `${getDirectionChar(headingDeg)} ${Math.round(headingDeg)}°`;
        }

        function updateAltitude() {
            if(document.getElementById('altitude').textContent === '-') document.getElementById('altitude').textContent = '0m';
        }
        
        function updateSpeed() {
            if(document.getElementById('speed').textContent === '-') document.getElementById('speed').textContent = '0 km/h';
        }

        function updateOSMPOIs(type) {
            let filter = "";
            let id = "";
            if(type === 'convenience') { filter = `[shop=convenience]`; id = 'poi-convenience'; }
            if(type === 'station') { filter = `[railway=station]`; id = 'poi-station'; }
            if(type === 'gs') { filter = `[amenity=fuel]`; id = 'poi-gs'; }
            if(type === 'toilet') { filter = `[amenity=toilets]`; id = 'poi-toilet'; }

            const query = `[out:json];nwr(around:3000, ${lat}, ${lon})${filter};out tags center 3;`;
            fetch(`https://overpass-api.de/api/interpreter?data=${encodeURIComponent(query)}`)
                .then(res => res.json())
                .then(data => {
                    if(!data.elements || data.elements.length === 0) {
                        document.getElementById(id).textContent = "周辺になし";
                        return;
                    }
                    let resArr = [];
                    data.elements.slice(0, 3).forEach(el => {
                        const name = el.tags.name || el.tags.brand || "不明";
                        const tLat = el.lat || (el.center ? el.center.lat : lat);
                        const tLon = el.lon || (el.center ? el.center.lng : lon);
                        const d = getDistance(lat, lon, tLat, tLon);
                        const arrow = getDirectionArrow((getAngle(lat, lon, tLat, tLon) - headingDeg));
                        resArr.push(`${name} ${d}km ${arrow}`);
                    });
                    document.getElementById(id).innerHTML = resArr.join(', ');
                }).catch(() => {});
        }

        // --- 便利関数群 ---
        function getDirectionChar(deg) {
            const dirs = ['北', '北北東', '北東', '東北東', '東', '東南東', '南東', '南南東', '南', '南南西', '南西', '西北西', '西', '西北西', '北西', '北北西'];
            return dirs[Math.round(((deg % 360) / 22.5)) % 16];
        }

        function getDirectionArrow(deg) {
            const arrs = ['⬆️', '↗️', '➡️', '↘️', '⬇️', '↙️', '⬅️', '↖️'];
            return arrs[Math.round(((deg + 360) % 360) / 45) % 8];
        }

        function getDistance(la1, lo1, la2, lo2) {
            const dLat = (la2 - la1) * Math.PI / 180;
            const dLon = (lo2 - lo1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(la1 * Math.PI / 180) * Math.cos(la2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return (6371 * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a))).toFixed(1);
        }

        function getAngle(la1, lo1, la2, lo2) {
            const y = Math.sin((lo2 - lo1) * Math.PI / 180) * Math.cos(la2 * Math.PI / 180);
            const x = Math.cos(la1 * Math.PI / 180) * Math.sin(la2 * Math.PI / 180) - Math.sin(la1 * Math.PI / 180) * Math.cos(la2 * Math.PI / 180) * Math.cos((lo2 - lo1) * Math.PI / 180);
            return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
        }
    </script>
</body>
</html>
