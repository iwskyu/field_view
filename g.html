<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Drive View5</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-weight: bold !important; }
    body { color: #fff; font-family: -apple-system, sans-serif; overflow: hidden; background-color: #000; }
    
    /* 背景グラデーションアニメーション */
    @keyframes gradBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    
    /* 上半分(50vh)専用コンテナ */
    .dashboard {
      height: 50vh; width: 100vw; padding: 2px;
      display: flex; flex-direction: column; justify-content: space-between;
      background: linear-gradient(-45deg, #0f2027, #203a43, #2c5364, #111);
      background-size: 400% 400%;
      animation: gradBG 12s ease infinite;
      border-bottom: 2px solid #666;
    }
    .bottom-space { height: 50vh; background: #000; }

    /* 基本レイアウト枠 */
    .row { display: flex; align-items: center; justify-content: space-between; background: rgba(0,0,0,0.4); border-radius: 4px; margin-bottom: 1px; padding: 1px 3px; }
    .flex-wrap { display: flex; align-items: center; gap: 4px; }
    
    /* 視認性重視のコンパクトな太字フォント（vh/vwによる設計） */
    .txt-l { font-size: 2.3vh; }
    .txt-m { font-size: 1.7vh; }
    .txt-s { font-size: 1.3vh; color: #ccc; }
    .c-green { color: #00e676; }
    .c-yellow { color: #ffeb3b; }
    .hide { display: none !important; }
    
    /* カウントダウン・制御系 */
    .cd-badge { font-size: 1.0vh; background: #444; padding: 1px 2px; border-radius: 2px; color: #fff; margin-left: 2px; }
    .btn-ctrl { background: #333; color: #fff; border: 1px solid #fff; padding: 1px 4px; border-radius: 3px; font-size: 1.2vh; cursor: pointer; }
    .btn-ctrl.active { background: #ff5722; border-color: #ff5722; }

    /* グリッド構成 */
    .grid-5 { display: grid; grid-template-columns: repeat(5, 1fr); gap: 1px; text-align: center; width: 100%; }
    
    /* リスト形式データ (POIs) */
    .poi-box { display: flex; flex-direction: column; gap: 1px; height: 44%; justify-content: space-between; }
    .poi-row { display: flex; align-items: stretch; background: rgba(0,0,0,0.5); border-radius: 4px; overflow: hidden; flex: 1; min-height: 0; }
    .poi-icon { width: 7vw; display: flex; align-items: center; justify-content: center; font-size: 1.8vh; background: rgba(255,255,255,0.1); cursor: pointer; }
    .poi-items { display: flex; width: 93vw; }
    .poi-col { flex: 1; border-left: 1px solid #333; display: flex; flex-direction: column; justify-content: center; align-items: center; overflow: hidden; padding: 0 1px; }
    .poi-name { font-size: 1.1vh; color: #ddd; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; text-align: center; }
    
    .arrow { display: inline-block; transition: transform 0.2s linear; color: #00e676; }

    /* 初期セットアップ画面 */
    .setup-screen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; gap: 20px; }
    .setup-btn { background: #00e676; color: #000; border: none; padding: 4vw 8vw; font-size: 3.5vh; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,230,118,0.5); }
  </style>
</head>
<body>

  <div id="setup" class="setup-screen">
    <button class="setup-btn" onclick="startApp()">🏍️ Drive View5 開始</button>
    <div style="
