<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Ride View</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background-color: #000; color: #fff; font-family: -apple-system, sans-serif; overflow: hidden; }
    
    /* 画面上半分（50vh）専用ダッシュボード */
    .dashboard {
      height: 50vh; width: 100vw; padding: 4px 6px;
      display: flex; flex-direction: column; justify-content: space-between;
      background-color: #121212; border-bottom: 2px solid #444;
    }
    .spacer-bottom { height: 50vh; background-color: #000; }

    /* 1行目: 住所 */
    .address-row { height: 8%; font-size: 1.1rem; font-weight: bold; color: #ffeb3b; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-left: 4px; }

    /* 2〜3行目: 各種ステータス */
    .status-grid { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; text-align: center; font-size: 1.15rem; font-weight: bold; height: 22%; align-items: center; gap: 2px; }
    .status-grid div { background: #222; border-radius: 4px; padding: 2px 0; display: flex; flex-direction: column; justify-content: center; height: 100%; }
    .wide-col { grid-column: span 2; }
    
    .val-large { font-size: 1.3rem; color: #fff; }
    .val-green { color: #00e676; }
    .val-small { font-size: 0.8rem; color: #aaa; }

    /* POIリスト (3件ずつ横並び) */
    .poi-container { display: flex; flex-direction: column; gap: 3px; height: 68%; margin-top: 2px; }
    .poi-category { display: flex; align-items: stretch; background: #1a1a1a; border-radius: 8px; overflow: hidden; height: 32%; }
    .poi-icon { font-size: 1.6rem; width: 10%; display: flex; align-items: center; justify-content: center; background: #2a2a2a; }
    .poi-items { display: flex; width: 90%; }
    .poi-item { flex: 1; border-left: 1px solid #333; padding: 1px 3px; display: flex; flex-direction: column; justify-content: space-between; text-align: center; }
    .poi-name { font-size: 0.9rem; font-weight: bold; color: #ddd; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .poi-data { display: flex; justify-content: center; align-items: center; gap: 2px; }
    .poi-dist { font-size: 1.1rem; font-weight: bold; color: #00e676; }
    .arrow { font-size: 1.3rem; color: #00e676; transition: transform 0.2s linear; font-weight: bold; display: inline-block; }

    /* 起動画面 */
    .start-screen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; gap: 20px; }
    .start-btn { background: #00e676; color: #000; border: none; padding: 20px 40px; font-size: 1.8rem; font-weight: bold; border-radius: 12px; }
    .start-desc { color: #aaa; font-size: 1rem; text-align: center; padding: 0 20px; }
  </style>
</head>
<body>

  <div id="start-screen" class="start-screen">
    <button class="start-btn" onclick="startRideView()">センサー接続・開始</button>
    <div class="start-desc">位置情報・コンパスの権限を許可してください。<br>走行距離は日単位で自動保存されます。</div>
  </div>

  <div class="dashboard" id="dashboard" style="display:none;">
    
    <div class="address-row">📍<span id="addr">〒--- 取得中...</span></div>

    <div class="status-grid">
      <div class="wide-col" style="flex-direction: row; justify-content: space-evenly; align-items: center;">
        <span>🌡️<span id="temp" class="val-large">--</span>℃</span>
        <span id="weather" style="font-size:1.5rem;">⏳</span>
        <span>☔<span id="precip" class="val-large val-green">--</span>%</span>
      </div>
      <div>⛰️<span id="ele" class="val-large">--</span><span class="val-small">m</span></div>
      <div>🎯<span id="accuracy" class="val-large">--</span><span class="val-small">m</span></div>

      <div class="wide-col">🧭<span id="heading-str" class="val-large">---</span><span id="heading-deg" class="val-large val-green">--</span>°</div>
      <div>🏎️<span id="speed" class="val-large">0</span><span class="val-small">k/h</span></div>
      <div>🛣️<span id="distance" class="val-large val-green">0.0</span><span class="val-small">km</span></div>
    </div>

    <div class="poi-container">
      <div class="poi-category">
        <div class="poi-icon">🚇</div><div class="poi-items" id="station-list"></div>
      </div>
      <div class="poi-category">
        <div class="poi-icon">🚻</div><div class="poi-items" id="toilet-list"></div>
      </div>
      <div class="poi-category">
        <div class="poi-icon">⛽</div><div class="poi-items" id="gas-list"></div>
      </div>
      <div style="display:flex; justify-content: space-around; background:#222; border-radius:6px; font-weight:bold; font-size:1.1rem; padding: 2px 0;">
        <div>🌅<span id="sunrise">--:--</span><span class="arrow" id="sunrise-arrow">↑</span></div>
        <div>🌇<span id="sunset">--:--</span><span class="arrow" id="sunset-arrow">↑</span></div>
      </div>
    </div>

  </div>
  <div class="spacer-bottom"></div>

  <script>
    let currentLat = null, currentLon = null, lastLat = null, lastLon = null;
    let currentHeading = 0, currentSpeed = 0, currentAcc = 0;
    let poiCache = { station: [], toilet: [], gas: [] };
    let sunAzimuths = { sunrise: 90, sunset: 270 };
    
    // 走行距離のローカル保存管理（日次リセット）
    const todayStr = new Date().toLocaleDateString('ja-JP', {year:'numeric', month:'2-digit', day:'2-digit'}).replace(/\//g, '-');
    let todayDistance = parseFloat(localStorage.getItem('rideDist_' + todayStr)) || 0;
    
    const dirs = ["北","北北東","北東","東北東","東","東南東","南東","南南東","南","南南西","南西","西南西","西","西北西","北西","北北西"];

    async function startRideView() {
      document.getElementById('start-screen').style.display = 'none';
      document.getElementById('dashboard').style.display = 'flex';
      document.getElementById('distance').textContent = todayDistance.toFixed(1);

      // コンパス
      if ('ondeviceorientationabsolute' in window) {
        window.addEventListener('deviceorientationabsolute', handleOrientation, true);
      } else {
        window.addEventListener('deviceorientation', handleOrientation, true);
      }

      // GPS継続監視
      navigator.geolocation.watchPosition(updateGPS, err => console.error(err), { enableHighAccuracy: true, maximumAge: 0 });

      // 初回データ即時取得
      await waitForGPS();
      fetchAllAPIs();

      // インターバルタイマー群
      setInterval(updateUI, 3000);              // UI・ローカル計算更新: 3秒ごと
      setInterval(fetchPOIs, 30000);            // 施設情報: 30秒ごと
      setInterval(fetchAddress, 60000);         // 住所: 60秒ごと
      setInterval(fetchWeather, 300000);        // 天気: 5分ごと
    }

    // GPS取得待ち
    function waitForGPS() {
      return new Promise(resolve => {
        const check = setInterval(() => { if(currentLat) { clearInterval(check); resolve(); } }, 500);
      });
    }

    function updateGPS(pos) {
      currentLat = pos.coords.latitude;
      currentLon = pos.coords.longitude;
      currentSpeed = pos.coords.speed ? (pos.coords.speed * 3.6) : 0;
      currentAcc = pos.coords.accuracy ? pos.coords.accuracy : 999;
      
      // GPS高度が取れれば優先的に表示
      if(pos.coords.altitude) document.getElementById('ele').textContent = Math.round(pos.coords.altitude);

      // 走行距離の計算 (時速3km以上で移動している場合のみ加算し、GPSブレを防ぐ)
      if (lastLat && lastLon && currentSpeed > 3.0) {
        const d = calcDist(lastLat, lastLon, currentLat, currentLon);
        if (d > 0.005) { // 5m以上の移動で加算
          todayDistance += d;
          localStorage.setItem('rideDist_' + todayStr, todayDistance);
        }
      }
      lastLat = currentLat; lastLon = currentLon;
    }

    function updateUI() {
      if (!currentLat) return;
      document.getElementById('speed').textContent = currentSpeed.toFixed(0);
      document.getElementById('accuracy').textContent = currentAcc.toFixed(0);
      document.getElementById('distance').textContent = todayDistance.toFixed(1);
      renderPOIs();
      updateSunArrows();
    }

    function fetchAllAPIs() {
      fetchAddress(); fetchWeather(); fetchPOIs(); calcSunPositions();
    }

    // 1. 住所 (60s)
    async function fetchAddress() {
      try {
        const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${currentLat}&lon=${currentLon}&zoom=18&addressdetails=1`);
        const data = await res.json();
        const a = data.address;
        document.getElementById('addr').textContent = (a.postcode ? `〒${a.postcode} ` : "") + (a.province||a.state||"") + (a.city||a.town||a.village||"") + (a.suburb||"") + (a.road||a.neighbourhood||"");
      } catch (e) {}
    }

    // 2. 天気 (5m)
    async function fetchWeather() {
      try {
        const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${currentLat}&longitude=${currentLon}&current_weather=true&hourly=precipitation_probability&daily=sunrise,sunset&elevation=nan&timezone=Asia%2FTokyo`);
        const data = await res.json();
        document.getElementById('temp').textContent = Math.round(data.current_weather.temperature);
        document.getElementById('weather').textContent = getWeatherEmoji(data.current_weather.weathercode);
        document.getElementById('precip').textContent = data.hourly.precipitation_probability[new Date().getHours()] || 0;
        document.getElementById('sunrise').textContent = new Date(data.daily.sunrise[0]).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
        document.getElementById('sunset').textContent = new Date(data.daily.sunset[0]).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
        // GPS高度が無い場合の予備としてAPIの標高を入れる
        if(document.getElementById('ele').textContent === "--") document.getElementById('ele').textContent = Math.round(data.elevation);
      } catch (e) {}
    }

    // 3. 施設 (30s)
    async function fetchPOIs() {
      const query = `[out:json][timeout:10];(node["railway"="station"](around:5000,${currentLat},${currentLon});node["amenity"="toilets"](around:5000,${currentLat},${currentLon});node["amenity"="fuel"](around:8000,${currentLat},${currentLon}););out body;`;
      try {
        const res = await fetch(`https://overpass-api.de/api/interpreter?data=${encodeURIComponent(query)}`);
        const data = await res.json();
        let s=[], t=[], f=[];
        data.elements.forEach(el => {
          const item = { name: el.tags.name || "-", lat: el.lat, lon: el.lon };
          if(el.tags.railway === 'station') s.push(item);
          else if(el.tags.amenity === 'toilets') t.push(item);
          else if(el.tags.amenity === 'fuel') f.push(item);
        });
        poiCache.station = s; poiCache.toilet = t; poiCache.gas = f;
      } catch (e) {}
    }

    function handleOrientation(e) {
      let head = e.webkitCompassHeading || (e.absolute && e.alpha ? 360 - e.alpha : (e.alpha ? 360 - e.alpha : null));
      if (head !== null) {
        currentHeading = head;
        const h = Math.round(head);
        document.getElementById('heading-deg').textContent = h;
        document.getElementById('heading-str').textContent = dirs[Math.round(((h % 360) / 22.5)) % 16];
      }
    }

    function renderPOIs() {
      ['station', 'toilet', 'gas'].forEach(type => {
        const container = document.getElementById(`${type}-list`);
        container.innerHTML = "";
        const updatedList = poiCache[type].map(item => ({
          ...item, currentDist: calcDist(currentLat, currentLon, item.lat, item.lon), bearing: calcBearing(currentLat, currentLon, item.lat, item.lon)
        })).sort((a,b) => a.currentDist - b.currentDist).slice(0, 3);

        for(let i=0; i<3; i++) {
          const item = updatedList[i];
          if(item) {
            const rot = item.bearing - currentHeading;
            const distStr = item.currentDist < 1 ? Math.round(item.currentDist * 1000) + "m" : item.currentDist.toFixed(1) + "k";
            container.innerHTML += `<div class="poi-item"><div class="poi-name">${item.name}</div><div class="poi-data"><span class="poi-dist">${distStr}</span><span class="arrow" style="transform:rotate(${rot}deg)">↑</span></div></div>`;
          } else { container.innerHTML += `<div class="poi-item"><div class="poi-name">-</div><div class="poi-data">-</div></div>`; }
        }
      });
    }

    function updateSunArrows() {
      document.getElementById('sunrise-arrow').style.transform = `rotate(${sunAzimuths.sunrise - currentHeading}deg)`;
      document.getElementById('sunset-arrow').style.transform = `rotate(${sunAzimuths.sunset - currentHeading}deg)`;
    }

    function calcDist(la1, lo1, la2, lo2) {
      const dLa = (la2-la1)*Math.PI/180, dLo = (lo2-lo1)*Math.PI/180;
      const a = Math.sin(dLa/2)**2 + Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dLo/2)**2;
      return 6371 * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }
    function calcBearing(la1, lo1, la2, lo2) {
      const rLa1 = la1*Math.PI/180, rLa2 = la2*Math.PI/180, dLo = (lo2-lo1)*Math.PI/180;
      return (Math.atan2(Math.sin(dLo)*Math.cos(rLa2), Math.cos(rLa1)*Math.sin(rLa2) - Math.sin(rLa1)*Math.cos(rLa2)*Math.cos(dLo))*180/Math.PI + 360)%360;
    }
    function calcSunPositions() {
      const day = Math.floor((new Date() - new Date(new Date().getFullYear(), 0, 0))/86400000);
      const dec = 23.44 * Math.sin((360/365)*(day-80)*Math.PI/180)*Math.PI/180;
      const az = Math.acos(Math.max(-1, Math.min(1, Math.sin(dec)/Math.cos(currentLat*Math.PI/180))))*180/Math.PI;
      sunAzimuths = { sunrise: az, sunset: 360 - az };
    }
    function getWeatherEmoji(c) {
      if(c===0) return "☀️"; if([1,2,3].includes(c)) return "⛅"; if([45,48].includes(c)) return "🌫️";
      if([51,53,55,80,81,82].includes(c)) return "🌦️"; if([61,63,65,66,67].includes(c)) return "🌧️";
      if([71,73,75,77,85,86].includes(c)) return "❄️"; if([95,96,99].includes(c)) return "⚡"; return "⛅";
    }
  </script>
</body>
</html>
