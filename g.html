<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Drive View25</title>
    <style>
        :root {
            --bg-grad-1: #0f172a;
            --bg-grad-2: #1e293b;
            --text-main: #f8fafc;
            --accent: #2563eb;
            --update-flash: #34d399;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background: linear-gradient(135deg, var(--bg-grad-1), var(--bg-grad-2), #0f172a);
            background-size: 400% 400%;
            animation: gradientAnim 20s ease infinite;
            color: var(--text-main);
            font-weight: bold;
            overflow-x: hidden;
            font-size: 11px;
        }

        @keyframes gradientAnim {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 初期オーバーレイ */
        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.98);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            gap: 15px;
            padding: 20px;
            text-align: center;
        }
        #start-btn {
            padding: 18px 36px;
            font-size: 18px;
            font-weight: bold;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(37, 99, 233, 0.4);
        }
        .notice {
            font-size: 11px;
            color: #94a3b8;
            font-weight: normal;
        }

        /* メインコンテナ（上半分に収めるコンパクト設計） */
        .container {
            width: 100%;
            max-height: 55vh;
            padding: 4px;
            position: relative;
        }

        /* ヘッダー */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2px 4px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .title { font-size: 13px; color: #94a3b8; }
        #sync-btn {
            background: #334155;
            border: 1px solid #475569;
            color: white;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 10px;
            cursor: pointer;
        }

        /* 省スペースグリッド */
        .grid-row {
            display: flex;
            gap: 2px;
            margin-top: 2px;
        }

        .card {
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 3px;
            padding: 3px 5px;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: border-color 0.4s ease, color 0.4s ease;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .full-width {
            flex: none;
            width: 100%;
        }

        .flash {
            border-color: var(--update-flash) !important;
            color: var(--update-flash) !important;
        }

        .cd {
            font-size: 8px;
            color: #64748b;
            margin-left: 3px;
            font-weight: normal;
        }

        .list-box {
            font-size: 9.5px;
            width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .list-item {
            display: inline-block;
            margin-right: 4px;
            background: rgba(255,255,255,0.04);
            padding: 1px 3px;
            border-radius: 2px;
        }
    </style>
</head>
<body>

    <div id="overlay">
        <button id="start-btn">Drive View25 起動</button>
        <p class="notice">※コンパス・位置情報センサーの権限許可ダイアログが出た場合は、「許可」を選択してください。<br>（必ずHTTPS環境で開いてください）</p>
    </div>

    <div class="container">
        <div class="header">
            <span class="title">🚗 Drive View25</span>
            <button id="sync-btn">🔄一括更新</button>
        </div>

        <div class="grid-row">
            <div class="card full-width" id="c-time">
                <span>🕒 <span id="val-time">--:--:--</span></span>
                <span class="cd">REALTIME</span>
            </div>
        </div>

        <div class="grid-row">
            <div class="card full-width" id="c-weather">
                <span>🌈 <span id="val-weather">計測中...</span></span>
                <span class="cd">⏳<span id="cd-weather">220</span>s</span>
            </div>
        </div>

        <div class="grid-row">
            <div class="card full-width" id="c-sun">
                <span>🌅 <span id="val-sun">計測中...</span></span>
                <span class="cd">⏳<span id="cd-sun">1200</span>s</span>
            </div>
        </div>

        <div class="grid-row">
            <div class="card full-width" id="c-env">
                <span>💨 <span id="val-env">計測中...</span></span>
                <span class="cd">⏳<span id="cd-env">300</span>s</span>
            </div>
        </div>

        <div class="grid-row">
            <div class="card" id="c-heading">
                <span>🧭 <span id="val-heading">測定中...</span></span>
                <span class="cd">⏳<span id="cd-heading">3</span>s</span>
            </div>
            <div class="card" id="c-motion">
                <span>⛰️ <span id="val-altitude">測定中...</span> | 🚀 <span id="val-speed">0km/h</span></span>
                <span class="cd">⏳<span id="cd-motion">3</span>s</span>
            </div>
        </div>

        <div class="grid-row">
            <div class="card full-width" id="c-address">
                <span>📍 <span id="val-address">位置情報取得中...</span></span>
                <span class="cd">⏳<span id="cd-address">120</span>s</span>
            </div>
        </div>

        <div class="grid-row">
            <div class="card full-width" id="c-geo-spot">
                <span>🏢 <span id="val-landmark">--</span> | 🛣️ <span id="val-cross">--</span></span>
                <span class="cd">⏳<span id="cd-geo-spot">120</span>s</span>
            </div>
        </div>

        <div class="grid-row">
            <div class="card full-width" id="c-poi-cvs">
                <span>🏪 <span id="val-cvs" class="list-box">検索中...</span></span>
                <span class="cd">⏳<span id="cd-poi-cvs">150</span>s</span>
            </div>
        </div>

        <div class="grid-row">
            <div class="card full-width" id="c-poi-station">
                <span>🚃 <span id="val-station" class="list-box">検索中...</span></span>
                <span class="cd">⏳<span id="cd-poi-station">150</span>s</span>
            </div>
        </div>

        <div class="grid-row">
            <div class="card full-width" id="c-poi-gas">
                <span>⛽ <span id="val-gas" class="list-box">検索中...</span></span>
                <span class="cd">⏳<span id="cd-poi-gas">150</span>s</span>
            </div>
        </div>

        <div class="grid-row">
            <div class="card full-width" id="c-poi-toilet">
                <span>🚾 <span id="val-toilet" class="list-box">検索中...</span></span>
                <span class="cd">⏳<span id="cd-poi-toilet">150</span>s</span>
            </div>
        </div>
    </div>

    <script>
        let lat = null, lon = null, heading = 0;
        
        const INTERVALS = { 
            weather: 220, 
            sun: 1200, 
            env: 300, 
            heading: 3, 
            motion: 3, 
            address: 120, 
            geo_spot: 120, 
            poi_cvs: 150, 
            poi_station: 150, 
            poi_gas: 150, 
            poi_toilet: 150 
        };
        let countdowns = { ...INTERVALS };

        const DIR_ARROWS = ['↑', '↗', '→', '↘', '↓', '↙', '←', '↖'];
        const DIR_NAMES = ['北', '北北東', '北東', '東北東', '東', '東南東', '南東', '南南東', '南', '南南西', '南西', '西北西', '西', '西北西', '北西', '北北西'];

        // 起動ボタンイベント（ここで各種デバイス権限を明示的に要求）
        document.getElementById('start-btn').addEventListener('click', async () => {
            document.getElementById('overlay').style.display = 'none';
            
            // iOS等のためのデバイスセンサー権限要求
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const permissionState = await DeviceOrientationEvent.requestPermission();
                    if (permissionState === 'granted') {
                        window.addEventListener('deviceorientationabsolute', updateHeading, true);
                    } else {
                        document.getElementById('val-heading').innerText = '方位権限拒否';
                    }
                } catch (error) {
                    console.error('権限要求エラー:', error);
                    // フォールバック（Android等）
                    window.addEventListener('deviceorientationabsolute', updateHeading, true);
                    window.addEventListener('deviceorientation', updateHeading, true);
                }
            } else {
                // 通常ブラウザ（iOS13未満、多くのAndroid）
                window.addEventListener('deviceorientationabsolute', updateHeading, true);
                window.addEventListener('deviceorientation', updateHeading, true);
            }

            initApp();
        });

        document.getElementById('sync-btn').addEventListener('click', () => {
            triggerAllUpdates();
        });

        function initApp() {
            // 1. リアルタイム時計
            setInterval(() => {
                const now = new Date();
                document.getElementById('val-time').innerText = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'});
            }, 1000);

            // 2. 位置情報監視 (高精度モードを設定)
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(updateLocation, handleError, {
                    enableHighAccuracy: true,
                    timeout: 10000,
                    maximumAge: 0
                });
            } else {
                document.getElementById('val-address').innerText = 'GPS非対応端末';
            }

            startCountdowns();
            triggerAllUpdates();
        }

        function updateLocation(position) {
            lat = position.coords.latitude;
            lon = position.coords.longitude;
            
            if(countdowns.motion <= 0 || document.getElementById('val-altitude').innerText === '測定中...') {
                // 標高データ（GPS受信状況によりnullが返ることが多いため、代替として0m表示か精度の補正を行う）
                let alt = '0m(不正確)';
                if (position.coords.altitude !== null) {
                    alt = Math.round(position.coords.altitude) + 'm';
                } else if (position.coords.accuracy > 30) {
                    alt = '測位精度不足';
                }
                
                const speed = position.coords.speed ? Math.round(position.coords.speed * 3.6) : 0;
                
                document.getElementById('val-altitude').innerText = alt;
                document.getElementById('val-speed').innerText = speed + 'km/h';
                flashCard('c-motion');
                countdowns.motion = INTERVALS.motion;
            }
        }

        function updateHeading(event) {
            let currentHeading = null;
            
            if (event.webkitCompassHeading) {
                currentHeading = event.webkitCompassHeading; // iOS用
            } else if (event.absolute && event.alpha !== null) {
                currentHeading = 360 - event.alpha; // Android絶対方位用
            } else if (event.alpha !== null) {
                currentHeading = 360 - event.alpha; // 標準フォールバック
            }

            if (currentHeading !== null) {
                heading = Math.round(currentHeading);
                if(countdowns.heading <= 0) {
                    const idx = Math.round(heading / 22.5) % 16;
                    document.getElementById('val-heading').innerText = `${DIR_NAMES[idx]} ${heading}°`;
                    flashCard('c-heading');
                    countdowns.heading = INTERVALS.heading;
                }
            }
        }

        function handleError(err) {
            console.warn(`Geolocation Error(${err.code}): ${err.message}`);
            if(err.code === 1) {
                document.getElementById('val-address').innerText = '位置情報が拒否されました';
            }
        }

        function getBearingArrow(lat1, lon1, lat2, lon2) {
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const lat1Rad = lat1 * Math.PI / 180;
            const lat2Rad = lat2 * Math.PI / 180;
            const y = Math.sin(dLon) * Math.cos(lat2Rad);
            const x = Math.cos(lat1Rad) * Math.sin(lat2Rad) - Math.sin(lat1Rad) * Math.cos(lat2Rad) * Math.cos(dLon);
            let brng = Math.atan2(y, x) * 180 / Math.PI;
            brng = (brng + 360) % 360;
            
            const relativeAngle = (brng - heading + 360) % 360;
            const arrowIdx = Math.round(relativeAngle / 45) % 8;
            return DIR_ARROWS[arrowIdx];
        }

        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
        }

        async function fetchWeather() {
            if (!lat || !lon) return;
            try {
                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,precipitation,weather_code,pressure_msl,wind_speed_10m&hourly=precipitation_probability&forecast_days=1`);
                const data = await res.json();
                const cur = data.current;
                const pop = data.hourly ? data.hourly.precipitation_probability[new Date().getHours()] : 0;
                
                let wText = "晴"; if(cur.weather_code > 3) wText = "曇"; if(cur.weather_code > 50) wText = "雨";
                
                document.getElementById('val-weather').innerText = `${wText} ${Math.round(cur.temperature_2m)}℃ 降水${pop}%、${Math.round(cur.precipitation)}mm`;
                document.getElementById('val-env').innerText = `${Math.round(cur.wind_speed_10m)}m、💧${cur.relative_humidity_2m}%、🎈${Math.round(cur.pressure_msl)}hPa`;
                
                flashCard('c-weather');
                flashCard('c-env');
            } catch (e) { console.error(e); }
        }

        async function fetchSun() {
            if (!lat || !lon) return;
            try {
                const res = await fetch(`https://api.sunrise-sunset.org/json?lat=${lat}&lng=${lon}&formatted=0`);
                const data = await res.json();
                const sTime = new Date(data.results.sunrise).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                const eTime = new Date(data.results.sunset).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                
                const sArrow = getBearingArrow(lat, lon, lat, lon + 0.1);
                const eArrow = getBearingArrow(lat, lon, lat, lon - 0.1);

                document.getElementById('val-sun').innerText = `出:${sTime}(${sArrow}東) 没:${eTime}(${eArrow}西)`;
                flashCard('c-sun');
            } catch (e) { console.error(e); }
        }

        async function fetchAddress() {
            if (!lat || !lon) return;
            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&addressdetails=1`, {
                    headers: { 'Accept-Language': 'ja' }
                });
                const data = await res.json();
                const addr = data.address;
                const pc = addr.postcode ? `〒${addr.postcode}` : '〒---';
                const state = addr.province || addr.state || '';
                const city = addr.city || addr.suburb || addr.town || '';
                const road = addr.road || '';
                const houseNum = addr.house_number || '';
                
                document.getElementById('val-address').innerText = `${pc} ${state}${city}${road} ${houseNum}`;
                document.getElementById('val-landmark').innerText = data.name || addr.building || '付近の建物';
                document.getElementById('val-cross').innerText = addr.suburb || '主要交差点付近';

                flashCard('c-address');
                flashCard('c-geo-spot');
            } catch (e) { console.error(e); }
        }

        async function fetchPOIs() {
            if (!lat || !lon) return;
            const targets = {
                cvs: '[amenity=convenience]',
                station: '[railway=station]',
                gas: '[amenity=fuel]',
                toilet: '[amenity=toilets]'
            };

            for (const [key, filter] of Object.entries(targets)) {
                try {
                    const query = `[out:json];node${filter}(around:3000,${lat},${lon});out;`;
                    const res = await fetch(`https://overpass-api.de/api/interpreter?data=${encodeURIComponent(query)}`);
                    const data = await res.json();
                    
                    let elements = data.elements || [];
                    
                    elements.forEach(el => {
                        el.distance = getDistance(lat, lon, el.lat, el.lon);
                        el.arrow = getBearingArrow(lat, lon, el.lat, el.lon);
                    });
                    elements.sort((a, b) => a.distance - b.distance);

                    let html = '';
                    const top3 = elements.slice(0, 3);
                    if(top3.length > 0) {
                        top3.forEach(el => {
                            let name = el.tags.name || '名称不明';
                            if(key === 'station' && el.tags.operator) {
                                name = `${el.tags.operator} ${name}`;
                            }
                            html += `<span class="list-item">${name} ${el.distance.toFixed(1)}km ${el.arrow}</span>`;
                        });
                    } else {
                        html = '周辺3km以内に見つかりません';
                    }
                    document.getElementById(`val-${key}`).innerHTML = html;
                    flashCard(`c-poi-${key}`);
                } catch (e) { console.error(`POI error (${key}):`, e); }
            }
        }

        function flashCard(id) {
            const el = document.getElementById(id);
            if(el) {
                el.classList.add('flash');
                setTimeout(() => el.classList.remove('flash'), 800);
            }
        }

        function startCountdowns() {
            setInterval(() => {
                for (const key in countdowns) {
                    if (countdowns[key] > 0) {
                        countdowns[key]--;
                        const cdEl = document.getElementById(`cd-${key}`);
                        if (cdEl) cdEl.innerText = countdowns[key];
                    } else {
                        triggerSingleUpdate(key);
                    }
                }
            }, 1000);
        }

        function triggerSingleUpdate(key) {
            if (!lat || !lon) return;
            if (['weather', 'env'].includes(key)) { fetchWeather(); countdowns.weather = INTERVALS.weather; countdowns.env = INTERVALS.env; }
            if (key === 'sun') { fetchSun(); countdowns.sun = INTERVALS.sun; }
            if (['address', 'geo_spot'].includes(key)) { fetchAddress(); countdowns.address = INTERVALS.address; countdowns.geo_spot = INTERVALS.geo_spot; }
            if (key.startsWith('poi_')) { fetchPOIs(); countdowns.poi_cvs = INTERVALS.poi_cvs; countdowns.poi_station = INTERVALS.poi_station; countdowns.poi_gas = INTERVALS.poi_gas; countdowns.poi_toilet = INTERVALS.poi_toilet; }
        }

        function triggerAllUpdates() {
            if(!lat || !lon) {
                navigator.geolocation.getCurrentPosition(p => {
                    updateLocation(p);
                    triggerAllUpdates();
                }, handleError, {enableHighAccuracy: true});
                return;
            }
            fetchWeather();
            fetchSun();
            fetchAddress();
            fetchPOIs();
            for (const key in countdowns) countdowns[key] = INTERVALS[key];
        }
    </script>
</body>
</html>
