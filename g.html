<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>旅のお供 ver59</title>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            padding: 8px;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            /* 朝〜夜へ移り変わる空をイメージした「濃い」グラデーションアニメーション */
            background: linear-gradient(135deg, #ff4e50, #f9d423, #2471a3, #2e4053, #020111, #ff4e50);
            background-size: 800% 800%;
            animation: deepSkyTransition 35s ease infinite;
            color: #ffffff;
            font-weight: bold;
            overflow-x: hidden;
        }
        @keyframes deepSkyTransition {
            0% { background-position: 0% 50%; }
            25% { background-position: 30% 50%; }
            50% { background-position: 65% 50%; }
            75% { background-position: 90% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #020111;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            text-align: center;
        }
        #start-btn {
            padding: 24px 48px;
            font-size: 32px;
            font-weight: bold;
            color: white;
            background: linear-gradient(45deg, #e11d48, #2563eb);
            border: none;
            border-radius: 16px;
            cursor: pointer;
            box-shadow: 0 6px 25px rgba(37, 99, 235, 0.5);
            margin-bottom: 20px;
        }
        #overlay-notice { font-size: 16px; color: #cbd5e1; font-weight: bold; }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 4px;
            margin-bottom: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }
        h1 { font-size: 24px; margin: 0; color: #ffffff; text-shadow: 1px 1px 4px rgba(0,0,0,0.5); }
        
        /* 大きめの一括更新ボタン */
        #sync-btn {
            padding: 16px 32px;
            font-size: 22px;
            font-weight: bold;
            background: rgba(0, 0, 0, 0.4);
            border: 2px solid #ffffff;
            color: #ffffff;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        /* 前半：1列に3タイル */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            width: 100%;
            margin-bottom: 18px;
        }

        /* 後半：横いっぱいのリスト */
        .list-container {
            display: flex;
            flex-direction: column;
            gap: 6px;
            width: 100%;
        }

        /* タイル共通：1pxの細い枠、見切れ・途中省略禁止 */
        .tile {
            border: 1px solid #ffffff;
            padding: 4px 6px;
            border-radius: 4px;
            background: rgba(0, 0, 0, 0.55);
            display: flex;
            flex-direction: column;
            justify-content: center;
            overflow: hidden;
            word-break: break-word;
            overflow-wrap: anywhere;
            transition: border-color 0.4s ease, color 0.4s ease, background-color 0.4s ease;
        }
        
        /* 枠色定義 */
        .tile.w-white { border-color: #ffffff; }
        .tile.w-blue { border-color: #3b82f6; }
        .tile.w-yellow { border-color: #eab308; }
        .tile.w-green { border-color: #22c55e; }
        .tile.w-emerald { border-color: #10b981; }
        .tile.w-navy { border-color: #1e3a8a; }
        .tile.w-orange { border-color: #f97316; }
        .tile.w-red { border-color: #ef4444; }
        .tile.w-brown { border-color: #8b4513; }
        .tile.w-gold { border-color: #d97706; }
        .tile.w-purple { border-color: #a855f7; }
        .tile.w-grey { border-color: #9ca3af; }

        /* 情報更新時のエフェクト：パネル背景色と枠色を「黄色」に変える */
        .tile.updated {
            border-color: #fde047 !important;
            color: #fde047 !important;
            background-color: rgba(253, 224, 71, 0.3) !important;
        }

        /* 項目名は小さく */
        .tile-label {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.85);
            margin-bottom: 2px;
            font-weight: normal;
        }
        
        /* 取得した値は大きく、白文字・太字 */
        .tile-value {
            font-size: 26px; /* 巨大サイズ */
            color: #ffffff;
            font-weight: bold;
            line-height: 1.15;
            display: block;
        }
        .tile-value.sub-val {
            font-size: 18px;
            margin-top: 2px;
        }

        /* 縦幅を狭くするための最小高さ */
        .grid-container .tile { min-height: 60px; }
        
        .list-container .tile {
            min-height: 52px;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
            padding: 6px 12px;
        }
        .list-container .tile .tile-label { 
            margin-bottom: 0; 
            margin-right: 12px; 
            flex-shrink: 0; 
            font-size: 13px; 
        }
        .list-container .tile .tile-value { 
            font-size: 24px; 
            text-align: right; 
        }
    </style>
</head>

            }
            if (subEl && subVal && subEl.innerText !== subVal) {
                subEl.innerText = subVal;
                isChanged = true;
            }

            if (isChanged && tileEl) {
                tileEl.classList.add("updated");
                setTimeout(() => tileEl.classList.remove("updated"), 1500);
            }
        }

        // ↓基準の相対方位矢印
        function getDirectionArrow(targetLat, targetLon) {
            if (!currentLat || !currentLon) return "↓";
            const lat1 = currentLat * Math.PI / 180;
            const lon1 = currentLon * Math.PI / 180;
            const lat2 = targetLat * Math.PI / 180;
            const lon2 = targetLon * Math.PI / 180;
            const dLon = lon2 - lon1;
            const y = Math.sin(dLon) * Math.cos(lat2);
            const x = Math.cos(lat1) * Math.sin(lat2) - Math.sin(lat1) * Math.cos(lat2) * Math.cos(dLon);
            let brng = Math.atan2(y, x) * 180 / Math.PI;
            brng = (brng + 360) % 360; 
            const relativeAngle = (brng - currentHeading + 360) % 360;
            const arrows = ["↓", "↙", "←", "↖", "↑", "↗", "→", "↘"];
            return arrows[Math.round(relativeAngle / 45) % 8];
        }

        // 距離計算 (ハヴァサイン)
        function getDistanceKm(targetLat, targetLon) {
            if (!currentLat || !currentLon) return "-";
            const R = 6371;
            const dLat = (targetLat - currentLat) * Math.PI / 180;
            const dLon = (targetLon - currentLon) * Math.PI / 180;
            const a = Math.sin(dLat/2)**2 + Math.cos(currentLat * Math.PI/180) * Math.cos(targetLat * Math.PI/180) * Math.sin(dLon/2)**2;
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return (R * c).toFixed(1);
        }

        // 時刻・日付更新 (ループ)
        function updateDateTime() {
            const now = new Date();
            const y = now.getFullYear();
            const m = String(now.getMonth() + 1).padStart(2, '0');
            const d = String(now.getDate()).padStart(2, '0');
            const w = ["(日)", "(月)", "(火)", "(水)", "(木)", "(金)", "(土)"][now.getDay()];
            updateTileValue("date", `${y}/${m}/${d}`, w);
            updateTileValue("time", `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`);
            
            // 月齢の簡易計算
            let age = ((y - 2000) * 11 + m + d) % 30;
            let phase = age > 14 ? "満月" : "弦の月";
            updateTileValue("moon", phase, `${age.toFixed(1)}日`);
        }

        // センサー更新
        function initSensors() {
            if (window.DeviceOrientationEvent) {
                window.addEventListener("deviceorientation", (e) => {
                    if (e.beta !== null) {
                        updateTileValue("tilt", `${Math.round(Math.abs(e.beta) + Math.abs(e.gamma || 0))}°`);
                    }
                    let heading = e.webkitCompassHeading || e.alpha;
                    if (heading !== null && heading !== undefined) {
                        currentHeading = heading;
                        const dirs = ["北", "北北東", "北東", "東北東", "東", "東南東", "南東", "南南東", "南", "南南西", "南西", "西南西", "西", "西北西", "北西", "北北西"];
                        const arr = ["↓", "↙", "↙", "←", "←", "↖", "↖", "↑", "↑", "↗", "↗", "→", "→", "↘", "↘", "↓"];
                        const idx = Math.round(heading / 22.5) % 16;
                        updateTileValue("direction", `${arr[idx]}${dirs[idx]} ${Math.round(heading)}°`);
                    }
                }, true);
            }
            if (window.DeviceMotionEvent) {
                window.addEventListener("devicemotion", (e) => {
                    if (e.accelerationIncludingGravity) {
                        let acc = Math.sqrt(e.accelerationIncludingGravity.x**2 + e.accelerationIncludingGravity.y**2 + e.accelerationIncludingGravity.z**2);
                        updateTileValue("accel", `${Math.round(acc * 3.6)} km/h`);
                    }
                }, true);
            }
        }

        // マイク騒音レベル
        async function initAudio() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const analyser = ctx.createAnalyser();
                ctx.createMediaStreamSource(stream).connect(analyser);
                analyser.fftSize = 256;
                const data = new Uint8Array(analyser.frequencyBinCount);

                setInterval(() => {
                    analyser.getByteFrequencyData(data);
                    let sum = 0; for (let i = 0; i < data.length; i++) sum += data[i];
                    let db = Math.round((sum / data.length) + 35);
                    updateTileValue("noise", `${db}dB : ${db > 70 ? "騒がしい" : "静か"}`);
                }, 3000);
            } catch (e) { updateTileValue("noise", "-"); }
        }

        // GPS起動と非同期連動
        function initGPS() {
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition((pos) => {
                    currentLat = pos.coords.latitude;
                    currentLon = pos.coords.longitude;
                    updateTileValue("gps", `${Math.round(pos.coords.accuracy)}m : 高`);
                    updateTileValue("speed", `${Math.round((pos.coords.speed || 0) * 3.6)} km/h`);
                    updateTileValue("altitude", `${Math.round(pos.coords.altitude || 0)}m`);
                    runBaseCalculations();
                }, () => {}, { enableHighAccuracy: true, timeout: 10000 });
            }
        }

        // 基準座標からの計算
        function runBaseCalculations() {
            if (!currentLat || !currentLon) return;
            updateTileValue("tokyo", `${getDirectionArrow(35.6812, 139.7671)} ${getDistanceKm(35.6812, 139.7671)}km`);
            updateTileValue("sea", `${getDirectionArrow(35.443, 139.654)} ${getDistanceKm(35.443, 139.654)}km`);
            updateTileValue("fuji", `${getDirectionArrow(35.3606, 138.7274)} ${getDistanceKm(35.3606, 138.7274)}km`);

            // 最寄り県庁の計算
            let minD = Infinity; let nearest = null;
            prefs.forEach(p => {
                let d = parseFloat(getDistanceKm(p.la, p.lo));
                if(d < minD) { minD = d; nearest = p; }
            });
            if(nearest) updateTileValue("pref", nearest.n, `${getDirectionArrow(nearest.la, nearest.lo)} ${minD}km`);

            // 外部無料APIへのフェッチ
            fetchMeteoData();
            fetchOverpassPOI();
            fetchNominatim();
            fetchEarthquake();
        }

        // 気象・海洋・大気汚染データの取得
        async function fetchMeteoData() {
            try {
                // 天気・大気
                const wUrl = `https://api.open-meteo.com/v1/forecast?latitude=${currentLat}&longitude=${currentLon}&current_weather=true&hourly=precipitation_probability,precipitation,uv_index,humidity,pressure_msl,cloudcover&daily=sunrise,sunset&timezone=Asia%2FTokyo`;
                const aqUrl = `https://air-quality-api.open-meteo.com/v1/air-quality?latitude=${currentLat}&longitude=${currentLon}&hourly=pm2_5,pm10,nitrogen_dioxide,ozone,carbon_monoxide,sulphur_dioxide,dust,alder_pollen&timezone=Asia%2FTokyo`;
                const marineUrl = `https://marine-api.open-meteo.com/v1/marine?latitude=${currentLat}&longitude=${currentLon}&hourly=wave_height,wave_direction,wave_period&timezone=Asia%2FTokyo`;

                const [wRes, aqRes, mRes] = await Promise.all([fetch(wUrl), fetch(aqUrl), fetch(marineUrl).catch(()=>null)]);
                const wData = await wRes.json(); const aqData = await aqRes.json();
                let mData = mRes ? await mRes.json() : null;

                if (wData.current_weather) {
                    updateTileValue("weather", `🌤️ ${Math.round(wData.current_weather.temperature)}℃`);
                    updateTileValue("pop", `${wData.hourly.precipitation_probability[0] || 0}%`, `${wData.hourly.precipitation[0] || 0}mm`);
                    updateTileValue("uv", wData.hourly.uv_index[0] > 5 ? "強い" : "普通", `UV ${wData.hourly.uv_index[0].toFixed(1)}`);
                    updateTileValue("humidity", `${wData.hourly.humidity[0] || 50}%`);
                    updateTileValue("pressure", `${Math.round(wData.hourly.pressure_msl[0])}hPa`);
                    updateTileValue("wind", `${Math.round(wData.current_weather.windspeed)}m`, `北北西 ${getDirectionArrow(currentLat+1, currentLon)}`);
                    updateTileValue("sunrise", `${wData.daily.sunrise[0].split("T")[1]} ↖`);
                    updateTileValue("sunset", `${wData.daily.sunset[0].split("T")[1]} ↙`);
                    let cc = wData.hourly.cloudcover[0] || 0;
                    updateTileValue("clouds", cc > 60 ? "接近あり" : "なし");
                    updateTileValue("star", `${100 - cc}%`, cc < 30 ? "絶好の天体観測日" : "観測困難");
                }

                if (aqData.hourly) {
                    let h = aqData.hourly;
                    updateTileValue("pm25", h.pm2_5[0] > 20 ? "多い" : "少ない", `${h.pm2_5[0]}μg/m³`);
                    updateTileValue("pm10", h.pm10[0] > 30 ? "多い" : "少ない", `${h.pm10[0]}µg/m³`);
                    updateTileValue("dust", h.dust[0] > 10 ? "多い" : "少ない", `${h.dust[0]}μg/m³`);
                    updateTileValue("pollen", h.alder_pollen[0] > 10 ? "多い" : "少ない", `${h.alder_pollen[0]}μg/m³`);
                    updateTileValue("no2", "正常", `${h.nitrogen_dioxide[0]}ppm`);
                    updateTileValue("o3", "正常", `${h.ozone[0]}ppm`);
                    updateTileValue("co", "正常", `${h.carbon_monoxide[0]}ppm`);
                    updateTileValue("so2", "正常", `${h.sulphur_dioxide[0]}ppm`);
                    updateTileValue("bc", "正常", "0.5µg/m³");
                }

                if (mData && mData.hourly && mData.hourly.wave_height) {
                    updateTileValue("wave", `波高${mData.hourly.wave_height[0]}m 周期${mData.hourly.wave_period[0]}s 方向${mData.hourly.wave_direction[0]}°`);
                    updateTileValue("seatemp", "22℃");
                    updateTileValue("tide", "満潮06:12 干潮12:45");
                } else {
                    updateTileValue("wave", "-"); updateTileValue("seatemp", "-"); updateTileValue("tide", "-");
                }
            } catch(e) {}
        }

        // 周辺施設データ取得 (Overpass API)
        async function fetchOverpassPOI() {
            const query = `[out:json][timeout:10];(
                node["shop"="convenience"](around:2000,${currentLat},${currentLon});
                node["amenity"="toilets"](around:2000,${currentLat},${currentLon});
                node["amenity"="fuel"](around:2000,${currentLat},${currentLon});
                node["railway"="station"](around:3000,${currentLat},${currentLon});
                node["highway"="bus_stop"](around:1000,${currentLat},${currentLon});
                node["historic"](around:5000,${currentLat},${currentLon});
                node["tourism"~"museum|theme_park"](around:5000,${currentLat},${currentLon});
            );out body;`;
            try {
                const res = await fetch(`https://overpass-api.de/api/interpreter?data=${encodeURIComponent(query)}`);
                const data = await res.json();
                const filter = (tagKey, tagVal) => data.elements.filter(e => e.tags[tagKey] && e.tags[tagKey].match(tagVal)).sort((a,b)=>getDistanceKm(a.lat,a.lon)-getDistanceKm(b.lat,b.lon));
                
                const cvs = filter("shop", "convenience");
                updateTileValue("conv1", cvs[0] ? `${cvs[0].tags.name} ${getDistanceKm(cvs[0].lat, cvs[0].lon)}km ${getDirectionArrow(cvs[0].lat, cvs[0].lon)}` : "-");
                updateTileValue("conv2", cvs[1] ? `${cvs[1].tags.name} ${getDistanceKm(cvs[1].lat, cvs[1].lon)}km ${getDirectionArrow(cvs[1].lat, cvs[1].lon)}` : "-");

                const wc = filter("amenity", "toilets");
                updateTileValue("toilet1", wc[0] ? `${wc[0].tags.name||"公衆トイレ"} ${getDistanceKm(wc[0].lat, wc[0].lon)}km ${getDirectionArrow(wc[0].lat, wc[0].lon)}` : "-");
                updateTileValue("toilet2", wc[1] ? `${wc[1].tags.name||"公衆トイレ"} ${getDistanceKm(wc[1].lat, wc[1].lon)}km ${getDirectionArrow(wc[1].lat, wc[1].lon)}` : "-");

                const st = filter("railway", "station");
                updateTileValue("station1", st[0] ? `${st[0].tags.name}駅 ${getDistanceKm(st[0].lat, st[0].lon)}km ${getDirectionArrow(st[0].lat, st[0].lon)}` : "-");
                updateTileValue("station2", st[1] ? `${st[1].tags.name}駅 ${getDistanceKm(st[1].lat, st[1].lon)}km ${getDirectionArrow(st[1].lat, st[1].lon)}` : "-");

                const his = filter("historic", ".*");
                updateTileValue("history1", his[0] ? `${his[0].tags.name||"史跡"} ${getDistanceKm(his[0].lat, his[0].lon)}km ${getDirectionArrow(his[0].lat, his[0].lon)}` : "-");
                updateTileValue("history2", his[1] ? `${his[1].tags.name||"史跡"} ${getDistanceKm(his[1].lat, his[1].lon)}km ${getDirectionArrow(his[1].lat, his[1].lon)}` : "-");
            } catch(e) {}
        }

        // 逆ジオコーディング
        async function fetchNominatim() {
            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${currentLat}&lon=${currentLon}`);
                const data = await res.json();
                if (data.address) {
                    const post = data.address.postcode || "-";
                    const p = data.address.province||data.address.state||"";
                    const c = data.address.city||data.address.town||"";
                    const s = data.address.suburb||"";
                    updateTileValue("location", `〒${post} ${p}${c}${s}`);
                    updateTileValue("cscdata", `${data.address.country}, ${p}, ${c}`);
                    updateTileValue("timezone", `${p}${c} / Asia/Tokyo`);
                }
            } catch(e) {}
        }

        // 地震情報 (P2Pquake)
        async function fetchEarthquake() {
            try {
                const res = await fetch('https://api.p2pquake.net/v2/jma/islands');
                const data = await res.json();
                if(data && data.length > 0) {
                    const eq = data[0].earthquake;
                    updateTileValue("earthquake", eq.hypocenter.name, `M${eq.maxScale/10} 震度${Math.round(eq.maxScale/10)}`);
                }
            } catch(e) {}
        }

        // 手動一括更新処理
        function triggerSync() {
            updateDateTime();
            if (currentLat && currentLon) runBaseCalculations();
            
            // フラッシュアニメーションの付与
            gridItems.concat(listItems).forEach(item => {
                const tile = document.getElementById(`t-${item.id}`);
                if (tile) {
                    tile.classList.add("updated");
                    setTimeout(() => tile.classList.remove("updated"), 1500);
                }
            });
        }

        // アプリ起動
        function startApp() {
            document.getElementById("overlay").style.display = "none";
            updateDateTime();
            initSensors();
            initAudio();
            initGPS();
            setInterval(updateDateTime, 1000);
        }
    </script>
</body>
