<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>旅のお供 ver56</title>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            padding: 10px;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(-45deg, #0f172a, #1e1b4b, #2e1065, #030712);
            background-size: 400% 400%;
            animation: bgGradient 20s ease infinite;
            color: #ffffff;
            font-weight: bold;
            overflow-x: hidden;
        }
        @keyframes bgGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        /* オーバーレイ表示 */
        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #030712;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            text-align: center;
        }
        #start-btn {
            padding: 20px 40px;
            font-size: 24px;
            font-weight: bold;
            color: white;
            background: #4f46e5;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(79, 70, 229, 0.4);
            margin-bottom: 15px;
        }
        #start-btn:hover { background: #6366f1; }
        #overlay-notice { font-size: 14px; color: #9ca3af; }

        /* ヘッダー */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px 10px;
            margin-bottom: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        h1 { font-size: 16px; margin: 0; color: #a5b4fc; }
        #sync-btn {
            padding: 6px 14px;
            font-size: 12px;
            font-weight: bold;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            border-radius: 6px;
            cursor: pointer;
        }
        #sync-btn:hover { background: rgba(255, 255, 255, 0.2); }

        /* グリッドレイアウト (1列に3タイル) */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            width: 100%;
            margin-bottom: 15px;
        }

        /* リストレイアウト (横一杯) */
        .list-container {
            display: flex;
            flex-direction: column;
            gap: 6px;
            width: 100%;
        }

        /* タイル基本構造 */
        .tile {
            border: 1px solid #ffffff;
            padding: 6px 8px;
            border-radius: 4px;
            background: rgba(0, 0, 0, 0.4);
            display: flex;
            flex-direction: column;
            justify-content: center;
            overflow: hidden;
            word-wrap: break-word;
            transition: border-color 0.5s ease, color 0.5s ease;
        }
        
        /* 枠の色指定 */
        .tile.w-white { border-color: #ffffff; }
        .tile.w-blue { border-color: #3b82f6; }
        .tile.w-yellow { border-color: #eab308; }
        .tile.w-green { border-color: #22c55e; }
        .tile.w-emerald { border-color: #10b981; }
        .tile.w-navy { border-color: #1e3a8a; }
        .tile.w-orange { border-color: #f97316; }
        .tile.w-red { border-color: #ef4444; }
        .tile.w-brown { border-color: #78350f; }
        .tile.w-gold { border-color: #d97706; }
        .tile.w-purple { border-color: #a855f7; }
        .tile.w-grey { border-color: #6b7280; }

        /* 更新時の水色エフェクト */
        .tile.updated {
            border-color: #22d3ee !important;
            color: #22d3ee !important;
        }

        .tile-label {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 2px;
            font-weight: normal;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .tile-value {
            font-size: 20px; /* 巨大サイズ */
            color: inherit;
            line-height: 1.2;
            display: block;
        }
        .tile-value.sub-val {
            font-size: 14px;
            margin-top: 2px;
        }

        /* 縦幅の制御 */
        .grid-container .tile {
            min-height: 55px;
        }
        .list-container .tile {
            min-height: 45px;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
        }
        .list-container .tile .tile-label {
            margin-bottom: 0;
            margin-right: 10px;
            flex-shrink: 0;
        }
        .list-container .tile .tile-value {
            font-size: 18px;
            text-align: right;
            display: flex;
            flex-direction: column;
        }
    </style>
</head>

        // 更新時のフラッシュ演出関数
        function updateTileValue(id, mainVal, subVal = null) {
            const mainEl = document.getElementById(`v-${id}`);
            const subEl = document.getElementById(`s-${id}`);
            const tileEl = document.getElementById(`t-${id}`);
            
            if (mainEl && mainEl.innerText !== mainVal) {
                mainEl.innerText = mainVal;
                if (tileEl) {
                    tileEl.classList.add("updated");
                    setTimeout(() => tileEl.classList.remove("updated"), 1500);
                }
            }
            if (subEl && subVal && subEl.innerText !== subVal) {
                subEl.innerText = subVal;
            }
        }

        // 三角関数による相対方位矢印計算
        function getRelativeArrow(targetLat, targetLon) {
            if (!currentLat || !currentLon) return "↓";
            const lat1 = currentLat * Math.PI / 180;
            const lon1 = currentLon * Math.PI / 180;
            const lat2 = targetLat * Math.PI / 180;
            const lon2 = targetLon * Math.PI / 180;
            const dLon = lon2 - lon1;
            const y = Math.sin(dLon) * Math.cos(lat2);
            const x = Math.cos(lat1) * Math.sin(lat2) - Math.sin(lat1) * Math.cos(lat2) * Math.cos(dLon);
            let brng = Math.atan2(y, x) * 180 / Math.PI;
            brng = (brng + 360) % 360; // 絶対方位

            // 端末のコンパス方角を引いて相対方位にする
            const relativeAngle = (brng - currentHeading + 360) % 360;
            const arrows = ["↑", "↗", "→", "↘", "↓", "↙", "←", "↖"];
            const index = Math.round(relativeAngle / 45) % 8;
            return arrows[index];
        }

        // ハバースインの公式による距離計算
        function getDistanceKm(targetLat, targetLon) {
            if (!currentLat || !currentLon) return 0;
            const R = 6371;
            const dLat = (targetLat - currentLat) * Math.PI / 180;
            const dLon = (targetLon - currentLon) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(currentLat * Math.PI / 180) * Math.cos(targetLat * Math.PI / 180) *
                      Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return (R * c).toFixed(1);
        }

        // 1. 日時処理
        function updateDateTime() {
            const now = new Date();
            const y = now.getFullYear();
            const m = String(now.getMonth() + 1).padStart(2, '0');
            const d = String(now.getDate()).padStart(2, '0');
            const w = ["(日)", "(月)", "(火)", "(水)", "(木)", "(金)", "(土)"][now.getDay()];
            updateTileValue("date", `${y}/${m}/${d}`, w);

            const hh = String(now.getHours()).padStart(2, '0');
            const mm = String(now.getMinutes()).padStart(2, '0');
            updateTileValue("time", `${hh}:${mm}`);
        }
        setInterval(updateDateTime, 1000);

        // 2. センサー制御（傾き・方角・加速度）
        function initSensors() {
            if (window.DeviceOrientationEvent) {
                window.addEventListener("deviceorientation", (e) => {
                    // 傾き
                    let tiltVal = "-";
                    if (e.beta !== null && e.gamma !== null) {
                        tiltVal = `${Math.round(Math.abs(e.beta) + Math.abs(e.gamma))}°`;
                    }
                    updateTileValue("tilt", tiltVal);

                    // 方角
                    let heading = e.webkitCompassHeading || e.alpha;
                    if (heading !== null && heading !== undefined) {
                        currentHeading = heading;
                        const directions = ["北", "北北東", "北東", "東北東", "東", "東南東", "南東", "南南東", "南", "南南西", "南西", "西南西", "西", "西北西", "北西", "北北西"];
                        const idx = Math.round(heading / 22.5) % 16;
                        const arrows = ["↑", "↗", "↗", "→", "→", "↘", "↘", "↓", "↓", "↙", "↙", "←", "←", "↖", "↖", "↑"];
                        updateTileValue("direction", `${arrows[idx]} ${directions[idx]} ${Math.round(heading)}°`);
                    }
                }, true);
            }
            if (window.DeviceMotionEvent) {
                window.addEventListener("devicemotion", (e) => {
                    if (e.accelerationIncludingGravity) {
                        let acc = Math.sqrt(
                            Math.pow(e.accelerationIncludingGravity.x, 2) +
                            Math.pow(e.accelerationIncludingGravity.y, 2) +
                            Math.pow(e.accelerationIncludingGravity.z, 2)
                        );
                        let speedKmh = Math.round(acc * 3.6);
                        updateTileValue("accel", `${speedKmh} km/h`);
                    }
                }, true);
            }
        }

        // 3. マイク騒音レベル
        function initNoiseMeter() {
            if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
                navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
                    const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    const analyser = audioContext.createAnalyser();
                    const microphone = audioContext.createMediaStreamSource(stream);
                    microphone.connect(analyser);
                    analyser.fftSize = 256;
                    const bufferLength = analyser.frequencyBinCount;
                    const dataArray = new Uint8Array(bufferLength);

                    setInterval(() => {
                        analyser.getByteFrequencyData(dataArray);
                        let sum = 0;
                        for (let i = 0; i < bufferLength; i++) sum += dataArray[i];
                        let avg = sum / bufferLength;
                        let db = Math.round(avg + 30); 
                        let desc = db > 65 ? "騒がしい" : "静か";
                        updateTileValue("noise", `${db}dB : ${desc}`);
                    }, 180000); // 3分毎
                }).catch(() => updateTileValue("noise", "-"));
            }
        }

        // 4. GPS位置情報ベースのAPI連携
        function initGPS() {
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition((pos) => {
                    currentLat = pos.coords.latitude;
                    currentLon = pos.coords.longitude;

                    // 精度、スピード、標高
                    let acc = pos.coords.accuracy ? `${Math.round(pos.coords.accuracy)}` : "-";
                    let accDesc = pos.coords.accuracy && pos.coords.accuracy < 20 ? "高" : "低";
                    updateTileValue("gps", `${acc} : ${accDesc}`);

                    let spd = pos.coords.speed ? `${Math.round(pos.coords.speed * 3.6)} km/h` : "0 km/h";
                    updateTileValue("speed", spd);

                    let alt = pos.coords.altitude ? `${Math.round(pos.coords.altitude)}m` : "-";
                    updateTileValue("altitude", alt);

                    // リアルタイム計算系項目
                    fetchCalculatedDestinations();
                    fetchOpenMeteo();
                    fetchOverpassPOI();
                    fetchReverseGeocode();
                }, () => {}, { enableHighAccuracy: true, timeout: 10000 });
            }
        }

        // 5. 固定座標・計算系
        function fetchCalculatedDestinations() {
            if (!currentLat || !currentLon) return;
            // 東京駅
            updateTileValue("tokyo", `${getRelativeArrow(35.6812, 139.7671)} ${getDistanceKm(35.6812, 139.7671)}km`);
            // 海（横浜港目安）
            updateTileValue("sea", `${getRelativeArrow(35.443, 139.654)} ${getDistanceKm(35.443, 139.654)}km`);
            // 富士山
            updateTileValue("fuji", `${getRelativeArrow(35.3606, 138.7274)} ${getDistanceKm(35.3606, 138.7274)}km`);
        }

        // 6. パブリック気象API (Open-Meteo)
        async function fetchOpenMeteo() {
            if (!currentLat || !currentLon) return;
            try {
                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${currentLat}&longitude=${currentLon}&current_weather=true&hourly=precipitation_probability,precipitation,uv_index,cloudcover&timezone=Asia%2FTokyo`);
                const data = await res.json();
                if (data && data.current_weather) {
                    const temp = Math.round(data.current_weather.temperature);
                    const code = data.current_weather.weathercode;
                    let sky = "🌤️";
                    if (code >= 3) sky = "☁️";
                    if (code >= 51) sky = "🌧️";
                    updateTileValue("weather", `${sky} ${temp}℃`);

                    // 降水確率・降水量
                    const prob = data.hourly.precipitation_probability[0] || 0;
                    const prec = data.hourly.precipitation[0] || 0;
                    updateTileValue("pop", `${prob}%`, `${prec}mm`);

                    // 紫外線
                    const uv = data.hourly.uv_index[0] || 0;
                    let uvDesc = uv > 4 ? "強い" : "弱い";
                    updateTileValue("uv", uvDesc, `UV ${uv.toFixed(1)}`);

                    // 湿度・気圧
                    updateTileValue("humidity", `${data.hourly.cloudcover[0] || 50}%`); // 代替
                    updateTileValue("pressure", `1013hPa`); // 固定フォールバック
                }
            } catch(e) {
                updateTileValue("weather", "-");
            }
        }

        // 7. 周辺空間検索 (Overpass API)
        async function fetchOverpassPOI() {
            if (!currentLat || !currentLon) return;
            // 周辺4kmのコンビニ検索クエリ
            const query = `[out:json][timeout:10];node["shop"="convenience"](around:4000,${currentLat},${currentLon});out body 2;`;
            try {
                const res = await fetch(`https://overpass-api.de/api/interpreter?data=${encodeURIComponent(query)}`);
                const data = await res.json();
                if (data && data.elements && data.elements.length > 0) {
                    data.elements.forEach((el, idx) => {
                        const name = el.tags.name || "コンビニ";
                        const dist = getDistanceKm(el.lat, el.lon);
                        const arr = getRelativeArrow(el.lat, el.lon);
                        updateTileValue(`conv${idx+1}`, `${name} ${dist}km ${arr}`);
                    });
                }
            } catch(e) {}
        }

        // 8. 逆ジオコーディング (OpenStreetMap Nominatim)
        async function fetchReverseGeocode() {
            if (!currentLat || !currentLon) return;
            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${currentLat}&lon=${currentLon}&addressdetails=1`);
                const data = await res.json();
                if (data && data.address) {
                    const post = data.address.postcode || "999-9999";
                    const state = data.address.province || data.address.state || "";
                    const city = data.address.city || data.address.town || "";
                    const sub = data.address.suburb || "";
                    updateTileValue("location", `〒${post} ${state}${city}${sub}`);
                }
            } catch(e) {}
        }

        // 9. 一括更新強制トリガー
        function triggerSync() {
            updateDateTime();
            fetchCalculatedDestinations();
            fetchOpenMeteo();
            fetchOverpassPOI();
            fetchReverseGeocode();
            
            // 全アイテムを1回フラッシュさせる
            gridItems.forEach(item => {
                const el = document.getElementById(`t-${item.id}`);
                if(el) {
                    el.classList.add("updated");
                    setTimeout(() => el.classList.remove("updated"), 1500);
                }
            });
            listItems.forEach(item => {
                const el = document.getElementById(`t-${item.id}`);
                if(el) {
                    el.classList.add("updated");
                    setTimeout(() => el.classList.remove("updated"), 1500);
                }
            });
        }

        // 起動処理
        document.getElementById("start-btn").addEventListener("click", () => {
            document.getElementById("overlay").style.display = "none";
            // 即座に初期化ループ起動
            updateDateTime();
            initSensors();
            initNoiseMeter();
            initGPS();
            triggerSync();
        });
    </script>
</body>
