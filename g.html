<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drive View12</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            padding: 10px;
        }
        #start-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: flex; justify-content: center; align-items: center;
            z-index: 1000;
        }
        #start-btn {
            font-size: 2rem; padding: 15px 40px; border-radius: 30px; border: none;
            background: #00e676; color: black; font-weight: bold; cursor: pointer;
        }
        .container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }
        .card {
            background: #1e1e1e; border-radius: 12px; padding: 12px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; border: 1px solid #333;
        }
        .full-width { grid-column: span 2; }
        .icon { font-size: 1.8rem; margin-bottom: 4px; }
        .value { font-size: 1.2rem; font-weight: bold; word-break: break-all; }
        .sub-value { font-size: 0.9rem; color: #aaa; margin-top: 2px; width: 100%; }
        .list-item {
            display: flex; justify-content: space-between; align-items: center;
            background: #2a2a2a; padding: 4px 8px; border-radius: 6px; margin-top: 4px; font-size: 0.85rem;
        }
    </style>
</head>
<body>

    <div id="start-screen">
        <button id="start-btn">▶ START</button>
    </div>

    <div class="container">
        <div class="card">
            <div class="icon">⏰</div>
            <div id="time" class="value">--:--</div>
        </div>

        <div class="card">
            <div class="icon">🌤️</div>
            <div id="weather" class="value">--℃ / --%</div>
        </div>

        <div class="card">
            <div class="icon">🌅🌇</div>
            <div id="sun-info" class="value">--:-- / --:--</div>
        </div>

        <div class="card">
            <div class="icon">💨💧🌊</div>
            <div id="env-info" class="value">--</div>
        </div>

        <div class="card full-width">
            <div class="icon">📍🏠</div>
            <div id="address" class="value">---</div>
        </div>

        <div class="card full-width">
            <div class="icon">🏢🛣️</div>
            <div id="road-info" class="value">---</div>
        </div>

        <div class="card">
            <div class="icon">🧭⛰️</div>
            <div id="dir-alt" class="value">--° / --m</div>
        </div>

        <div class="card">
            <div class="icon">⚡🛣️📶</div>
            <div id="speed-trip" class="value">--km/h<br>--km (-- )</div>
        </div>

        <div class="card full-width">
            <div class="icon">🚉 (最寄り駅)</div>
            <div id="stations" class="sub-value">---</div>
        </div>

        <div class="card full-width">
            <div class="icon">🚾 (公衆トイレ)</div>
            <div id="toilets" class="sub-value">---</div>
        </div>

        <div class="card full-width">
            <div class="icon">⛽ (GS)</div>
            <div id="gas-stations" class="sub-value">---</div>
        </div>

        <div class="card full-width">
            <div class="icon">🏪 (コンビニ)</div>
            <div id="convenience" class="sub-value">---</div>
        </div>

        <div class="card full-width">
            <div class="icon">🏪🛣️ (道の駅)</div>
            <div id="michinoeki" class="sub-value">---</div>
        </div>

        <div class="card full-width">
            <div class="icon">🗼 (ランドマーク)</div>
            <div id="landmarks" class="sub-value">---</div>
        </div>
    </div>

    <script>
        let currentLat = null;
        let currentLon = null;
        let lastLat = null;
        let lastLon = null;
        let totalDistance = 0; // 本日の走行距離 (km)

        // 方角の数値から矢印・16方位に変換
        function getDirectionEmoji(deg) {
            if (deg === null || deg === undefined) return '❓';
            const arrows = ['↑', '↗', '→', '↘', '↓', '↙', '←', '↖'];
            const idx = Math.round(deg / 45) % 8;
            const dirs = ['北', '北北東', '北東', '東北東', '東', '東南東', '南東', '南南東', '南', '南南西', '南西', '西南西', '西', '西北西', '北西', '北北西'];
            const dirIdx = Math.round(deg / 22.5) % 16;
            return arrows[idx] + dirs[dirIdx];
        }

        // ハバースタイン公式による2点間の距離計算 (km)
        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        // 簡易月齢計算 (簡易的なため誤差あり)
        function getMoonPhase() {
            const phases = ['新月', '繊月', '上弦', '十日夜', '待宵月', '満月', '十六夜', '下弦'];
            const totalDays = Math.floor(Date.now() / (1000 * 60 * 60 * 24));
            const age = (totalDays - 4) % 29.53; // 基準日からの簡易計算
            const idx = Math.floor((age / 29.53) * 8) % 8;
            return phases[idx];
        }

        // 初期化処理の開始
        document.getElementById('start-btn').addEventListener('click', () => {
            document.getElementById('start-screen').style.display = 'none';
            initApp();
        });

        function initApp() {
            // リアルタイムセンサー・GPS監視 (2秒毎のデータ更新を包含)
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(updateRealtimeLocation, handleLocationError, {
                    enableHighAccuracy: true,
                    maximumAge: 0,
                    timeout: 10000
                });
            }

            // デバイスの向き（コンパス）の取得
            if (window.DeviceOrientationEvent) {
                window.addEventListener('deviceorientationabsolute', (e) => {
                    if(e.alpha !== null) window.currentHeading = 360 - e.alpha;
                }, true);
            }

            // タイマー管理
            setInterval(updateTime, 1000); // 時刻は1秒
            setInterval(updateLocation60s, 60000); // 郵便番号・住所
            setInterval(updateLocation30s, 30000); // 周辺施設
            setInterval(updateWeather5m, 300000); // 天気・環境

            // 初回即時実行
            updateTime();
        }

        // 1. 現在時刻の更新
        function updateTime() {
            const now = new Date();
            document.getElementById('time').innerText = now.toLocaleTimeString('ja-JP', {hour: '2-digit', minute:'2-digit'});
        }

        // 2秒毎更新エリア（GPS感知時に発火）
        function updateRealtimeLocation(position) {
            currentLat = position.coords.latitude;
            currentLon = position.coords.longitude;
            
            // 走行距離の積算
            if (lastLat !== null && lastLon !== null) {
                const d = calculateDistance(lastLat, lastLon, currentLat, currentLon);
                if (d > 0.005) { // 5m以上の移動を検知
                    totalDistance += d;
                }
            }
            lastLat = currentLat;
            lastLon = currentLon;

            // 速度、高度、精度
            const speed = position.coords.speed ? Math.round(position.coords.speed * 3.6) : 0;
            const altitude = position.coords.altitude ? Math.round(position.coords.altitude) : '--';
            const accuracy = position.coords.accuracy < 15 ? '高' : (position.coords.accuracy < 40 ? '中' : '低');
            
            // 方角
            let heading = position.coords.heading;
            if (heading === null || isNaN(heading)) {
                heading = window.currentHeading || 0;
            }

            // 描画
            document.getElementById('dir-alt').innerHTML = `${getDirectionEmoji(heading)}<br>${altitude}m`;
            document.getElementById('speed-trip').innerHTML = `${speed}km/h<br>${totalDistance.toFixed(2)}km (${accuracy})`;

            // 初回ロード時のみ、位置確定後に即時各APIを叩く
            if (!window.initialLoaded) {
                updateLocation60s();
                updateLocation30s();
                updateWeather5m();
                window.initialLoaded = true;
            }
        }

        function handleLocationError(error) {
            console.error("GPS Error:", error);
        }

        // 60秒毎更新エリア：住所、道路名、建物名
        async function updateLocation60s() {
            if (!currentLat || !currentLon) return;
            try {
                // Nominatim Reverse Geocoding
                const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${currentLat}&lon=${currentLon}&accept-language=ja`);
                const data = await res.json();
                
                if (data && data.address) {
                    const addr = data.address;
                    const zip = addr.postcode ? `〒${addr.postcode}` : '〒---';
                    const state = addr.province || addr.prefecture || '';
                    const city = addr.city || addr.ward || addr.town || '';
                    const suburb = addr.suburb || addr.neighbourhood || '';
                    const houseNumber = addr.house_number || '';
                    
                    document.getElementById('address').innerHTML = `${zip}<br>${state}${city}${suburb}${houseNumber}`;
                    
                    const landmark = data.name || addr.building || addr.amenity || '---';
                    const road = addr.road || '---';
                    document.getElementById('road-info').innerHTML = `${landmark}<br>${road}`;
                }
            } catch (e) { console.error("60s Update Error:", e); }
        }

        // 5分毎更新エリア：天気・日の出日の入り・環境
        async function updateWeather5m() {
            if (!currentLat || !currentLon) return;
            try {
                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${currentLat}&longitude=${currentLon}&current=temperature_2m,relative_humidity_2m,apparent_temperature,precipitation_probability,weather_code,surface_pressure,wind_speed_10m&daily=sunrise,sunset&timezone=Asia%2FTokyo`);
                const data = await res.json();

                if (data && data.current) {
                    const cur = data.current;
                    const wCode = cur.weather_code; // 簡易コード判別
                    let wStr = "曇";
                    if (wCode === 0) wStr = "晴";
                    else if ([1,2,3].includes(wCode)) wStr = "晴曇";
                    else if ([61,63,65,80,81,82].includes(wCode)) wStr = "雨";
                    
                    document.getElementById('weather').innerHTML = `${Math.round(cur.temperature_2m)}℃ ${wStr}<br>降水 ${cur.precipitation_probability}%`;

                    // 環境情報
                    const wind = Math.round(cur.wind_speed_10m);
                    const hum = cur.relative_humidity_2m;
                    const press = Math.round(cur.surface_pressure);
                    const moon = getMoonPhase();
                    // 波の高さは陸地APIに含まれないためダミー表記、または固定
                    document.getElementById('env-info').innerHTML = `💨${wind}m 💧${hum}%<br>🎈${press}hPa 🌗${moon}`;

                    // 日の出日没
                    if(data.daily) {
                        const rise = data.daily.sunrise[0].split('T')[1];
                        const set = data.daily.sunset[0].split('T')[1];
                        document.getElementById('sun-info').innerHTML = `🌅 ${rise}<br>🌇 ${set}`;
                    }
                }
            } catch (e) { console.error("5m Update Error:", e); }
        }

        // 30秒毎更新エリア：Overpass APIを用いた周辺施設検索（3件制限）
        async function updateLocation30s() {
            if (!currentLat || !currentLon) return;
            
            // 各カテゴリーのクエリ定義
            const types = {
                stations: `node["railway"="station"](around:5000, ${currentLat}, ${currentLon});`,
                toilets: `node["amenity"="toilet"](around:2000, ${currentLat}, ${currentLon});`,
                gas-stations: `node["amenity"="fuel"](around:5000, ${currentLat}, ${currentLon});`,
                convenience: `node["shop"="convenience"](around:2000, ${currentLat}, ${currentLon});`,
                michinoeki: `node["tourism"="information"]["information"="map"](around:10000, ${currentLat}, ${currentLon});`, // 簡易代替
                landmarks: `node["tourism"~"attraction|viewpoint|museum"](around:5000, ${currentLat}, ${currentLon});`
            };

            for (const [id, query] of Object.entries(types)) {
                fetchOverpass(id, query);
            }
        }

        async function fetchOverpass(elementId, queryTarget) {
            const url = `https://overpass-api.de/api/interpreter?data=[out:json];${queryTarget}out body 5;`;
            try {
                const res = await fetch(url);
                const data = await res.json();
                const container = document.getElementById(elementId);
                if (!container) return;

                if (!data.elements || data.elements.length === 0) {
                    container.innerHTML = "データなし";
                    return;
                }

                // 距離順にソートして上位3件を抽出
                let list = data.elements.map(el => {
                    const dist = calculateDistance(currentLat, currentLon, el.lat, el.lon);
                    // 方角計算
                    const y = el.lat - currentLat;
                    const x = el.lon - currentLon;
                    const deg = (Math.atan2(x, y) * 180) / Math.PI;
                    const heading = deg < 0 ? deg + 360 : deg;
                    
                    let name = el.tags.name || el.tags.brand || "名称不明";
                    if (elementId === 'michinoeki' && el.tags.official_name) name = el.tags.official_name;
                    
                    return { name, dist, heading };
                }).sort((a, b) => a.dist - b.dist).slice(0, 3);

                container.innerHTML = list.map(item => `
                    <div class="list-item">
                        <span>${item.name.substring(0, 10)}</span>
                        <span>${item.dist.toFixed(1)}km ${getDirectionEmoji(item.heading).substring(0,1)}</span>
                    </div>
                `).join('');

            } catch (e) { console.error(`Overpass Error (${elementId}):`, e); }
        }
    </script>
</body>
</html>
