<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Drive View24</title>
    <style>
        :root {
            --bg-grad-1: #111827;
            --bg-grad-2: #1f2937;
            --text-main: #f9fafb;
            --accent: #3b82f6;
            --update-flash: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background: linear-gradient(125deg, var(--bg-grad-1), var(--bg-grad-2), #111827);
            background-size: 400% 400%;
            animation: gradientBGI 15s ease infinite;
            color: var(--text-main);
            font-weight: bold;
            overflow-x: hidden;
            font-size: 11px;
        }

        @keyframes gradientBGI {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 初期オーバーレイ */
        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(17, 24, 39, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        #start-btn {
            padding: 20px 40px;
            font-size: 18px;
            font-weight: bold;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.5);
        }

        /* メインコンテナ（上半分を意識したコンパクト設計） */
        .container {
            width: 100%;
            max-height: 60vh; /* スマホ画面の上半分目安 */
            padding: 5px;
            position: relative;
        }

        /* ヘッダー */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2px 5px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .title { font-size: 14px; color: #9ca3af; }
        #sync-btn {
            background: #374151;
            border: 1px solid #4b5563;
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 10px;
            cursor: pointer;
        }

        /* グリッドレイアウト（省スペース化） */
        .grid-row {
            display: flex;
            flex-wrap: wrap;
            gap: 3px;
            margin-top: 3px;
        }

        .card {
            background: rgba(31, 41, 55, 0.6);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 4px;
            padding: 4px;
            flex: 1 1 calc(50% - 3px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: border-color 0.5s ease, color 0.5s ease;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card.full-width {
            flex: 1 1 100%;
        }

        .flash {
            border-color: var(--update-flash) !important;
            color: var(--update-flash) !important;
        }

        .cd {
            font-size: 8px;
            color: #6b7280;
            margin-left: 4px;
        }

        .list-box {
            font-size: 10px;
            width: 100%;
        }
        .list-item {
            display: inline-block;
            margin-right: 5px;
            background: rgba(255,255,255,0.05);
            padding: 1px 4px;
            border-radius: 2px;
        }
    </style>
</head>
<body>

    <div id="overlay">
        <button id="start-btn">Drive View24 起動</button>
    </div>

    <div class="container">
        <div class="header">
            <span class="title">🚗 Drive View24</span>
            <button id="sync-btn">🔄一括更新</button>
        </div>

        <div class="grid-row">
            <div class="card" id="c-time">
                <span>🕒 <span id="val-time">--:--</span></span>
                <span class="cd">リアルタイム</span>
            </div>
            <div class="card" id="c-weather">
                <span>🌈 <span id="val-weather">--</span></span>
                <span class="cd">⏳<span id="cd-weather">300</span>s</span>
            </div>
        </div>

        <div class="grid-row">
            <div class="card" id="c-sun">
                <span>🌅 <span id="val-sun">--</span></span>
                <span class="cd">⏳<span id="cd-sun">300</span>s</span>
            </div>
            <div class="card" id="c-env">
                <span>💨 <span id="val-env">--</span></span>
                <span class="cd">⏳<span id="cd-env">300</span>s</span>
            </div>
        </div>

        <div class="grid-row">
            <div class="card full-width" id="c-address">
                <span>📍 <span id="val-address" style="font-size:10px;">位置情報取得中...</span></span>
                <span class="cd">⏳<span id="cd-address">120</span>s</span>
            </div>
        </div>

        <div class="grid-row">
            <div class="card full-width" id="c-geo-spot">
                <span>🏢 <span id="val-landmark">--</span> | 🛣️ <span id="val-cross">--</span></span>
                <span class="cd">⏳<span id="cd-geo-spot">120</span>s</span>
            </div>
        </div>

        <div class="grid-row">
            <div class="card" id="c-heading">
                <span>🧭 <span id="val-heading">--°</span></span>
                <span class="cd">⏳<span id="cd-heading">2</span>s</span>
            </div>
            <div class="card" id="c-motion">
                <span>⛰️ <span id="val-altitude">--m</span> | 🚀 <span id="val-speed">--km/h</span></span>
                <span class="cd">⏳<span id="cd-motion">3</span>s</span>
            </div>
        </div>

        <div class="grid-row"><div class="card full-width" id="c-poi-cvs"><span>🏪 <span id="val-cvs" class="list-box">--</span></span><span class="cd">⏳<span id="cd-poi-cvs">120</span>s</span></div></div>
        <div class="grid-row"><div class="card full-width" id="c-poi-station"><span>🚃 <span id="val-station" class="list-box">--</span></span><span class="cd">⏳<span id="cd-poi-station">120</span>s</span></div></div>
        <div class="grid-row"><div class="card full-width" id="c-poi-gas"><span>⛽ <span id="val-gas" class="list-box">--</span></span><span class="cd">⏳<span id="cd-poi-gas">120</span>s</span></div></div>
        <div class="grid-row"><div class="card full-width" id="c-poi-toilet"><span>🚾 <span id="val-toilet" class="list-box">--</span></span><span class="cd">⏳<span id="cd-poi-toilet">120</span>s</span></div></div>
    </div>

    <script>
        // グローバル状態管理
        let lat = null, lon = null, heading = 0;
        const timers = {};

        // カウントダウン初期値
        const INTERVALS = { weather: 300, sun: 300, env: 300, address: 120, geo_spot: 120, heading: 2, motion: 3, poi_cvs: 120, poi_station: 120, poi_gas: 120, poi_toilet: 120 };
        let countdowns = { ...INTERVALS };

        document.getElementById('start-btn').addEventListener('click', () => {
            document.getElementById('overlay').style.display = 'none';
            initApp();
        });

        document.getElementById('sync-btn').addEventListener('click', () => {
            triggerAllUpdates();
        });

        function initApp() {
            // 1. リアルタイム時計
            setInterval(() => {
                const now = new Date();
                document.getElementById('val-time').innerText = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            }, 1000);

            // 2. 位置情報・方位・速度監視（DeviceOrientation & Geolocation Watch）
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(updateLocation, handleError, {enableHighAccuracy: true});
            }
            if (window.DeviceOrientationEvent) {
                window.addEventListener('deviceorientationabsolute', updateHeading, true);
            }

            // 3. カウントダウンタイマーの開始
            startCountdowns();
            
            // 初回データ即時取得
            triggerAllUpdates();
        }

        function updateLocation(position) {
            lat = position.coords.latitude;
            lon = position.coords.longitude;
            
            // 3秒毎更新のモーションデータ（標高・速度）
            if(countdowns.motion <= 0 || !document.getElementById('val-altitude').innerText.includes('m')) {
                const alt = position.coords.altitude ? Math.round(position.coords.altitude) : '--';
                const speed = position.coords.speed ? Math.round(position.coords.speed * 3.6) : 0;
                document.getElementById('val-altitude').innerText = alt + 'm';
                document.getElementById('val-speed').innerText = speed + 'km/h';
                flashCard('c-motion');
                countdowns.motion = INTERVALS.motion;
            }
        }

        function updateHeading(event) {
            // Webkitと標準の補正
            heading = event.alpha;
            if (event.webkitCompassHeading) heading = event.webkitCompassHeading;
            heading = Math.round(heading);

            if(countdowns.heading <= 0) {
                const directions = ['北', '北北東', '北東', '東北東', '東', '東南東', '南東', '南南東', '南', '南南西', '南西', '西難西', '西', '西北西', '北西', '北北西'];
                const idx = Math.round(heading / 22.5) % 16;
                document.getElementById('val-heading').innerText = `${directions[idx]} ${heading}°`;
                flashCard('c-heading');
                countdowns.heading = INTERVALS.heading;
            }
        }

        function handleError(err) {
            console.warn(`ERROR(${err.code}): ${err.message}`);
        }

        // 各種オープンAPIからの非同期データ取得
        async function fetchWeather() {
            if (!lat || !lon) return;
            try {
                // Open-Meteo API (無料・キー不要)
                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,apparent_temperature,precipitation,weather_code,pressure_msl,wind_speed_10m`);
                const data = await res.json();
                const cur = data.current;
                
                // 天気コード簡易変換
                let wText = "晴"; if(cur.weather_code > 3) wText = "曇"; if(cur.weather_code > 50) wText = "雨";

                document.getElementById('val-weather').innerText = `${wText} ${Math.round(cur.temperature_2m)}℃ 降水:${cur.precipitation}mm`;
                document.getElementById('val-env').innerText = `💨${Math.round(cur.wind_speed_10m)}m 💧${cur.relative_humidity_2m}% 🎈${Math.round(cur.pressure_msl)}hPa`;
                
                flashCard('c-weather');
                flashCard('c-env');
            } catch (e) { console.error(e); }
        }

        async function fetchSun() {
            if (!lat || !lon) return;
            try {
                // Sunrise Sunset API
                const res = await fetch(`https://api.sunrise-sunset.org/json?lat=${lat}&lng=${lon}&formatted=0`);
                const data = await res.json();
                const sunrise = new Date(data.results.sunrise).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                const sunset = new Date(data.results.sunset).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                document.getElementById('val-sun').innerText = `🌅${sunrise} 🌇${sunset}`;
                flashCard('c-sun');
            } catch (e) { console.error(e); }
        }

        async function fetchAddress() {
            if (!lat || !lon) return;
            try {
                // 逆ジオコーディング (OSM Nominatim) ※個人利用・低頻度前提
                const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&addressdetails=1`, {
                    headers: { 'Accept-Language': 'ja' }
                });
                const data = await res.json();
                const addr = data.address;
                const postcode = addr.postcode ? `〒${addr.postcode}` : '〒---';
                const state = addr.province || addr.state || '';
                const city = addr.city || addr.suburb || addr.town || '';
                const road = addr.road || '';
                
                document.getElementById('val-address').innerText = `${postcode} ${state}${city}${road}`;
                
                // ランドマーク・交差点名（代替としてOsmのname項目や構造化データを利用）
                document.getElementById('val-landmark').innerText = data.name || addr.building || '付近の建物';
                document.getElementById('val-cross').innerText = addr.suburb || '主要道路交差点付近';

                flashCard('c-address');
                flashCard('c-geo-spot');
            } catch (e) { console.error(e); }
        }

        async function fetchPOIs() {
            if (!lat || !lon) return;
            // Overpass API (OpenStreetMapの施設検索)
            const categories = {
                cvs: '[amenity=convenience]',
                station: '[railway=station]',
                gas: '[amenity=fuel]',
                toilet: '[amenity=toilets]'
            };

            for (const [key, filter] of Object.entries(categories)) {
                try {
                    const query = `[out:json];node${filter}(around:2000,${lat},${lon});out 3;`;
                    const res = await fetch(`https://overpass-api.de/api/interpreter?data=${encodeURIComponent(query)}`);
                    const data = await res.json();
                    
                    let html = '';
                    if(data.elements && data.elements.length > 0) {
                        data.elements.forEach(el => {
                            const name = el.tags.name || '詳細不明';
                            const dist = getDistance(lat, lon, el.lat, el.lon).toFixed(1);
                            html += `<span class="list-item">${name}(${dist}km)</span>`;
                        });
                    } else {
                        html = '周辺に見つかりません';
                    }
                    document.getElementById(`val-${key}`).innerHTML = html;
                    flashCard(`c-poi-${key}`);
                } catch (e) { console.all(`POI error (${key}):`, e); }
            }
        }

        // 2点間の距離計算 (ハバースイン公式)
        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLon / 2) * Math.sin(dLon / 2);
            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a)));
        }

        // エフェクト処理
        function flashCard(id) {
            const el = document.getElementById(id);
            if(el) {
                el.classList.add('flash');
                setTimeout(() => el.classList.remove('flash'), 1000);
            }
        }

        // カウントダウンループ制御
        function startCountdowns() {
            setInterval(() => {
                for (const key in countdowns) {
                    if (countdowns[key] > 0) {
                        countdowns[key]--;
                        const cdEl = document.getElementById(`cd-${key}`);
                        if (cdEl) cdEl.innerText = countdowns[key];
                    } else {
                        // カウントゼロで自動更新トリガー
                        triggerSingleUpdate(key);
                    }
                }
            }, 1000);
        }

        function triggerSingleUpdate(key) {
            if (!lat || !lon) return;
            if (['weather', 'env'].includes(key)) { fetchWeather(); countdowns.weather = INTERVALS.weather; countdowns.env = INTERVALS.env; }
            if (key === 'sun') { fetchSun(); countdowns.sun = INTERVALS.sun; }
            if (['address', 'geo_spot'].includes(key)) { fetchAddress(); countdowns.address = INTERVALS.address; countdowns.geo_spot = INTERVALS.geo_spot; }
            if (key.startsWith('poi_')) { fetchPOIs(); countdowns.poi_cvs = INTERVALS.poi_cvs; countdowns.poi_station = INTERVALS.poi_station; countdowns.poi_gas = INTERVALS.poi_gas; countdowns.poi_toilet = INTERVALS.poi_toilet; }
        }

        function triggerAllUpdates() {
            if(!lat || !lon) {
                // 初回位置情報確定待ち用の再帰
                navigator.geolocation.getCurrentPosition(p => {
                    updateLocation(p);
                    triggerAllUpdates();
                });
                return;
            }
            fetchWeather();
            fetchSun();
            fetchAddress();
            fetchPOIs();
            // カウントリセット
            for (const key in countdowns) countdowns[key] = INTERVALS[key];
        }
    </script>
</body>
</html>
