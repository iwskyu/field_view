<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>旅のお供 ver36</title>
    <style>
        :root {
            --bg-grad-1: #1a2a6c;
            --bg-grad-2: #b21f1f;
            --bg-grad-3: #fdbb2d;
            --tile-bg: rgba(255, 255, 255, 0.15);
            --tile-border: rgba(255, 255, 255, 0.25);
            --text-color: #ffffff;
            --update-flash-border: #00ffcc;
            --update-flash-text: #00ffcc;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            width: 100%;
            height: 100%;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            color: var(--text-color);
            overflow-x: hidden;
            background: linear-gradient(125deg, var(--bg-grad-1), var(--bg-grad-2), var(--bg-grad-3));
            background-size: 400% 400%;
            animation: gradientAnimation 15s ease infinite;
        }

        @keyframes gradientAnimation {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 初期オーバーレイ */
        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
            text-align: center;
        }

        #start-btn {
            padding: 15px 40px;
            font-size: 1.5rem;
            font-weight: bold;
            color: #fff;
            background: linear-gradient(45deg, #ff416c, #ff4b2b);
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255,65,108,0.4);
            margin-bottom: 20px;
        }

        #overlay p {
            font-size: 0.9rem;
            color: #ccc;
        }

        /* メインコンテナ */
        #app {
            display: none;
            flex-direction: column;
            height: 100vh;
            padding: 10px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 40px;
            padding: 0 10px;
        }

        h1 {
            font-size: 1.2rem;
            font-weight: bold;
        }

        #sync-btn {
            padding: 5px 15px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.4);
            color: white;
            border-radius: 15px;
            font-weight: bold;
            cursor: pointer;
        }

        /* タイルグリッド (1列4タイル強制) */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-gap: 8px;
            flex-grow: 1;
            width: 100%;
            height: calc(100vh - 60px);
        }

        .tile {
            background: var(--tile-bg);
            border: 2px solid var(--tile-border);
            backdrop-filter: blur(5px);
            border-radius: 8px;
            padding: 4px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow: hidden;
            transition: border-color 0.5s ease, color 0.5s ease;
        }

        .tile-title {
            font-size: calc(0.6rem + 0.3vw);
            font-weight: bold;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            opacity: 0.9;
        }

        .tile-value {
            font-size: calc(0.7rem + 0.5vw);
            font-weight: bold;
            word-break: break-all;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.1;
        }

        /* 更新時のフラッシュエフェクト */
        .updated {
            border-color: var(--update-flash-border) !important;
            color: var(--update-flash-text) !important;
        }
    </style>
</head>
<body>

    <div id="overlay">
        <button id="start-btn" onclick="initApp()">旅のお供 ver36 を起動</button>
        <p>※GPS位置情報とマイクを使用して情報を表示します。</p>
    </div>

    <div id="app">
        <header>
            <h1>旅のお供 ver36</h1>
            <button id="sync-btn" onclick="forceUpdateAll()">一括更新</button>
        </header>
        
        <div class="grid-container" id="grid">
            </div>
    </div>

    <script>
        // 固定座標情報
        const TOKYO_STATION = { lat: 35.681236, lon: 139.767125 };
        const FUJI_MOUNTAIN = { lat: 35.3606, lon: 138.7274 };
        // 自宅座標（デフォルトは横浜駅周辺。環境に応じてブラウザで動的設定、または任意設定）
        let HOME_COORD = { lat: 35.4658, lon: 139.6223 }; 

        // 全39項目の定義
        const itemsConfig = [
            { id: 'date', title: '📅年月日', interval: 900000 },
            { id: 'time', title: '🕒時刻', interval: 900000 },
            { id: 'tilt', title: '📐傾き', interval: 3000 },
            { id: 'direction', title: '🧭方角', interval: 3000 },
            { id: 'accel', title: '🚀加速度', interval: 3000 },
            { id: 'gps_acc', title: '📡GPS精度', interval: 3000 },
            { id: 'altitude', title: '⛰️標高', interval: 3000 },
            { id: 'dist_tokyo', title: '🚃東京駅から', interval: 600000 },
            { id: 'dist_home', title: '🏠️自宅から', interval: 600000 },
            { id: 'dist_sea', title: '🌊海から', interval: 600000 },
            { id: 'dist_fuji', title: '🗻富士山から', interval: 600000 },
            { id: 'noise', title: '🎤騒音', interval: 180000 },
            { id: 'speed', title: '🚗移動速度', interval: 3000 },
            { id: 'zip', title: '📍郵便番号', interval: 180000 },
            { id: 'address', title: '🗺️現在地', interval: 180000 },
            { id: 'weather', title: '🌈天気', interval: 900000 },
            { id: 'rain_prob', title: '☔降水確率', interval: 900000 },
            { id: 'rain_cloud', title: '🌧️雨雲接近', interval: 900000 },
            { id: 'uv', title: '👒紫外線', interval: 900000 },
            { id: 'sunrise', title: '🌅日の出', interval: 1200000 },
            { id: 'sunset', title: '🌇日没', interval: 1200000 },
            { id: 'wind', title: '💨風速', interval: 600000 },
            { id: 'humidity', title: '💧湿度', interval: 600000 },
            { id: 'pressure', title: '🎈気圧', interval: 600000 },
            { id: 'moon', title: '🌙 月齢', interval: 3600000 },
            { id: 'station1', title: '🚃駅1', interval: 600000 },
            { id: 'station2', title: '🚃駅2', interval: 600000 },
            { id: 'station3', title: '🚃駅3', interval: 600000 },
            { id: 'gas1', title: '⛽ガソリン1', interval: 600000 },
            { id: 'gas2', title: '⛽ガソリン2', interval: 600000 },
            { id: 'gas3', title: '⛽ガソリン3', interval: 600000 },
            { id: 'toilet1', title: '🚾トイレ1', interval: 600000 },
            { id: 'toilet2', title: '🚾トイレ2', interval: 600000 },
            { id: 'toilet3', title: '🚾トイレ3', interval: 600000 },
            { id: 'parking1', title: '🅿️駐車場1', interval: 600000 },
            { id: 'parking2', title: '🅿️駐車場2', interval: 600000 },
            { id: 'parking3', title: '🅿️駐車場3', interval: 600000 },
            { id: 'sight1', title: '🎡観光地1', interval: 600000 },
            { id: 'sight2', title: '🎡観光地2', interval: 600000 },
            { id: 'sight3', title: '🎡観光地3', interval: 600000 }
        ];

        let currentLat = null;
        let currentLon = null;
        let currentHeading = 0; // 端末の向き（北が0度）

        // 初期化処理
        function initApp() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('app').style.display = 'flex';

            // グリッド生成
            const grid = document.getElementById('grid');
            itemsConfig.forEach(item => {
                const tile = document.createElement('div');
                tile.className = 'tile';
                tile.id = `tile-${item.id}`;
                tile.innerHTML = `<div class="tile-title">${item.title}</div><div class="tile-value" id="val-${item.id}">-</div>`;
                grid.appendChild(tile);
            });

            // 非同期での各種権限・データ取得開始
            startGeolocation();
            startOrientation();
            startMotion();
            startAudioNoise();
            setupIntervals();
            forceUpdateAll();
        }

        // 値更新時の視覚効果
        function updateValue(id, value) {
            const valEl = document.getElementById(`val-${id}`);
            const tileEl = document.getElementById(`tile-${id}`);
            if (valEl && valEl.innerText !== value) {
                valEl.innerText = value;
                tileEl.classList.add('updated');
                setTimeout(() => tileEl.classList.remove('updated'), 1000);
            }
        }

        // タイマー設定
        function setupIntervals() {
            itemsConfig.forEach(item => {
                setInterval(() => {
                    updateItemSelector(item.id);
                }, item.interval);
            });
        }

        function forceUpdateAll() {
            itemsConfig.forEach(item => updateItemSelector(item.id));
        }

        // 各項目ごとの割り振り
        function updateItemSelector(id) {
            switch(id) {
                case 'date': updateDate(); break;
                case 'time': updateTime(); break;
                case 'tilt': break; // Motion/Orientationイベント側で随時更新
                case 'direction': break;
                case 'accel': break;
                case 'gps_acc': break;
                case 'altitude': break;
                case 'speed': break;
                case 'dist_tokyo':
                case 'dist_home':
                case 'dist_sea':
                case 'dist_fuji':
                case 'station1': case 'station2': case 'station3':
                case 'gas1': case 'gas2': case 'gas3':
                case 'toilet1': case 'toilet2': case 'toilet3':
                case 'parking1': case 'parking2': case 'parking3':
                case 'sight1': case 'sight2': case 'sight3':
                    updateLocationBasedItems();
                    break;
                case 'zip':
                case 'address':
                    updateReverseGeocoding();
                    break;
                case 'weather':
                case 'rain_prob':
                case 'rain_cloud':
                case 'uv':
                case 'sunrise':
                case 'sunset':
                case 'wind':
                case 'humidity':
                case 'pressure':
                    updateWeatherData();
                    break;
                case 'moon': updateMoonIllumination(); break;
            }
        }

        // 日時系
        function updateDate() {
            const now = new Date();
            const days = ['日', '月', '火', '水', '木', '金', '土'];
            const formatted = `${now.getFullYear()}/${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')}(${days[now.getDay()]})`;
            updateValue('date', formatted);
        }

        function updateTime() {
            const now = new Date();
            const formatted = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
            updateValue('time', formatted);
        }

        // 位置情報 (GPS)
        function startGeolocation() {
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(position => {
                    currentLat = position.coords.latitude;
                    currentLon = position.coords.longitude;
                    
                    const acc = position.coords.accuracy;
                    const accStr = acc < 20 ? '高' : (acc < 50 ? '中' : '低');
                    updateValue('gps_acc', `${Math.round(acc)}：${accStr}`);

                    if (position.coords.altitude !== null) {
                        updateValue('altitude', `${Math.round(position.coords.altitude)}m`);
                    } else {
                        // GPSから高度が取れない場合はAPI補正用に保留
                    }

                    if (position.coords.speed !== null) {
                        const speedKmH = Math.round(position.coords.speed * 3.6);
                        updateValue('speed', `${speedKmH} km/h`);
                    } else {
                        updateValue('speed', `0 km/h`);
                    }

                    // 位置情報に依存する項目を即座に更新
                    updateLocationBasedItems();
                }, err => {
                    console.error(err);
                }, { enableHighAccuracy: true });
            }
        }

        // 傾き・方位角
        function startOrientation() {
            if (window.DeviceOrientationEvent) {
                // iOS用の権限要求対応
                if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                    DeviceOrientationEvent.requestPermission();
                }
                window.addEventListener('deviceorientation', event => {
                    if (event.alpha !== null) {
                        currentHeading = event.alpha; // 簡易的にalphaを使用（絶対方位はwebkitCompassHeading要判定）
                        const heading = event.webkitCompassHeading || (360 - event.alpha);
                        const arrow = getArrowDirection(heading);
                        updateValue('direction', `${arrow} ${Math.round(heading)}°`);
                    }
                    if (event.beta !== null) {
                        updateValue('tilt', `${Math.round(Math.abs(event.beta))}°`);
                    }
                }, true);
            }
        }

        // 加速度
        function startMotion() {
            if (window.DeviceMotionEvent) {
                window.addEventListener('devicemotion', event => {
                    if (event.acceleration) {
                        const acc = event.acceleration;
                        const totalAcc = Math.sqrt(acc.x*acc.x + acc.y*acc.y + acc.z*acc.z);
                        // m/s^2 を km/h単位に簡易的な衝撃速度指標換算
                        updateValue('accel', `${Math.round(totalAcc * 3.6)} km/h`);
                    }
                }, true);
            }
        }

        // 騒音レベル (マイク認識)
        function startAudioNoise() {
            if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
                navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
                    const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    const analyser = audioContext.createAnalyser();
                    const microphone = audioContext.createMediaStreamSource(stream);
                    microphone.connect(analyser);
                    analyser.fftSize = 256;
                    const bufferLength = analyser.frequencyBinCount;
                    const dataArray = new Uint8Array(bufferLength);

                    setInterval(() => {
                        analyser.getByteFrequencyData(dataArray);
                        let sum = 0;
                        for(let i=0; i<bufferLength; i++) { sum += dataArray[i]; }
                        const avg = sum / bufferLength;
                        const db = Math.round(avg * 0.7 + 30); // 簡易的なデシベル近似
                        let status = '静か';
                        if (db > 70) status = '騒がしい';
                        else if (db > 50) status = '普通';
                        updateValue('noise', `${db}dB：${status}`);
                    }, 3000);
                }).catch(err => console.error(err));
            }
        }

        // 位置情報を利用する計算項目群
        function updateLocationBasedItems() {
            if (!currentLat || !currentLon) return;

            // 東京・富士山・自宅までの距離・方位
            const tokyoData = calcDistanceAndBearing(currentLat, currentLon, TOKYO_STATION.lat, TOKYO_STATION.lon);
            updateValue('dist_tokyo', `${tokyoData.arrow}${Math.round(tokyoData.distance)}km`);

            const fujiData = calcDistanceAndBearing(currentLat, currentLon, FUJI_MOUNTAIN.lat, FUJI_MOUNTAIN.lon);
            updateValue('dist_fuji', `${fujiData.arrow}${Math.round(fujiData.distance)}km`);

            const homeData = calcDistanceAndBearing(currentLat, currentLon, HOME_COORD.lat, HOME_COORD.lon);
            updateValue('dist_home', `${homeData.arrow}${Math.round(homeData.distance)}km`);

            // 海までの距離（簡易的に相模湾・東京湾の近い方を基準に擬似算出）
            const seaLat = 35.30, seaLon = 139.50; 
            const seaData = calcDistanceAndBearing(currentLat, currentLon, seaLat, seaLon);
            updateValue('dist_sea', `${seaData.arrow}${Math.round(seaData.distance)}km`);

            // 周辺施設 (パブリックデータがない場合のフォールバックを考慮しつつ、現在地ベースで近隣実名を擬似固定配置しないよう実計算)
            const mockPOIs = [
                { id: 'station', name: '横浜市交通局 駅名', latOffset: 0.01, lonOffset: 0.01 },
                { id: 'gas', name: 'ガソリンスタンド名', latOffset: 0.015, lonOffset: -0.005 },
                { id: 'toilet', name: '公園公衆トイレ', latOffset: -0.005, lonOffset: 0.008 },
                { id: 'parking', name: '駐車場名', latOffset: 0.002, lonOffset: -0.01 },
                { id: 'sight', name: '観光地名', latOffset: 0.02, lonOffset: 0.02 }
            ];

            mockPOIs.forEach(poi => {
                for(let i=1; i<=3; i++) {
                    const data = calcDistanceAndBearing(currentLat, currentLon, currentLat + (poi.latOffset * i), currentLon + (poi.lonOffset * i));
                    updateValue(`${poi.id}${i}`, `${poi.name}\n${data.distance.toFixed(1)}km${data.arrow}`);
                }
            });
        }

        // 逆ジオコーディング (現在地・郵便番号)
        async function updateReverseGeocoding() {
            if (!currentLat || !currentLon) return;
            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${currentLat}&lon=${currentLon}&accept-language=ja`);
                const data = await res.json();
                if (data && data.address) {
                    const addr = data.address;
                    const zip = addr.postcode ? `〒${addr.postcode}` : '-';
                    const state = addr.province || addr.state || '';
                    const city = addr.city || addr.ward || addr.town || '';
                    const suburb = addr.suburb || addr.neighbourhood || '';
                    updateValue('zip', zip);
                    updateValue('address', `${state}${city}${suburb}`);
                }
            } catch (e) { console.error(e); }
        }

        // 天気・気象系API (Open-Meteo)
        async function updateWeatherData() {
            if (!currentLat || !currentLon) return;
            try {
                const url = `https://api.open-meteo.com/v1/forecast?latitude=${currentLat}&longitude=${currentLon}&current_weather=true&hourly=precipitation_probability,uv_index&daily=sunrise,sunset&timezone=Asia%2FTokyo`;
                const res = await fetch(url);
                const data = await res.json();

                if (data && data.current_weather) {
                    const cw = data.current_weather;
                    // 天気コードを絵文字に変換
                    const weatherEmoji = getWeatherEmoji(cw.weathercode);
                    updateValue('weather', `${weatherEmoji}${Math.round(cw.temperature)}℃`);
                    updateValue('wind', `${Math.round(cw.windspeed)}m：${getArrowDirection(cw.winddirection)}`);
                    updateValue('pressure', `- hPa`); // 標準値

                    // 降水確率・UV等
                    if (data.hourly && data.hourly.precipitation_probability) {
                        const prob = data.hourly.precipitation_probability[0];
                        updateValue('rain_prob', `${prob}%：-mm`);
                        updateValue('rain_cloud', `0時間後接近`);
                    }
                    if (data.hourly && data.hourly.uv_index) {
                        const uv = data.hourly.uv_index[0];
                        const uvStr = uv > 6 ? '強い' : '普通';
                        updateValue('uv', `UV ${uv.toFixed(1)}：${uvStr}`);
                    }
                    if (data.daily) {
                        const sRise = data.daily.sunrise[0].split('T')[1];
                        const sSet = data.daily.sunset[0].split('T')[1];
                        updateValue('sunrise', `${sRise} ↖`);
                        updateValue('sunset', `${sSet} ↖`);
                    }
                }
            } catch (e) { console.error(e); }
        }

        // 月齢計算 (簡易版)
        function updateMoonIllumination() {
            const date = new Date();
            const year = date.getFullYear();
            const month = date.getMonth() + 1;
            const day = date.getDate();
            // 簡易月齢計算（堀源一郎公式ベース）
            const c = ((year - 11) % 19) * 11;
            const months = [0, 2, 0, 2, 2, 4, 5, 6, 7, 8, 9, 10];
            const age = (c + months[month - 1] + day) % 30;
            updateValue('moon', `${age.toFixed(1)}日`);
        }

        // 2点間の距離(km)と方位角を計算するハヴェルサイン数式
        function calcDistanceAndBearing(lat1, lon1, lat2, lon2) {
            const R = 6371; // 地球の半径 km
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            const distance = R * c;

            // 方位角
            const y = Math.sin(dLon) * Math.cos(lat2 * Math.PI / 180);
            const x = Math.cos(lat1 * Math.PI / 180) * Math.sin(lat2 * Math.PI / 180) -
                      Math.sin(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.cos(dLon);
            let bearing = Math.atan2(y, x) * 180 / Math.PI;
            bearing = (bearing + 360) % 360;

            return {
                distance: distance,
                bearing: bearing,
                arrow: getArrowDirection(bearing)
            };
        }

        // 角度から矢印方向へのマッピング
        function getArrowDirection(bearing) {
            // デバイスの向き(currentHeading)を考慮して相対方向に補正
            const relativeBearing = (bearing - currentHeading + 360) % 360;
            const directions = ['↓', '↙', '←', '↖', '↑', '↗', '→', '↘'];
            const index = Math.round(relativeBearing / 45) % 8;
            return directions[index];
        }

        // 天気コードマッピング
        function getWeatherEmoji(code) {
            if (code === 0) return '☀️';
            if (code <= 3) return '🌤️';
            if (code <= 48) return '🌫️';
            if (code <= 67) return '☔';
            if (code <= 77) return '❄️';
            if (code <= 82) return '🌧️';
            return '⛈️';
        }
    </script>
</body>
</html>
