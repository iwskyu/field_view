<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Drive View17</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; font-weight: bold; }
        
        body, html { width: 100%; height: 100%; overflow: hidden; background: #000; }

        /* スマホの上半分だけを表示領域にする */
        .container {
            width: 100%;
            height: 50vh;
            position: relative;
            background: linear-gradient(125deg, #2c3e50, #2980b9, #8e44ad, #2c3e50);
            background-size: 400% 400%;
            animation: gradientAnimation 15s ease infinite;
            color: #fff;
            padding: 10px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            font-size: 1.15rem; /* 標準より1サイズ大きく */
            border-bottom: 2px solid #fff;
        }

        @keyframes gradientAnimation {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 初期オーバーレイボタン */
        #auth-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 50vh;
            background: rgba(0,0,0,0.9); z-index: 100;
            display: flex; justify-content: center; align-items: center;
        }
        #auth-btn {
            padding: 15px 30px; font-size: 1.5rem; background: #e74c3c; color: white;
            border: none; border-radius: 10px; cursor: pointer; animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        /* ヘッダーエリア */
        .header { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        .time-display { font-size: 1.6rem; color: #00ffcc; }
        .btn-refresh {
            padding: 4px 10px; background: rgba(255,255,255,0.2); border: 2px solid #fff;
            color: #fff; border-radius: 5px; cursor: pointer; font-size: 0.9rem;
        }

        /* グリッドレイアウト */
        .grid-main {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            margin: 4px 0;
        }
        .card {
            background: rgba(0, 0, 0, 0.4);
            padding: 6px;
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
        }
        .card-title { font-size: 0.75rem; color: #ccc; margin-bottom: 2px; }
        .card-value { width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 1.1rem; }
        .address-text { font-size: 0.8rem; white-space: normal; word-break: break-all; }

        /* カウントダウンバッジ */
        .timer-badge {
            position: absolute; top: 2px; right: 4px; font-size: 0.55rem; color: #ffeb3b;
        }

        /* リストエリア（下部施設） */
        .list-section {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 6px;
            font-size: 0.85rem;
        }
        .list-box {
            background: rgba(0, 0, 0, 0.5);
            padding: 4px;
            border-radius: 6px;
            height: 62px;
            overflow: hidden;
            position: relative;
        }
        .list-item {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-size: 0.75rem;
            margin-top: 1px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="auth-overlay">
            <button id="auth-btn" onclick="initApp()">🚗 Drive View17 起動</button>
        </div>

        <div class="header">
            <div class="time-display">🕒 <span id="txt-time">--:--</span></div>
            <button class="btn-refresh" onclick="forceRefreshAll()">🔄一括更新</button>
        </div>

        <div class="grid-main">
            <div class="card">
                <span class="card-title">🌈 <span id="timer-weather" class="timer-badge"></span></span>
                <span class="card-value" id="txt-weather">--</span>
            </div>
            <div class="card">
                <span class="card-title">🌅🌇 <span id="timer-sun" class="timer-badge"></span></span>
                <span class="card-value" id="txt-sun" style="font-size:0.9rem;">--</span>
            </div>
            <div class="card">
                <span class="card-title">💨💧🎈 <span id="timer-env" class="timer-badge"></span></span>
                <span class="card-value" id="txt-env" style="font-size:0.85rem;">--</span>
            </div>
            <div class="card" style="grid-column: span 2;">
                <span class="card-title">📍🏠 <span id="timer-addr" class="timer-badge"></span></span>
                <span class="card-value address-text" id="txt-addr">位置情報取得中...</span>
            </div>
            <div class="card">
                <span class="card-title">🏢 <span id="timer-geo" class="timer-badge"></span></span>
                <span class="card-value address-text" id="txt-landmark">--</span>
            </div>
        </div>

        <div class="grid-main" style="margin-bottom: 4px;">
            <div class="card">
                <span class="card-title">🧭 <span id="timer-r3s1" class="timer-badge"></span></span>
                <span class="card-value" id="txt-heading">--°</span>
            </div>
            <div class="card">
                <span class="card-title">⛰️ <span id="timer-r3s2" class="timer-badge"></span></span>
                <span class="card-value" id="txt-altitude">--m</span>
            </div>
            <div class="card">
                <span class="card-title">⚡ <span id="timer-r3s3" class="timer-badge"></span></span>
                <span class="card-value" id="txt-speed">--🏃</span>
            </div>
        </div>

        <div class="list-section">
            <div class="list-box">
                <span class="card-title">🚉 駅 <span id="timer-poi" class="timer-badge"></span></span>
                <div id="list-station"></div>
            </div>
            <div class="list-box">
                <span class="card-title">🚾 トイレ</span>
                <div id="list-toilet"></div>
            </div>
            <div class="list-box">
                <span class="card-title">⛽ GS</span>
                <div id="list-gas"></div>
            </div>
            <div class="list-box">
                <span class="card-title">🏪 コンビニ</span>
                <div id="list-store"></div>
            </div>
        </div>
    </div>

    <script>
        // グローバル状態管理
        let currentLat = null;
        let currentLon = null;
        let currentHeading = 0;

        // タイマーカウントダウン用変量 (秒)
        let timers = { weather: 300, sun: 300, env: 300, addr: 120, geo: 120, r3s: 3, poi: 120 };
        const intervals = { weather: 300, sun: 300, env: 300, addr: 120, geo: 120, r3s: 3, poi: 120 };

        function initApp() {
            document.getElementById('auth-overlay').style.display = 'none';
            
            // 1. リアルタイム位置・速度・標高監視 (Geolocation API)
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(updateRealtimeLocation, handleError, {
                    enableHighAccuracy: true,
                    timeout: 10000,
                    maximumAge: 0
                });
            } else {
                alert("GPSがサポートされていません");
            }

            // 2. コンパス方位取得 (DeviceOrientation API)
            if (window.DeviceOrientationEvent) {
                window.addEventListener('deviceorientationabsolute', handleOrientation, true);
                window.addEventListener('deviceorientation', handleOrientation, true);
            }

            // 初回全データロード
            startClock();
            startCountdowns();
        }

        function updateRealtimeLocation(position) {
            currentLat = position.coords.latitude;
            currentLon = position.coords.longitude;
            
            // 速度変換 (m/s -> km/h)
            if (position.coords.speed !== null && position.coords.speed >= 0) {
                const speedKmH = Math.round(position.coords.speed * 3.6);
                document.getElementById('txt-speed').innerText = `${speedKmH}km/h`;
            } else {
                document.getElementById('txt-speed').innerText = `0km/h`;
            }

            // 標高
            if (position.coords.altitude !== null) {
                document.getElementById('txt-altitude').innerText = `${Math.round(position.coords.altitude)}m`;
            } else {
                // GPSで高度が取れない場合は0表示、またはAPI補正
                document.getElementById('txt-altitude').innerText = `---m`;
            }

            // GPS方位バックアップ
            if (position.coords.heading !== null && !isNaN(position.coords.heading)) {
                currentHeading = position.coords.heading;
            }
        }

        function handleOrientation(event) {
            let heading = event.webkitCompassHeading || event.alpha;
            if (heading !== null && heading !== undefined) {
                // 補正（絶対方位）
                if(event.absolute === false && event.webkitCompassHeading === undefined) {
                    heading = 360 - heading; 
                }
                currentHeading = Math.round(heading);
                const dirStr = getDirectionString(currentHeading);
                document.getElementById('txt-heading').innerText = `${dirStr}${currentHeading}°`;
            }
        }

        function handleError(error) {
            console.warn("Location error: ", error.message);
        }

        // 時計表示
        function startClock() {
            setInterval(() => {
                const now = new Date();
                document.getElementById('txt-time').innerText = now.toTimeString().substring(0, 5);
            }, 1000);
            const now = new Date();
            document.getElementById('txt-time').innerText = now.toTimeString().substring(0, 5);
        }

        // カウントダウン処理
        function startCountdowns() {
            setInterval(() => {
                // 各種タイマーをデクリメント
                for (let key in timers) {
                    timers[key]--;
                    if (timers[key] <= 0) {
                        triggerFetch(key);
                        timers[key] = intervals[key];
                    }
                }
                // バッジの更新
                document.getElementById('timer-weather').innerText = `${timers.weather}s`;
                document.getElementById('timer-sun').innerText = `${timers.sun}s`;
                document.getElementById('timer-env').innerText = `${timers.env}s`;
                document.getElementById('timer-addr').innerText = `${timers.addr}s`;
                document.getElementById('timer-geo').innerText = `${timers.geo}s`;
                document.getElementById('timer-r3s1').innerText = `${timers.r3s}s`;
                document.getElementById('timer-r3s2').innerText = `${timers.r3s}s`;
                document.getElementById('timer-r3s3').innerText = `${timers.r3s}s`;
                document.getElementById('timer-poi').innerText = `${timers.poi}s`;
            }, 1000);

            // 初回データ取得
            forceRefreshAll();
        }

        function forceRefreshAll() {
            if(!currentLat || !currentLon) {
                // GPS取得を待つためのダミー初期座標 (横浜駅周辺) を仮置きして即座に動かすことも可能
                currentLat = 35.4658;
                currentLon = 139.6223;
            }
            triggerFetch('weather');
            triggerFetch('sun');
            triggerFetch('env');
            triggerFetch('addr');
            triggerFetch('geo');
            triggerFetch('poi');
            
            for (let key in timers) { timers[key] = intervals[key]; }
        }

        function triggerFetch(key) {
            if (!currentLat || !currentLon) return;

            switch(key) {
                case 'weather':
                case 'env':
                case 'sun':
                    fetchWeatherAndEnv();
                    break;
                case 'addr':
                case 'geo':
                    fetchAddressAndLandmark();
                    break;
                case 'poi':
                    fetchPOIs();
                    break;
            }
        }

        // --- API 連携部 ---

        // 1. Open-Meteo API を利用した気象、日の出没、環境データの取得
        function fetchWeatherAndEnv() {
            const url = `https://api.open-meteo.com/v1/forecast?latitude=${currentLat}&longitude=${currentLon}&current=temperature_2m,relative_humidity_2m,apparent_temperature,precipitation,weather_code,surface_pressure&daily=sunrise,sunset&timezone=auto`;
            
            fetch(url)
            .then(res => res.json())
            .then(data => {
                const cur = data.current;
                // 天気コードから簡易判定
                let wStr = "☁️";
                if(cur.weather_code === 0) wStr = "☀️";
                else if([1,2,3].includes(cur.weather_code)) wStr = "⛅";
                else if([51,53,55,61,63,65,80,81,82].includes(cur.weather_code)) wStr = "☔";
                
                // 天気表示
                document.getElementById('txt-weather').innerText = `${Math.round(cur.temperature_2m)}℃ ${wStr} 💧${cur.precipitation}mm`;
                
                // 環境表示 (風速は今回デフォルトにないため擬似計算、または固定項目へマッピング)
                // Open-Meteoに風速を追加要求することも可能だが簡易版として気圧と湿度を集約
                document.getElementById('txt-env').innerText = `💧${cur.relative_humidity_2m}% 🎈${Math.round(cur.surface_pressure)}hPa`;

                // 日の出日の出没
                if(data.daily && data.daily.sunrise && data.daily.sunset) {
                    const rise = data.daily.sunrise[0].substring(11, 16);
                    const set = data.daily.sunset[0].substring(11, 16);
                    // 方位角計算は簡易的に東(↗)/西(↖)を付与
                    document.getElementById('txt-sun').innerText = `🌅${rise}↗ 🌇${set}↖`;
                }
            }).catch(e => console.error(e));
        }

        // 2. Nominatim OpenStreetMap による逆ジオコーディング (住所・建物名)
        function fetchAddressAndLandmark() {
            const url = `https://nominatim.openstreetmap.org/reverse?format=json&lat=${currentLat}&lon=${currentLon}&zoom=18&addressdetails=1`;
            
            fetch(url, { headers: { 'User-Agent': 'DriveView17_App' } })
            .then(res => res.json())
            .then(data => {
                if(data && data.address) {
                    const a = data.address;
                    const zip = a.postcode ? `〒${a.postcode}` : '〒---';
                    const state = a.province || a.prefecture || '';
                    const city = a.city || a.ward || a.town || '';
                    const road = a.road || '';
                    const houseNum = a.house_number || '';
                    
                    document.getElementById('txt-addr').innerText = `${zip} ${state}${city}${road}${houseNum}`;
                    
                    // ランドマーク（建物名・店舗名などがあれば抽出）
                    const landmark = data.name || a.building || a.amenity || a.shop || "最寄り建物不明";
                    document.getElementById('txt-landmark').innerText = landmark;
                }
            }).catch(e => console.error(e));
        }

        // 3. Overpass API を使用した周辺施設探索 (駅、トイレ、GS、コンビニ)
        function fetchPOIs() {
            // 現在地周囲約2.0km以内のクエリ設定
            const radius = 2000;
            const query = `
                [out:json][timeout:15];
                (
                  node["railway"="station"](around:${radius},${currentLat},${currentLon});
                  node["amenity"="toilets"](around:${radius},${currentLat},${currentLon});
                  node["amenity"="fuel"](around:${radius},${currentLat},${currentLon});
                  node["shop"="convenience"](around:${radius},${currentLat},${currentLon});
                );
                out body;
            `;
            const url = `https://overpass-api.de/api/interpreter?data=${encodeURIComponent(query)}`;

            fetch(url)
            .then(res => res.json())
            .then(data => {
                if(!data || !data.elements) return;

                let stations = [], toilets = [], gasStations = [], stores = [];

                data.elements.forEach(el => {
                    const dist = calculateDistance(currentLat, currentLon, el.lat, el.lon);
                    const angle = calculateBearing(currentLat, currentLon, el.lat, el.lon);
                    const arrow = getArrowEmoji(angle);
                    const item = {
                        name: el.tags.name || el.tags.brand || "名称未設定",
                        dist: dist,
                        arrow: arrow
                    };

                    if(el.tags.railway === 'station') stations.push(item);
                    else if(el.tags.amenity === 'toilets') { item.name = el.tags.operator || "公衆トイレ"; toilets.push(item); }
                    else if(el.tags.amenity === 'fuel') { item.name = el.tags.brand || el.tags.name || "ガソリンスタンド"; gasStations.push(item); }
                    else if(el.tags.shop === 'convenience') { item.name = el.tags.brand || el.tags.name || "コンビニ"; stores.push(item); }
                });

                // 距離が近い順にソートして3件描画
                renderList('list-station', stations.sort((a,b)=>a.dist-b.dist).slice(0,3));
                renderList('list-toilet', toilets.sort((a,b)=>a.dist-b.dist).slice(0,3));
                renderList('list-gas', gasStations.sort((a,b)=>a.dist-b.dist).slice(0,3));
                renderList('list-store', stores.sort((a,b)=>a.dist-b.dist).slice(0,3));
            }).catch(e => console.error(e));
        }

        function renderList(elementId, items) {
            const container = document.getElementById(elementId);
            container.innerHTML = '';
            if(items.length === 0) {
                container.innerHTML = '<div class="list-item">🔍 近隣になし</div>';
                return;
            }
            items.forEach(item => {
                const div = document.createElement('div');
                div.className = 'list-item';
                // 文字数が長い場合はフォントサイズを下げるインライン処理
                if(item.name.length > 8) div.style.fontSize = '0.65rem';
                div.innerText = `${item.name} ${(item.dist/1000).toFixed(1)}km ${item.arrow}`;
                container.appendChild(div);
            });
        }

        // --- 計算ユーティリティ群 ---

        // 2点間の距離算出 (ヒュベニの公式簡易版)
        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371000; // 地球半径(m)
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }

        // 現在地から対象物への方位角算出
        function calculateBearing(lat1, lon1, lat2, lon2) {
            const phi1 = lat1 * Math.PI / 180;
            const phi2 = lat2 * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const y = Math.sin(dLon) * Math.cos(phi2);
            const x = Math.cos(phi1) * Math.sin(phi2) - Math.sin(phi1) * Math.cos(phi2) * Math.cos(dLon);
            return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
        }

        // 方位角に対応する矢印絵文字
        function getArrowEmoji(bearing) {
            const arrows = ['⬆️', '↗️', '➡️', '↘️', '⬇️', '↙️', '⬅️', '↖️'];
            const index = Math.round(bearing / 45) % 8;
            return arrows[index];
        }

        // 数値方位から文字方位への変換
        function getDirectionString(degree) {
            const sectors = ["北", "北北東", "北東", "東北東", "東", "東南東", "南東", "南南東", "南", "南南西", "南西", "西西南", "西", "西北西", "北西", "北北西"];
            const index = Math.round(degree / 22.5) % 16;
            return sectors[index];
        }
    </script>
</body>
