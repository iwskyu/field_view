<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drive View21</title>
    <style>
        :root {
            --bg-grad-1: #0f2027;
            --bg-grad-2: #203a43;
            --bg-grad-3: #2c5364;
            --text-color: #ffffff;
            --card-bg: rgba(255, 255, 255, 0.08);
            --accent-color: #00ffcc;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }

        body {
            background: linear-gradient(-45deg, var(--bg-grad-1), var(--bg-grad-2), var(--bg-grad-3));
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: var(--text-color);
            min-height: 100vh;
            padding: 10px;
            font-weight: bold;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px 10px;
            margin-bottom: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }

        h1 {
            font-size: 1.2rem;
            color: var(--accent-color);
        }

        button {
            background: var(--accent-color);
            color: #000;
            border: none;
            padding: 8px 12px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.9rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        #start-btn {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1000;
            padding: 20px 40px;
            font-size: 1.5rem;
            border-radius: 10px;
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 8px;
            display: none;
        }

        .card {
            background: var(--card-bg);
            border-radius: 8px;
            padding: 8px;
            position: relative;
            box-shadow: inset 0 0 10px rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .card-full {
            grid-column: 1 / -1;
        }

        .countdown {
            position: absolute;
            top: 2px;
            right: 5px;
            font-size: 0.6rem;
            color: rgba(255,255,255,0.4);
        }

        .icon {
            font-size: 1.6rem;
            margin-bottom: 2px;
        }

        .value {
            font-size: 1.4rem;
            word-break: break-all;
            width: 100%;
        }

        .small-text {
            font-size: 0.85rem;
            line-height: 1.2;
        }

        .list-item {
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: 3px 0;
            width: 100%;
            text-align: left;
        }
        .list-item:last-child { border: none; }
    </style>
</head>
<body>

    <button id="start-btn" onclick="initDriveView()">🚀 Drive View21 開始</button>

    <header id="header" style="display: none;">
        <h1>🚗 Drive View21</h1>
        <button onclick="forceUpdateAll()">🔄 一括更新</button>
    </header>

    <div class="dashboard" id="dashboard">
        <div class="card">
            <span class="icon">🕒</span>
            <div class="value" id="time-val">--:--</div>
        </div>

        <div class="card">
            <span class="countdown" id="weather-cd">--s</span>
            <span class="icon" id="weather-icon">🌤️</span>
            <div class="value" id="weather-val">--℃ --%</div>
        </div>

        <div class="card">
            <span class="countdown" id="sun-cd">--s</span>
            <span class="icon">🌅🌇</span>
            <div class="value small-text" id="sun-val">出:--:--<br>没:--:--</div>
        </div>

        <div class="card">
            <span class="countdown" id="env-cd">--s</span>
            <span class="icon">💨💧⏲️</span>
            <div class="value small-text" id="env-val">--m/s<br>--%<br>--hPa</div>
        </div>

        <div class="card">
            <span class="countdown">3s</span>
            <span class="icon">🧭</span>
            <div class="value small-text" id="geo-realtime-val">-- km/h<br>--°<br>Alt: --m</div>
        </div>

        <div class="card">
            <span class="countdown" id="zip-cd">--s</span>
            <span class="icon">📮</span>
            <div class="value" id="zip-val" style="font-size: 1.1rem;">〒--- ----</div>
        </div>

        <div class="card card-full">
            <span class="countdown" id="address-cd">--s</span>
            <span class="icon">📍🗺️</span>
            <div class="value small-text" id="address-val">位置情報取得中...</div>
        </div>

        <div class="card card-full">
            <span class="countdown" id="station-cd">--s</span>
            <span class="icon">🚉 最寄り駅</span>
            <div class="value small-text" id="station-list">検索中...</div>
        </div>

        <div class="card card-full">
            <span class="countdown" id="toilet-cd">--s</span>
            <span class="icon">🚹🚺 トイレ</span>
            <div class="value small-text" id="toilet-list">検索中...</div>
        </div>

        <div class="card card-full">
            <span class="countdown" id="gas-cd">--s</span>
            <span class="icon">⛽ GS</span>
            <div class="value small-text" id="gas-list">検索中...</div>
        </div>

        <div class="card card-full">
            <span class="countdown" id="cvs-cd">--s</span>
            <span class="icon">🏪 コンビニ</span>
            <div class="value small-text" id="cvs-list">検索中...</div>
        </div>
    </div>

    <script>
        let lat = null;
        let lon = null;
        let lastLat = null;
        let lastLon = null;
        let heading = 0;

        // タイマー管理用（残り秒数）
        let timers = { weather: 300, sun: 300, env: 300, geo: 120, poi: 120 };

        function initDriveView() {
            document.getElementById('start-btn').style.display = 'none';
            document.getElementById('header').style.display = 'flex';
            document.getElementById('dashboard').style.display = 'grid';

            // 位置情報の監視開始 (高精度モード)
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(updateLocation, handleGeoError, {
                    enableHighAccuracy: true,
                    maximumAge: 0,
                    timeout: 5000
                });
                // デバイスの向き（コンパス）の検知
                if (window.DeviceOrientationEvent) {
                    window.addEventListener('deviceorientationabsolute', handleOrientation, true);
                }
            } else {
                alert("GPSがサポートされていません。");
            }

            // ループ処理開始
            startClock();
            startCountdownLoop();
            
            // 初回データ即時取得
            setTimeout(() => { forceUpdateAll(); }, 1000);
        }

        // リアルタイムGPS更新 (3秒間隔相当で描画反映)
        function updateLocation(position) {
            lat = position.coords.latitude;
            lon = position.coords.longitude;
            
            const speedKmh = position.coords.speed ? Math.round(position.coords.speed * 3.6) : 0;
            const altitude = position.coords.altitude ? Math.round(position.coords.altitude) : 0;
            if (position.coords.heading !== null && !isNaN(position.coords.heading)) {
                heading = Math.round(position.coords.heading);
            }

            const arrow = getArrow(heading);
            const dirStr = getDirectionString(heading);

            document.getElementById('geo-realtime-val').innerHTML = 
                `${speedKmh} km/h<br>${arrow} ${dirStr} (${heading}°)<br>⛰️ ${altitude}m`;
        }

        function handleOrientation(event) {
            // Android/iOSの一部の絶対方位対応
            if (event.alpha !== null) {
                heading = Math.round(360 - event.alpha);
            }
        }

        function handleGeoError(err) {
            console.warn("GPSエラー: " + err.message);
        }

        // 時計 (常時)
        function startClock() {
            setInterval(() => {
                const now = new Date();
                document.getElementById('time-val').innerText = 
                    String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');
            }, 1000);
        }

        // カウントダウンと定期更新制御
        function startCountdownLoop() {
            setInterval(() => {
                // 3秒更新枠はwatchPosition側でリアルタイム処理するためカウントダウン表示のみ更新
                
                // 天気群 (300秒 = 5分)
                timers.weather--;
                timers.sun--;
                timers.env--;
                if(timers.weather <= 0) { fetchWeather(); timers.weather = 300; }
                if(timers.sun <= 0) { fetchSunTimes(); timers.sun = 300; }
                if(timers.env <= 0) { fetchWeather(); timers.env = 300; } // 天気と一括

                document.getElementById('weather-cd').innerText = timers.weather + 's';
                document.getElementById('sun-cd').innerText = timers.sun + 's';
                document.getElementById('env-cd').innerText = timers.env + 's';

                // 住所・POI群 (120秒 = 2分)
                timers.geo--;
                timers.poi--;
                if(timers.geo <= 0) { fetchAddress(); timers.geo = 120; }
                if(timers.poi <= 0) { fetchPOI(); timers.poi = 120; }

                document.getElementById('zip-cd').innerText = timers.geo + 's';
                document.getElementById('address-cd').innerText = timers.geo + 's';
                document.getElementById('station-cd').innerText = timers.poi + 's';
                document.getElementById('toilet-cd').innerText = timers.poi + 's';
                document.getElementById('gas-cd').innerText = timers.poi + 's';
                document.getElementById('cvs-cd').innerText = timers.poi + 's';

            }, 1000);
        }

        function forceUpdateAll() {
            if (!lat || !lon) {
                alert("位置情報がまだ取得できていません。数秒待って再試行してください。");
                return;
            }
            fetchWeather();
            fetchSunTimes();
            fetchAddress();
            fetchPOI();
            
            timers.weather = 300; timers.sun = 300; timers.env = 300;
            timers.geo = 120; timers.poi = 120;
        }

        // --- API 連携ロジック ---

        // 1. 天気・風・気圧 (Open-Meteo)
        function fetchWeather() {
            if(!lat) return;
            const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_21m,relative_humidity_21m,apparent_temperature,precipitation_probability,weather_code,pressure_msl,wind_speed_10m&timezone=Asia%2FTokyo`;
            
            fetch(url).then(res => res.json()).then(data => {
                const c = data.current;
                const temp = Math.round(c.temperature_21m);
                const pop = c.precipitation_probability ?? 0;
                const humidity = c.relative_humidity_21m;
                const pressure = Math.round(c.pressure_msl);
                const wind = Math.round(c.wind_speed_10m);
                
                // 天気コード簡易変換
                let wIcon = "☁️";
                if (c.weather_code === 0) wIcon = "☀️";
                else if ([1,2,3].includes(c.weather_code)) wIcon = "⛅";
                else if ([51,53,55,61,63,65,80,81,82].includes(c.weather_code)) wIcon = "🌧️";
                else if ([71,73,75,85,86].includes(c.weather_code)) wIcon = "❄️";

                document.getElementById('weather-icon').innerText = wIcon;
                document.getElementById('weather-val').innerText = `${temp}℃ ☔${pop}%`;
                document.getElementById('env-val').innerHTML = `💨 ${wind}m/s<br>💧 ${humidity}%<br>⏲️ ${pressure}hPa`;
            }).catch(e => console.error(e));
        }

        // 2. 日の出・日没 (Open-Meteoの別エンドポイント等も可能だが簡略化のため同系統)
        function fetchSunTimes() {
            if(!lat) return;
            const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=sunrise,sunset&timezone=Asia%2FTokyo&forecast_days=1`;
            fetch(url).then(res => res.json()).then(data => {
                const rise = data.daily.sunrise[0].split('T')[1];
                const set = data.daily.sunset[0].split('T')[1];
                
                // 方角算出（簡易的に日の出=東、日没=西、現在地追従矢印表現）
                const riseArrow = getArrow(90);
                const setArrow = getArrow(270);

                document.getElementById('sun-val').innerHTML = `${riseArrow}出 ${rise}<br>${setArrow}没 ${set}`;
            }).catch(e => console.error(e));
        }

        // 3. 住所・郵便番号・ランドマーク (OpenStreetMap Nominatim)
        function fetchAddress() {
            if(!lat) return;
            const url = `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&accept-language=ja`;
            
            fetch(url, { headers: { 'User-Agent': 'DriveView21-App' } }).then(res => res.json()).then(data => {
                const addr = data.address;
                const postcode = addr.postcode ? `〒${addr.postcode}` : '〒--- ----';
                
                const pref = addr.province || addr.state || '';
                const city = addr.city || addr.suburb || addr.town || '';
                const road = addr.road || '';
                const houseNum = addr.house_number || '';
                const landmark = data.name || addr.building || addr.tourism || addr.amenity || '周辺施設不明';

                document.getElementById('zip-val').innerText = postcode;
                document.getElementById('address-val').innerHTML = 
                    `<div style="color:var(--accent-color);">${landmark}</div>${pref}${city}${road}${houseNum}`;
            }).catch(e => console.error(e));
        }

        // 4. 周辺施設 (Overpass API) 一括取得
        function fetchPOI() {
            if(!lat) return;
            
            // Overpass QL: 半径2000m以内の駅、トイレ、GS、コンビニを検索
            const query = `
                [out:json][timeout:15];
                (
                  node["railway"="station"](around:2000,${lat},${lon});
                  node["amenity"="toilets"](around:2000,${lat},${lon});
                  node["amenity"="fuel"](around:2000,${lat},${lon});
                  node["shop"="convenience"](around:2000,${lat},${lon});
                );
                out body;
            `;
            const url = `https://overpass-api.de/api/interpreter?data=${encodeURIComponent(query)}`;

            fetch(url).then(res => res.json()).then(data => {
                let stations = [], toilets = [], gas = [], cvs = [];

                data.elements.forEach(el => {
                    const dist = getDistance(lat, lon, el.lat, el.lon);
                    const b = getBearing(lat, lon, el.lat, el.lon);
                    const arrow = getArrow(b);
                    const item = {
                        name: el.tags.name || el.tags.brand || el.tags.operator || "名称不明",
                        line: el.tags.operator || "",
                        dist: dist,
                        arrow: arrow
                    };

                    if (el.tags.railway === "station") stations.push(item);
                    else if (el.tags.amenity === "toilets") toilets.push(item);
                    else if (el.tags.amenity === "fuel") gas.push(item);
                    else if (el.tags.shop === "convenience") cvs.push(item);
                });

                // 距離順ソートして上位3件を描画
                renderList('station-list', stations.sort((a,b)=>a.dist-b.dist).slice(0,3));
                renderList('toilet-list', toilets.sort((a,b)=>a.dist-b.dist).slice(0,3));
                renderList('gas-list', gas.sort((a,b)=>a.dist-b.dist).slice(0,3));
                renderList('cvs-list', cvs.sort((a,b)=>a.dist-b.dist).slice(0,3));

            }).catch(e => {
                console.error(e);
                const errTag = "<span style='color:red;'>データ取得制限中...</span>";
                document.getElementById('station-list').innerHTML = errTag;
                document.getElementById('toilet-list').innerHTML = errTag;
                document.getElementById('gas-list').innerHTML = errTag;
                document.getElementById('cvs-list').innerHTML = errTag;
            });
        }

        function renderList(id, arr) {
            const container = document.getElementById(id);
            if(arr.length === 0) {
                container.innerHTML = "周辺に見つかりません";
                return;
            }
            container.innerHTML = arr.map(item => {
                const linePrefix = item.line ? `[${item.line}] ` : '';
                return `<div class="list-item">${item.arrow} ${linePrefix}${item.name} (${item.dist.toFixed(1)}km)</div>`;
            }).join('');
        }

        // --- ロジック計算補助系関数 ---

        // 2点間の距離(km)算出
        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLon / 2) * Math.sin(dLon / 2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        }

        // 現在地から対象への方位角(0-360)算出
        function getBearing(lat1, lon1, lat2, lon2) {
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const lat1Rad = lat1 * Math.PI / 180;
            const lat2Rad = lat2 * Math.PI / 180;
            const y = Math.sin(dLon) * Math.cos(lat2Rad);
            const x = Math.cos(lat1Rad) * Math.sin(lat2Rad) - Math.sin(lat1Rad) * Math.cos(lat2Rad) * Math.cos(dLon);
            return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
        }

        // 方位角から矢印文字への変換 (スマホ設置向き不確定なため、北基準絶対方位矢印)
        function getArrow(bearing) {
            const index = Math.round(bearing / 45) % 8;
            const arrows = ["⬆️", "↗️", "➡️", "↘️", "⬇️", "↙️", "⬅️", "↖️"];
            return arrows[index];
        }

        function getDirectionString(bearing) {
            const index = Math.round(bearing / 22.5) % 16;
            const dirs = ["北", "北北東", "北東", "東北東", "東", "東南東", "南東", "南南東", "南", "南南西", "南西", "西北西", "西", "西北西", "北西", "北北西"];
            return dirs[index];
        }
    </script>
</body>
</html>
